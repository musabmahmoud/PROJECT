<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>if (!localStorage.getItem("user")) window.location.href = "login.html";</script>
</head>
<body class="bg-gray-50 p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
      <div>
        <h1 class="text-2xl font-black text-gray-900">Student Pro</h1>
        <p class="text-sm text-gray-500">Admin: <span id="userDisplay" class="text-blue-600 font-bold">...</span></p>
      </div>
      <button onclick="logout()" class="bg-red-500 text-white px-5 py-2 rounded-xl font-bold shadow-md hover:bg-red-600 transition">Logout</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Revenue</h2>
        <p id="totalRevenue" class="text-3xl font-black text-gray-800 mt-1">0 EGP</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Present / Absent</h2>
        <p id="totalAttendanceDisplay" class="text-3xl font-black text-gray-800 mt-1">0 / 0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-purple-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Students</h2>
        <p id="totalStudentsCount" class="text-3xl font-black text-gray-800 mt-1">0</p>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 mb-8">
      <table class="min-w-full">
        <thead class="bg-gray-50 border-b">
          <tr class="text-left text-gray-500 text-xs font-bold uppercase">
            <th class="py-4 px-6">Name</th>
            <th class="py-4 px-6">Payments</th>
            <th class="py-4 px-6">Attendance</th>
            <th class="py-4 px-6">Absences</th>
            <th class="py-4 px-6 text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTable" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>

    <canvas id="chart" width="400" height="100"></canvas>
  </div>

  <div id="paymentModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white w-80 rounded-2xl p-6 shadow-2xl">
      <h3 class="text-lg font-bold mb-4">Add Payment (EGP)</h3>
      <input type="hidden" id="currentId">
      <input type="number" id="payAmt" class="w-full p-3 bg-gray-100 rounded-xl mb-4 text-xl font-bold outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
      <div class="flex gap-2">
        <button onclick="closeModal()" class="flex-1 py-2 bg-gray-100 rounded-lg">Cancel</button>
        <button onclick="submitPay()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold">Confirm</button>
      </div>
    </div>
  </div>

<script>
const API = "/api/students";

window.onload = () => {
  document.getElementById("userDisplay").innerText = localStorage.getItem("user");
  loadData();
};

async function loadData() {
  const res = await fetch(API);
  const students = await res.json();
  const tbody = document.getElementById("studentsTable");
  tbody.innerHTML = "";
  
  students.forEach(s => {
    tbody.innerHTML += `
      <tr class="hover:bg-gray-50 transition">
        <td class="py-4 px-6 font-bold text-gray-800">${s.name}</td>
        <td class="py-4 px-6 text-blue-600 font-black">${s.payments || 0} EGP</td>
        <td class="py-4 px-6 font-bold text-green-600">✅ ${s.attendance || 0}</td>
        <td class="py-4 px-6 font-bold text-red-500">❌ ${s.absences || 0}</td>
        <td class="py-4 px-6 flex justify-center gap-2">
          <button onclick="action('${s._id}', 'present')" class="bg-green-600 text-white px-3 py-1 rounded-lg text-xs">P</button>
          <button onclick="action('${s._id}', 'absent')" class="bg-orange-500 text-white px-3 py-1 rounded-lg text-xs">A</button>
          <button onclick="openModal('${s._id}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs">Pay</button>
        </td>
      </tr>`;
  });
  updateStats();
}

async function action(id, type) {
  await fetch(`${API}/${id}/${type}`, { method: "POST" });
  loadData();
}

function openModal(id) {
  document.getElementById("currentId").value = id;
  document.getElementById("paymentModal").classList.remove("hidden");
}

function closeModal() { document.getElementById("paymentModal").classList.add("hidden"); }

async function submitPay() {
  const id = document.getElementById("currentId").value;
  const amount = parseInt(document.getElementById("payAmt").value);
  await fetch(`${API}/${id}/pay`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });
  closeModal();
  loadData();
}

async function updateStats() {
  const res = await fetch(`${API}/stats/all`);
  const data = await res.json();
  document.getElementById("totalRevenue").innerText = `${data.totalMoney} EGP`;
  document.getElementById("totalAttendanceDisplay").innerText = `${data.totalAttendance} / ${data.totalAbsences}`;
}

function logout() { localStorage.clear(); window.location.href="login.html"; }
</script>
</body>
</html>
