<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // 1. SECURITY GATEKEEPER: Redirect if not logged in
    if (!localStorage.getItem("user")) {
      window.location.href = "login.html";
    }
  </script>
</head>
<body class="bg-gray-100 p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
      <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">Student Management</h1>
      <div class="flex gap-3">
        <button onclick="deleteAllData()" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-lg font-semibold hover:bg-orange-200 transition">
          Clear All Students
        </button>
        <button onclick="logout()" class="bg-red-600 text-white px-6 py-2 rounded-lg font-semibold shadow-md hover:bg-red-700 transition">
          Logout
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="bg-white p-6 rounded-xl shadow-sm border-l-8 border-blue-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Total Revenue</h2>
        <p id="totalRevenue" class="text-4xl font-black text-gray-800 mt-1">$0</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border-l-8 border-green-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Total Attendance</h2>
        <p id="totalAttendance" class="text-4xl font-black text-gray-800 mt-1">0</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <div class="lg:col-span-2">
        <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="🔍 Search students by name..." 
               class="w-full p-4 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-lg">
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm flex gap-2">
        <input id="newStudentName" type="text" placeholder="New Name" class="flex-1 p-2 border-b-2 border-gray-100 outline-none focus:border-purple-500" />
        <button onclick="addNewStudent()" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-purple-700 transition">+</button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-8">
      <table class="min-w-full">
        <thead class="bg-gray-50 border-b">
          <tr class="text-left text-gray-500 text-xs font-bold uppercase tracking-wider">
            <th class="py-4 px-6">Student Name</th>
            <th class="py-4 px-6">Payments</th>
            <th class="py-4 px-6">Attendance</th>
            <th class="py-4 px-6 text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTable" class="divide-y divide-gray-100">
          </tbody>
      </table>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-sm">
      <h2 class="text-xl font-bold mb-6 text-gray-700">Performance Analytics</h2>
      <canvas id="chart" width="400" height="150"></canvas>
    </div>
  </div>

<script>
const API = "/api/students";

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

// 2. SEARCH LOGIC
function searchStudents() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const rows = document.querySelectorAll("#studentsTable tr");
  rows.forEach(row => {
    const name = row.cells[0].innerText.toLowerCase();
    row.style.display = name.includes(query) ? "" : "none";
  });
}

async function loadStudents() {
  try {
    const res = await fetch(API);
    const students = await res.json();
    const tbody = document.getElementById("studentsTable");
    tbody.innerHTML = "";
    
    students.forEach(s => {
      const tr = document.createElement("tr");
      tr.className = "hover:bg-gray-50 transition";
      tr.innerHTML = `
        <td class="py-4 px-6 font-semibold text-gray-800">${s.name}</td>
        <td class="py-4 px-6 text-blue-600 font-bold">$${s.payments || 0}</td>
        <td class="py-4 px-6 text-green-600 font-bold">${s.attendance || 0}</td>
        <td class="py-4 px-6 text-center space-x-2">
          <button onclick="markPresent('${s._id}')" class="bg-green-100 text-green-700 px-3 py-1 rounded-md text-sm font-bold hover:bg-green-200">Present</button>
          <button onclick="addPayment('${s._id}')" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-md text-sm font-bold hover:bg-blue-200">Pay</button>
          <button onclick="deleteStudent('${s._id}')" class="text-gray-300 hover:text-red-500 transition ml-4 text-xl">✕</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
    loadStats();
  } catch (err) { console.error(err); }
}

async function addNewStudent() {
  const nameInput = document.getElementById("newStudentName");
  if (!nameInput.value) return;
  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: nameInput.value })
  });
  nameInput.value = "";
  loadStudents();
}

async function deleteStudent(id) {
  if (confirm("Delete this student?")) {
    await fetch(`${API}/${id}`, { method: "DELETE" });
    loadStudents();
  }
}

// 3. DELETE ALL DATA LOGIC
async function deleteAllData() {
  if (confirm("⚠️ WARNING: This will delete EVERY student in the database. Are you sure?")) {
    await fetch(`${API}/all/danger`, { method: "DELETE" });
    loadStudents();
  }
}

async function markPresent(id) {
  await fetch(`${API}/${id}/present`, { method: "POST" });
  loadStudents();
}

async function addPayment(id) {
  const amount = parseInt(prompt("Enter amount ($):"));
  if(!amount) return;
  await fetch(`${API}/${id}/pay`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ amount })
  });
  loadStudents();
}

async function loadStats() {
  const res = await fetch(`${API}/stats/all`);
  const data = await res.json();
  document.getElementById("totalRevenue").innerText = `$${data.totalMoney || 0}`;
  document.getElementById("totalAttendance").innerText = data.totalAttendance || 0;

  const ctx = document.getElementById('chart').getContext('2d');
  if (window.myChart) window.myChart.destroy();
  window.myChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Revenue ($)', 'Attendance'],
      datasets: [{
        label: 'Global Stats',
        data: [data.totalMoney, data.totalAttendance],
        backgroundColor: ['#3b82f6', '#10b981'],
        borderRadius: 8
      }]
    },
    options: { plugins: { legend: { display: false } } }
  });
}

window.onload = loadStudents;
</script>
</body>
</html>
