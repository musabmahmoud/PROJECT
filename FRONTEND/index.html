<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // SECURITY: Redirect if not logged in
    if (!localStorage.getItem("user")) {
      window.location.href = "login.html";
    }
  </script>
</head>
<body class="bg-gray-50 p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
      <div>
        <h1 class="text-3xl font-black text-gray-900 tracking-tight">Student Management</h1>
        <p class="text-gray-500 font-medium italic">Welcome back, <span id="userDisplay" class="text-blue-600 font-bold">Admin</span></p>
      </div>
      
      <div class="flex gap-3">
        <button onclick="deleteAllData()" class="bg-orange-50 text-orange-600 px-4 py-2 rounded-xl font-bold hover:bg-orange-100 transition border border-orange-100">
          🗑️ Clear All
        </button>
        <button onclick="logout()" class="bg-red-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg hover:bg-red-700 transition transform active:scale-95">
          Logout
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Total Students</h2>
        <p id="totalStudentsCount" class="text-4xl font-black text-gray-800 mt-1">0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Presents / Absences</h2>
        <p id="totalAttendanceDisplay" class="text-4xl font-black text-gray-800 mt-1">0 / 0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-purple-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Total Revenue</h2>
        <p id="totalRevenue" class="text-4xl font-black text-gray-800 mt-1">$0</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <div class="lg:col-span-2 relative">
        <span class="absolute left-4 top-4 text-gray-400">🔍</span>
        <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Search students by name..." 
               class="w-full pl-12 p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none text-lg">
      </div>
      <div class="bg-white p-4 rounded-2xl shadow-sm flex gap-2 border border-gray-100">
        <input id="newStudentName" type="text" placeholder="Enter full name" class="flex-1 p-2 bg-gray-50 rounded-lg outline-none focus:ring-1 focus:ring-purple-500" />
        <button onclick="addNewStudent()" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-purple-700 transition">+</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden mb-8 border border-gray-100">
      <table class="min-w-full">
        <thead class="bg-gray-50 border-b">
          <tr class="text-left text-gray-500 text-xs font-bold uppercase tracking-wider">
            <th class="py-5 px-6">Student Name</th>
            <th class="py-5 px-6">Payments</th>
            <th class="py-5 px-6">Attendance</th>
            <th class="py-5 px-6">Absences</th>
            <th class="py-5 px-6 text-center">Quick Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTable" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
      <h2 class="text-xl font-bold mb-6 text-gray-800">📊 Global Stats</h2>
      <canvas id="chart" width="400" height="120"></canvas>
    </div>
  </div>

<script>
const API = "/api/students";

// LOAD DATA ON START
window.onload = () => {
  const user = localStorage.getItem("user");
  if(user) document.getElementById("userDisplay").innerText = user;
  loadStudents();
};

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

function searchStudents() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const rows = document.querySelectorAll("#studentsTable tr");
  rows.forEach(row => {
    const name = row.cells[0].innerText.toLowerCase();
    row.style.display = name.includes(query) ? "" : "none";
  });
}

async function loadStudents() {
  try {
    const res = await fetch(API);
    const students = await res.json();
    document.getElementById("totalStudentsCount").innerText = students.length;
    
    const tbody = document.getElementById("studentsTable");
    tbody.innerHTML = "";
    
    students.forEach(s => {
      const tr = document.createElement("tr");
      tr.className = "hover:bg-gray-50/50 transition group";
      tr.innerHTML = `
        <td class="py-4 px-6 font-bold text-gray-800">${s.name}</td>
        <td class="py-4 px-6 text-blue-600 font-black">$${s.payments || 0}</td>
        <td class="py-4 px-6">
          <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold bg-green-50 text-green-700">
            ✅ ${s.attendance || 0} Days
          </span>
        </td>
        <td class="py-4 px-6">
          <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold bg-red-50 text-red-700">
            ❌ ${s.absences || 0} Missed
          </span>
        </td>
        <td class="py-4 px-6 text-center flex justify-center items-center gap-2">
          <button onclick="markPresent('${s._id}')" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-green-700 shadow-sm">Present</button>
          <button onclick="markAbsent('${s._id}')" class="bg-orange-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-orange-600 shadow-sm">Absent</button>
          <button onclick="addPayment('${s._id}')" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700 shadow-sm">Pay</button>
          <button onclick="deleteStudent('${s._id}')" class="text-gray-300 hover:text-red-500 transition ml-2 text-xl">✕</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
    loadStats();
  } catch (err) { console.error(err); }
}

async function addNewStudent() {
  const nameInput = document.getElementById("newStudentName");
  if (!nameInput.value) return;
  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: nameInput.value })
  });
  nameInput.value = "";
  loadStudents();
}

async function deleteStudent(id) {
  if (confirm("Delete this student?")) {
    await fetch(`${API}/${id}`, { method: "DELETE" });
    loadStudents();
  }
}

async function deleteAllData() {
  if (confirm("⚠️ CRITICAL: Delete EVERYTHING?")) {
    await fetch(`${API}/all/danger`, { method: "DELETE" });
    loadStudents();
  }
}

async function markPresent(id) {
  await fetch(`${API}/${id}/present`, { method: "POST" });
  loadStudents();
}

async function markAbsent(id) {
  await fetch(`${API}/${id}/absent`, { method: "POST" });
  loadStudents();
}

async function addPayment(id) {
  const amount = parseInt(prompt("Enter payment amount ($):"));
  if(!amount || isNaN(amount)) return;
  await fetch(`${API}/${id}/pay`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ amount })
  });
  loadStudents();
}

async function loadStats() {
  try {
    const res = await fetch(`${API}/stats/all`);
    const data = await res.json();
    document.getElementById("totalRevenue").innerText = `$${data.totalMoney || 0}`;
    document.getElementById("totalAttendanceDisplay").innerHTML = `
      <span class="text-green-600">${data.totalAttendance || 0}</span> 
      <span class="text-gray-300 text-2xl mx-1">/</span>
      <span class="text-red-500">${data.totalAbsences || 0}</span>
    `;

    const ctx = document.getElementById('chart').getContext('2d');
    if (window.myChart) window.myChart.destroy();
    window.myChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Revenue ($)', 'Present', 'Absent'],
        datasets: [{
          data: [data.totalMoney, data.totalAttendance, data.totalAbsences],
          backgroundColor: ['#3b82f6', '#10b981', '#ef4444'],
          borderRadius: 10
        }]
      },
      options: { plugins: { legend: { display: false } } }
    });
  } catch (err) { console.error(err); }
}
</script>
</body>
</html>
