<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Pro Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
      <div>
        <h1 class="text-2xl font-black text-gray-900">Student Pro</h1>
        <div class="flex gap-4 mt-1">
           <span id="userDisplay" class="text-blue-600 font-bold text-sm">Admin</span>
           <a href="summary.html" class="text-purple-600 font-bold text-sm hover:underline">View Summary →</a>
        </div>
      </div>
      <button onclick="logout()" class="bg-red-500 text-white px-5 py-2 rounded-xl font-bold shadow-md hover:bg-red-600 transition">Logout</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Revenue</h2>
        <p id="totalRevenue" class="text-3xl font-black text-gray-800 mt-1">0 EGP</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Presents / Absences</h2>
        <p id="totalAttendanceDisplay" class="text-3xl font-black text-gray-800 mt-1">0 / 0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-purple-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Students</h2>
        <p id="totalStudentsCount" class="text-3xl font-black text-gray-800 mt-1">0</p>
      </div>
    </div>
<div id="deleteModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
  <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8 text-center transform transition-all">
    <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">⚠️</div>
    <h3 class="text-xl font-black text-gray-800 mb-2">Are you sure?</h3>
    <p class="text-gray-500 mb-6">This will permanently remove the student and all their records. This action cannot be undone.</p>
    <input type="hidden" id="deleteId">
    <div class="flex gap-3">
      <button onclick="closeDeleteModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">Cancel</button>
      <button onclick="confirmDelete()" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95">Delete</button>
    </div>
  </div>
</div>

<script>
// --- Updated Delete Logic ---
function deleteStudent(id) {
  document.getElementById("deleteId").value = id;
  document.getElementById("deleteModal").classList.remove("hidden");
}

function closeDeleteModal() {
  document.getElementById("deleteModal").classList.add("hidden");
}

async function confirmDelete() {
  const id = document.getElementById("deleteId").value;
  const res = await fetch(`${API}/${id}`, { method: "DELETE" });
  if (res.ok) {
    closeDeleteModal();
    loadData();
  }
}
</script>
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-8">
      <div class="lg:col-span-2 relative">
        <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Search names..." 
               class="w-full p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
      <div class="bg-white p-2 rounded-2xl shadow-sm flex gap-2 border border-gray-100 lg:col-span-2">
        <input id="newStudentName" type="text" placeholder="Full Name" class="flex-1 p-2 bg-gray-50 rounded-lg outline-none" />
        <select id="newStudentLevel" class="bg-gray-100 p-2 rounded-lg font-bold text-gray-700">
          <optgroup label="Preparatory">
            <option value="Prep 1">Prep 1</option>
            <option value="Prep 2">Prep 2</option>
            <option value="Prep 3">Prep 3</option>
          </optgroup>
          <optgroup label="Secondary">
            <option value="Sec 1">Sec 1</option>
            <option value="Sec 2">Sec 2</option>
            <option value="Sec 3">Sec 3</option>
          </optgroup>
        </select>
        <button onclick="addNewStudent()" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg">+</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 mb-8">
      <table class="min-w-full">
        <thead class="bg-gray-50 border-b text-left text-gray-500 text-xs font-bold uppercase">
          <tr>
            <th class="py-4 px-6">Name</th>
            <th class="py-4 px-6">Level</th>
            <th class="py-4 px-6">Payments</th>
            <th class="py-4 px-6">Attendance</th>
            <th class="py-4 px-6 text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTable" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
  </div>

  <div id="paymentModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white w-80 rounded-2xl p-6 shadow-2xl">
      <h3 class="text-lg font-bold mb-4">Add Payment (EGP)</h3>
      <input type="hidden" id="currentId">
      <input type="number" id="payAmt" class="w-full p-3 bg-gray-100 rounded-xl mb-4 text-xl font-bold outline-none" placeholder="0.00">
      <div class="flex gap-2">
        <button onclick="closeModal()" class="flex-1 py-2 bg-gray-100 rounded-lg">Cancel</button>
        <button onclick="submitPay()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold">Confirm</button>
      </div>
    </div>
  </div>

<script>
const API = "/api/students";

window.onload = () => {
  document.getElementById("userDisplay").innerText = localStorage.getItem("user") || "Admin";
  loadData();
};

async function loadData() {
  const res = await fetch(API);
  const students = await res.json();
  const tbody = document.getElementById("studentsTable");
  tbody.innerHTML = "";
  
  students.forEach(s => {
    tbody.innerHTML += `
      <tr class="hover:bg-gray-50">
        <td class="py-4 px-6 font-bold text-gray-800">${s.name}</td>
        <td class="py-4 px-6"><span class="bg-gray-100 px-2 py-1 rounded text-xs font-bold">${s.level}</span></td>
        <td class="py-4 px-6 text-blue-600 font-black">${s.payments || 0} EGP</td>
        <td class="py-4 px-6 text-sm">✅ ${s.attendance || 0} / ❌ ${s.absences || 0}</td>
        <td class="py-4 px-6 flex justify-center gap-2">
          <button onclick="action('${s._id}', 'present')" class="bg-green-600 text-white px-3 py-1 rounded-lg text-xs">P</button>
          <button onclick="action('${s._id}', 'absent')" class="bg-orange-500 text-white px-3 py-1 rounded-lg text-xs">A</button>
          <button onclick="openModal('${s._id}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs">Pay</button>
          <button onclick="deleteStudent('${s._id}')" class="text-gray-300 hover:text-red-500">✕</button>
        </td>
      </tr>`;
  });
  updateStats();
}

async function addNewStudent() {
  const name = document.getElementById("newStudentName").value;
  const level = document.getElementById("newStudentLevel").value;
  if(!name) return;
  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, level })
  });
  document.getElementById("newStudentName").value = "";
  loadData();
}

async function action(id, type) {
  await fetch(`${API}/${id}/${type}`, { method: "POST" });
  loadData();
}

function openModal(id) {
  document.getElementById("currentId").value = id;
  document.getElementById("paymentModal").classList.remove("hidden");
}

function closeModal() { document.getElementById("paymentModal").classList.add("hidden"); }

async function submitPay() {
  const id = document.getElementById("currentId").value;
  const amount = parseInt(document.getElementById("payAmt").value);
  await fetch(`${API}/${id}/pay`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ amount })
  });
  closeModal();
  loadData();
}

async function updateStats() {
  const res = await fetch(`${API}/stats/all`);
  const data = await res.json();
  document.getElementById("totalRevenue").innerText = `${data.totalMoney} EGP`;
  document.getElementById("totalAttendanceDisplay").innerText = `${data.totalAttendance} / ${data.totalAbsences}`;
  document.getElementById("totalStudentsCount").innerText = document.querySelectorAll("#studentsTable tr").length;
}

function searchStudents() {
  let q = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll("#studentsTable tr").forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none";
  });
}

async function deleteStudent(id) {
  if(confirm("Delete?")) { await fetch(`${API}/${id}`, { method: "DELETE" }); loadData(); }
}

function logout() { localStorage.clear(); window.location.href="login.html"; }
</script>
</body>
</html>
