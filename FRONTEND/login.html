<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-10 rounded-xl shadow-md w-96">
    <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>
    <input id="username" type="text" placeholder="Username" class="w-full p-3 mb-4 border rounded" />
    <input id="password" type="password" placeholder="Password" class="w-full p-3 mb-4 border rounded" />
    <button onclick="login()" class="w-full bg-blue-500 text-white py-3 rounded">Login</button>
    <p id="msg" class="text-red-500 mt-3"></p>
  </div>

<script>
const API = "http://localhost:3000/auth";

async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username, password })
  });
  
  const data = await res.json();
  if(res.ok) {
    window.location.href = "index.html";
  } else {
    document.getElementById("msg").innerText = data.error;
  }
}
</script>
</body>
</html>
