<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Pro | Global Campus ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // SECURITY & THEME ENGINE
    if (!localStorage.getItem("user")) { window.location.href = "login.html"; }
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
    
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { darkbg: '#020617', darkcard: '#0f172a', darkborder: '#1e2937' },
          borderRadius: { '4xl': '2rem', '5xl': '3.5rem', '6xl': '5rem' }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s ease; scroll-behavior: smooth; }
    .dark body { background-color: #020617 !important; color: #f8fafc; }
    
    /* CUSTOM ANIMATIONS */
    .animate-float { animation: float 6s ease-in-out infinite; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
    .animate-glow { animation: glow 2s ease-in-out infinite alternate; }
    @keyframes glow { from { box-shadow: 0 0 5px rgba(37, 99, 235, 0.2); } to { box-shadow: 0 0 20px rgba(37, 99, 235, 0.6); } }
    
    /* SCROLLBAR GONE */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    /* SKELETON LOADING MASK */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .glass-nav { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.8); }
    .dark .glass-nav { background: rgba(15, 23, 42, 0.8); }
  </style>
</head>

<body class="bg-[#F1F5F9] min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-24 hidden xl:flex flex-col items-center py-10 bg-white dark:bg-darkcard border-r dark:border-darkborder z-50">
    <div class="text-3xl font-black text-blue-600 mb-12 animate-float">S.</div>
    <div class="space-y-8 flex-1">
      <a href="index.html" class="p-4 bg-blue-600 text-white rounded-2xl block shadow-lg shadow-blue-200">📊</a>
      <a href="classes.html" class="p-4 text-slate-400 hover:text-blue-600 transition-colors block">🏫</a>
      <a href="teachers.html" class="p-4 text-slate-400 hover:text-blue-600 transition-colors block">👨‍🏫</a>
      <a href="summary.html" class="p-4 text-slate-400 hover:text-blue-600 transition-colors block">📉</a>
    </div>
    <button onclick="toggleTheme()" class="p-4 text-slate-400">🌗</button>
  </aside>

  <main class="xl:ml-24 p-4 md:p-12 lg:p-20">
    
    <header class="flex flex-col lg:flex-row justify-between items-end mb-16 gap-8">
      <div>
        <div class="flex items-center gap-3 mb-4">
          <span class="px-4 py-1.5 bg-blue-600 text-white text-[10px] font-black uppercase tracking-[0.3em] rounded-full">Active Terminal</span>
          <span id="liveClock" class="text-[10px] font-bold text-slate-400 uppercase">00:00:00 AM</span>
        </div>
        <h1 class="text-7xl font-[800] tracking-tighter italic">Enterprise <span class="text-blue-600">Hub</span></h1>
        <p id="userStatus" class="text-slate-500 font-medium mt-2">Welcome back, Commander <span id="userName" class="text-blue-600 font-black">Admin</span></p>
      </div>

      <div class="flex gap-4">
        <div class="bg-white dark:bg-darkcard p-4 rounded-3xl border dark:border-darkborder shadow-sm text-right">
          <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Network Status</p>
          <p class="text-emerald-500 font-black flex items-center gap-2 justify-end">ONLINE <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span></p>
        </div>
        <button onclick="logout()" class="bg-slate-900 text-white px-10 py-5 rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-red-600 transition-all">Term. Logout</button>
      </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-4 gap-8 mb-16">
      <div class="xl:col-span-3 bg-white dark:bg-darkcard p-10 rounded-[4rem] shadow-sm border dark:border-darkborder relative overflow-hidden">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h3 class="text-2xl font-black tracking-tight">Financial Stream</h3>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Revenue performance for 2026</p>
            </div>
            <div class="flex gap-2">
                <span class="w-4 h-4 bg-blue-600 rounded-full"></span>
                <span class="w-4 h-4 bg-slate-200 dark:bg-slate-700 rounded-full"></span>
            </div>
        </div>
        <canvas id="revenueChart" style="max-height: 300px;"></canvas>
      </div>

      <div class="space-y-8">
        <div class="bg-blue-600 p-8 rounded-[3.5rem] text-white shadow-xl shadow-blue-200 dark:shadow-none">
            <p class="text-[10px] font-black uppercase tracking-widest opacity-60">Total Collection</p>
            <h4 id="totalRevenue" class="text-5xl font-[900] mt-2 tracking-tighter">0</h4>
            <p class="text-xs mt-4 font-bold">+12% vs last month</p>
        </div>
        <div class="bg-white dark:bg-darkcard p-8 rounded-[3.5rem] border dark:border-darkborder">
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Student Body</p>
            <h4 id="totalStudentsCount" class="text-5xl font-[900] mt-2 tracking-tighter">0</h4>
            <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full mt-6">
                <div class="bg-blue-600 h-2 rounded-full" style="width: 75%"></div>
            </div>
        </div>
      </div>
    </div>

    <div class="bg-white dark:bg-darkcard p-4 rounded-[3.5rem] border dark:border-darkborder shadow-xl mb-16 relative z-10">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-3">
        <input id="newStudentName" type="text" placeholder="Entry Name..." class="lg:col-span-2 bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl outline-none font-bold text-lg">
        
        <select id="newStudentLevel" class="bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl font-black text-xs uppercase outline-none">
            <optgroup label="Primary School">
                <option value="Primary 1">Primary 1</option>
                <option value="Primary 6">Primary 6</option>
            </optgroup>
            <optgroup label="Preparatory">
                <option value="Prep 1">Prep 1</option>
                <option value="Prep 3">Prep 3</option>
            </optgroup>
            <optgroup label="High School">
                <option value="Sec 1">Sec 1</option>
                <option value="Sec 2" selected>Sec 2</option>
            </optgroup>
        </select>

        <select id="newStudentClass" class="bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl font-black text-xs uppercase">
            <option value="Class A">Class A</option>
            <option value="Class B">Class B</option>
        </select>

        <select id="newStudentLang" class="bg-slate-100 dark:bg-slate-800 p-6 rounded-3xl font-black text-blue-600 text-xs uppercase">
            <option value="English">English Dept</option>
            <option value="Arabic">Arabic Dept</option>
        </select>

        <button onclick="addNewStudent()" class="bg-blue-600 hover:bg-blue-700 text-white rounded-3xl font-black text-3xl shadow-lg transition-transform active:scale-90">+</button>
      </div>
    </div>

    <div class="bg-white dark:bg-darkcard rounded-[5rem] shadow-sm border dark:border-darkborder overflow-hidden mb-40">
      <div class="p-10 border-b dark:border-darkborder flex justify-between items-center flex-wrap gap-4">
        <div class="relative w-full md:w-1/3">
            <span class="absolute left-6 top-1/2 -translate-y-1/2 opacity-30 text-xl">🔍</span>
            <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Search Global Records..." 
                   class="w-full pl-16 pr-8 py-5 bg-slate-50 dark:bg-slate-800 rounded-3xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-600/10">
        </div>
        <div class="flex gap-4">
            <button onclick="exportData()" class="p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-100 transition-all">CSV Export</button>
            <button onclick="loadData()" class="p-4 bg-blue-50 text-blue-600 rounded-2xl text-[10px] font-black uppercase tracking-widest">Refresh Stream</button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-slate-50/50 dark:bg-slate-800/30 text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em]">
              <th class="p-12">Identification Unit</th>
              <th class="p-12">Grade Level</th>
              <th class="p-12">Finance Stack</th>
              <th class="p-12 text-center">Department</th>
              <th class="p-12 text-right">Action</th>
            </tr>
          </thead>
          <tbody id="studentsTable" class="divide-y dark:divide-darkborder">
            </tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
    // --- CORE LOGIC CONSTANTS ---
    const API = "/api/students";
    const currentUser = localStorage.getItem("user");
    let chartInstance = null;

    // --- INITIALIZATION ---
    window.onload = () => {
        document.getElementById("userName").innerText = currentUser;
        updateClock();
        setInterval(updateClock, 1000);
        initChart();
        loadData();
    };

    // --- CLOCK ENGINE ---
    function updateClock() {
        const now = new Date();
        document.getElementById("liveClock").innerText = now.toLocaleTimeString();
    }

    // --- THEME ENGINE ---
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // --- CHART ENGINE (Titan Visualizer) ---
    function initChart() {
        const ctx = document.getElementById('revenueChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Monthly Revenue (EGP)',
                    data: [12000, 19000, 15000, 25000, 22000, 30000],
                    borderColor: '#2563eb',
                    borderWidth: 6,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(37, 99, 235, 0.05)',
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false }, 
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { weight: 'bold', size: 10 } } } 
                }
            }
        });
    }

    // --- DATA ENGINE (CRUD Operations) ---
    async function loadData() {
        const tbody = document.getElementById("studentsTable");
        tbody.innerHTML = `<tr><td colspan="5" class="p-40 text-center text-slate-300 font-black animate-pulse uppercase tracking-widest text-xs">Accessing Encrypted Records...</td></tr>`;

        try {
            const res = await fetch(`${API}?admin=${currentUser}`);
            const students = await res.json();
            tbody.innerHTML = "";

            students.forEach(s => {
                const row = `
                    <tr class="group hover:bg-slate-50/50 dark:hover:bg-slate-800/20 transition-all border-l-[6px] border-transparent hover:border-blue-600">
                        <td class="p-12">
                            <p class="text-2xl font-[800] tracking-tight text-slate-900 dark:text-white">${s.name}</p>
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mt-1">ID: ${s._id.slice(-6)}</p>
                        </td>
                        <td class="p-12">
                            <span class="px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-[10px] font-black uppercase text-slate-600 dark:text-slate-300">${s.level}</span>
                        </td>
                        <td class="p-12">
                            <p class="text-2xl font-[900] text-blue-600">${(s.payments || 0).toLocaleString()} <span class="text-xs opacity-40">EGP</span></p>
                        </td>
                        <td class="p-12 text-center">
                            <div class="flex flex-col items-center">
                                <span class="text-[10px] font-black uppercase text-blue-500">${s.language || 'English'}</span>
                                <span class="text-[9px] font-bold text-slate-300 uppercase">${s.className || 'Class A'}</span>
                            </div>
                        </td>
                        <td class="p-12 text-right">
                            <button onclick="window.location.href='tables.html?grade=${encodeURIComponent(s.level)}'" class="p-4 bg-slate-900 dark:bg-blue-600 text-white rounded-2xl font-black text-[9px] uppercase tracking-widest hover:scale-105 transition-all shadow-lg active:scale-95">Open Hub</button>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            });
            updateStats();
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-red-500 font-black">SYSTEM ERROR: UNABLE TO REACH DATABASE</td></tr>`;
        }
    }

    async function addNewStudent() {
        const name = document.getElementById("newStudentName").value;
        const level = document.getElementById("newStudentLevel").value;
        const cls = document.getElementById("newStudentClass").value;
        const lng = document.getElementById("newStudentLang").value;

        if(!name.trim()) return;

        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: name.trim(), level, className: cls, language: lng, owner: currentUser })
        });

        document.getElementById("newStudentName").value = "";
        loadData();
    }

    function updateStats() {
        let rev = 0, count = 0;
        document.querySelectorAll("#studentsTable tr").forEach(row => {
            if(row.cells.length > 1) {
                rev += parseInt(row.cells[2].innerText.replace(/[^0-9]/g, "")) || 0;
                count++;
            }
        });
        document.getElementById("totalRevenue").innerText = rev.toLocaleString();
        document.getElementById("totalStudentsCount").innerText = count;
    }

    function searchStudents() {
        let q = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#studentsTable tr").forEach(row => {
            if(row.cells.length > 1) {
                row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none";
            }
        });
    }

    function exportData() {
        alert("Preparing Secure Data Export... Your CSV file will download shortly.");
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
