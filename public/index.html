<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Master Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    
    :root { 
      --titan-blue: #2563eb; 
      --titan-slate: #f8fafc; 
      --sidebar-width: 110px;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #0f172a; 
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* --- ADVANCED SIDEBAR ARCHITECTURE --- */
    .sidebar { 
      width: var(--sidebar-width); 
      height: 100vh; 
      position: fixed; 
      left: 0; 
      top: 0; 
      background: white; 
      border-right: 1px solid #edf2f7; 
      z-index: 100; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding-top: 2.5rem;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-icon { 
      width: 58px; 
      height: 58px; 
      margin-bottom: 1.8rem; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border-radius: 20px; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      font-size: 24px; 
      text-decoration: none;
      color: #94a3b8;
      background: transparent;
    }

    .nav-icon:hover { 
      background: #f1f5f9; 
      color: var(--titan-blue);
      transform: translateY(-2px);
    }

    .nav-icon.active { 
      background: var(--titan-blue); 
      color: white; 
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25); 
    }

    /* --- MAIN CONTENT WRAPPER --- */
    .main-content { 
      margin-left: var(--sidebar-width); 
      padding: 4rem; 
      max-width: 1600px;
    }

    /* --- TITAN COMPONENT LIBRARY --- */
    .titan-card { 
      background: white; 
      border-radius: 3rem; 
      border: 1px solid #edf2f7; 
      overflow: hidden; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.02);
      transition: transform 0.3s ease;
    }

    .erp-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    
    .erp-table th { 
      background: #fcfdfe; 
      text-transform: uppercase; 
      font-size: 11px; 
      letter-spacing: 0.2em; 
      padding: 1.8rem 2.5rem; 
      color: #64748b; 
      font-weight: 800; 
      border-bottom: 1px solid #f1f5f9;
    }

    .erp-table td { 
      padding: 2rem 2.5rem; 
      border-bottom: 1px solid #f8fafc; 
      vertical-align: middle;
    }

    .erp-table tr:last-child td { border-bottom: none; }

    /* --- INPUT FIELD STYLING --- */
    .titan-input {
      background: #f8fafc;
      border: 2px solid transparent;
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      font-weight: 700;
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: all 0.2s ease;
    }

    .titan-input:focus {
      border-color: var(--titan-blue);
      background: white;
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.08);
    }

    /* --- STATUS BADGES --- */
    .badge {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-blue { background: #eff6ff; color: #1d4ed8; }
    .badge-green { background: #f0fdf4; color: #16a34a; }

    @media print {
      .sidebar, .no-print { display: none !important; }
      .main-content { margin-left: 0 !important; padding: 0 !important; }
    }
  </style>
</head>
<body>

  <aside class="sidebar no-print">
    <div class="text-blue-600 font-black text-4xl italic mb-16 tracking-tighter">T.</div>
    
    <a href="index.html" class="nav-icon active" title="Dashboard">📊</a>
    <a href="tables.html" class="nav-icon" title="Schedule Grid">📅</a>
    <a href="classes.html" class="nav-icon" title="Class Rooms">🏫</a>
    <a href="teachers.html" class="nav-icon" title="Teacher Registry">👨‍🏫</a>
    
    <div class="mt-auto mb-10 text-slate-300 hover:text-red-500 cursor-pointer transition-colors" onclick="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </aside>

  <main class="main-content">
    
    <header class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
      <div>
        <p class="text-[11px] font-black text-blue-600 uppercase tracking-[0.5em] mb-3 italic">Titan Database Architecture</p>
        <h1 class="text-7xl font-black italic tracking-tighter uppercase text-slate-900 leading-[0.85]">
          Master <span class="text-blue-600">Nodes</span>
        </h1>
      </div>
      
      <div class="no-print flex items-center gap-4 bg-white p-2 rounded-[2rem] border shadow-sm">
        <div class="pl-6 text-slate-400">🔍</div>
        <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Filter Registry..." 
               class="bg-transparent py-4 pr-6 outline-none font-bold text-sm w-64">
      </div>
    </header>

    <section class="titan-card p-8 mb-12 no-print border-t-[12px] border-t-blue-600">
        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Register New Academic Unit</h3>
        <div class="grid grid-cols-1 xl:grid-cols-5 gap-5">
            <input id="newStudentName" type="text" placeholder="Full Name" class="titan-input">
            
            <select id="newStudentLevel" class="titan-input uppercase text-[11px]">
                <optgroup label="Primary Stage">
                    <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option>
                    <option>Primary 4</option><option>Primary 5</option><option>Primary 6</option>
                </optgroup>
                <optgroup label="Preparatory Stage">
                    <option>Prep 1</option><option>Prep 2</option><option>Prep 3</option>
                </optgroup>
            </select>

            <select id="newStudentClass" class="titan-input uppercase text-[11px]">
                <option>Group A</option><option>Group B</option>
            </select>

            <select id="newStudentLang" class="titan-input uppercase text-[11px] text-blue-600">
                <option>English</option><option>Arabic</option>
            </select>

            <button onclick="addNewStudent()" class="bg-blue-600 text-white rounded-[1.5rem] font-black text-[11px] uppercase tracking-[0.2em] hover:bg-slate-900 transition-all shadow-xl shadow-blue-100 active:scale-95">
                Inject Node +
            </button>
        </div>
    </section>

    <div class="titan-card">
        <div class="overflow-x-auto">
            <table class="erp-table">
                <thead>
                    <tr>
                        <th class="w-1/3">Identification & ID</th>
                        <th>Academic Track</th>
                        <th>Subject Pulse</th>
                        <th class="text-right">Operations</th>
                    </tr>
                </thead>
                <tbody id="studentsTable">
                    </tbody>
            </table>
        </div>
    </div>

    <footer class="mt-12 flex gap-8 no-print">
        <div class="bg-white px-8 py-6 rounded-[2rem] border border-slate-100">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Registry</p>
            <p id="totalCount" class="text-2xl font-black italic">00</p>
        </div>
        <div class="bg-white px-8 py-6 rounded-[2rem] border border-slate-100">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">System Status</p>
            <p class="text-2xl font-black italic text-emerald-500">ENCRYPTED</p>
        </div>
    </footer>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => { 
        if (!user) window.location.href = "login.html"; 
        loadData(); 
    };

    async function loadData() {
        const tbody = document.getElementById("studentsTable");
        tbody.innerHTML = `<tr><td colspan="4" class="p-32 text-center font-black text-slate-100 italic text-4xl animate-pulse">UPLINKING...</td></tr>`;

        try {
            const res = await fetch(`${API}?admin=${user}`);
            const data = await res.json();
            tbody.innerHTML = "";
            document.getElementById('totalCount').innerText = data.length.toString().padStart(2, '0');

            data.forEach(s => {
                tbody.innerHTML += `
                    <tr class="group">
                        <td>
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center font-black text-blue-600 text-xl italic">${s.name.charAt(0)}</div>
                                <div>
                                    <p class="text-2xl font-black text-slate-800 tracking-tight leading-none mb-2">${s.name}</p>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Master ID: ${s._id.slice(-8).toUpperCase()}</p>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="badge badge-blue">${s.level}</span>
                            <div class="mt-3 text-[10px] font-black text-slate-400 uppercase flex gap-3">
                                <span>${s.language}</span>
                                <span class="text-slate-200">|</span>
                                <span>${s.className}</span>
                            </div>
                        </td>
                        <td>
                            <div class="flex items-center gap-2 no-print">
                                <input type="text" placeholder="Subject" id="subName-${s._id}" class="titan-input !p-3 !rounded-xl !text-[10px] w-28">
                                <input type="number" placeholder="00" id="subScore-${s._id}" class="titan-input !p-3 !rounded-xl !text-[10px] w-16 text-center">
                                <button onclick="addSubjectToStudent('${s._id}')" class="bg-emerald-500 text-white w-10 h-10 rounded-xl flex items-center justify-center font-bold hover:scale-110 transition-transform shadow-lg shadow-emerald-100">✓</button>
                            </div>
                        </td>
                        <td>
                            <div class="flex justify-end gap-3">
                                <button onclick="window.location.href='tables.html?id=${s._id}'" class="px-6 py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase hover:bg-blue-600 transition-all shadow-lg">View Hub</button>
                                <button onclick="deleteStudent('${s._id}')" class="px-4 py-4 bg-red-50 text-red-400 rounded-2xl hover:bg-red-500 hover:text-white transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });
        } catch (e) { 
            tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-red-500 font-black">SYSTEM OVERLOAD. CHECK CONNECTION.</td></tr>`; 
        }
    }

    async function addNewStudent() {
        const name = document.getElementById("newStudentName").value;
        const level = document.getElementById("newStudentLevel").value;
        const className = document.getElementById("newStudentClass").value;
        const language = document.getElementById("newStudentLang").value;
        if(!name) return alert("Identification Required.");
        await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, level, className, language, owner: user }) });
        document.getElementById("newStudentName").value = "";
        loadData();
    }

    async function addSubjectToStudent(id) {
        const subName = document.getElementById(`subName-${id}`).value;
        const subScore = document.getElementById(`subScore-${id}`).value;
        if(!subName || !subScore) return;
        const res = await fetch(`${API}/update-value`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ studentId: id, month: new Date().toISOString().slice(0, 7), field: subName.toLowerCase().trim(), value: Number(subScore) }) });
        if(res.ok) { document.getElementById(`subName-${id}`).value = ""; document.getElementById(`subScore-${id}`).value = ""; alert("Subject Pulsed."); }
    }

    async function deleteStudent(id) { if(confirm("Purge Node permanently?")) { await fetch(`${API}/${id}?admin=${user}`, { method: "DELETE" }); loadData(); } }
    
    function searchStudents() { 
        const q = document.getElementById("searchInput").value.toLowerCase(); 
        document.querySelectorAll("#studentsTable tr").forEach(row => { 
            row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none"; 
        }); 
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
