<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Student Registry</title>
  <script src="https://cdn.tailwindcss.com"></script>
 <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root { --titan-blue: #1e293b; --accent-blue: #3b82f6; --titan-slate: #fcfdfe; --sidebar-width: 100px; }
    
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--titan-slate); color: #334155; margin: 0; -webkit-font-smoothing: antialiased; }

    /* --- SIDEBAR (PC ONLY) --- */
    .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; background: white; border-right: 1px solid #f1f5f9; z-index: 100; display: flex; flex-direction: column; align-items: center; padding-top: 2.5rem; }
    .nav-icon { width: 54px; height: 54px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; transition: all 0.3s ease; font-size: 22px; text-decoration: none; color: #94a3b8; }
    .nav-icon.active { background: #f1f5f9; color: var(--titan-blue); }

    /* --- LAYOUT --- */
    .main-content { margin-left: var(--sidebar-width); padding: 4rem 6rem; max-width: 1500px; transition: all 0.3s ease; }
    .titan-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.01); }
    .titan-input { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem 1.2rem; font-weight: 500; font-size: 13px; outline: none; width: 100%; color: #1e293b; }
    .btn-primary { background: var(--titan-blue); color: white; padding: 1rem 2rem; border-radius: 1.2rem; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.3s ease; width: 100%; }

    /* --- TABLE (PC STYLE) --- */
    .erp-table th { background: #fafbfd; text-transform: uppercase; font-size: 10px; letter-spacing: 0.15em; padding: 1.5rem 2.5rem; color: #94a3b8; font-weight: 700; border-bottom: 1px solid #f1f5f9; }
    .erp-table td { padding: 1.8rem 2.5rem; border-bottom: 1px solid #f8fafc; }

    /* --- MOBILE RESPONSIVE ENGINE --- */
    .mobile-nav { display: none; }

    @media (max-width: 768px) {
        .sidebar { display: none !important; }
        .main-content { margin-left: 0 !important; padding: 2rem 1.2rem 100px 1.2rem !important; }
        
        /* Floating Bottom Nav */
        .mobile-nav { 
            display: flex; position: fixed; bottom: 20px; left: 15px; right: 15px; 
            height: 75px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 15px 35px rgba(30, 41, 59, 0.15); z-index: 1000;
            justify-content: space-around; align-items: center;
        }

        /* Header Fix */
        header { flex-direction: column !important; align-items: flex-start !important; gap: 1rem; margin-bottom: 2rem !important; }
        h1 { font-size: 2.8rem !important; }
        #searchInput { width: 100% !important; }

        /* Card-ify the Table */
        .erp-table thead { display: none; }
        .erp-table tr { display: flex; flex-direction: column; background: white; margin-bottom: 1rem; border: 1px solid #f1f5f9; border-radius: 1.5rem; padding: 1rem; position: relative; }
        .erp-table td { border: none !important; padding: 0.5rem 0 !important; width: 100% !important; display: block; }
        
        /* Push the Delete button to the top-right corner of the card */
        .erp-table td:last-child { position: absolute; top: 1rem; right: 1rem; width: auto !important; }
    }
/* --- TITAN MOBILE CORE --- */
@media (max-width: 768px) {
    /* 1. Kill the Sidebar Gap */
    .sidebar { display: none !important; }
    
    .main-content { 
        margin-left: 0 !important; 
        padding: 2rem 1rem 120px 1rem !important; /* Extra bottom padding for the nav bar */
        width: 100% !important;
        max-width: 100vw !important;
        overflow-x: hidden;
    }

    /* 2. Floating Bottom Navigation Styling */
    .mobile-nav { 
        display: flex !important; 
        position: fixed; 
        bottom: 25px; 
        left: 20px; 
        right: 20px; 
        height: 75px; 
        background: rgba(255, 255, 255, 0.8); 
        backdrop-filter: blur(20px); /* iPhone style blur */
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 30px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        z-index: 9999;
        justify-content: space-around; 
        align-items: center;
    }

    /* 3. Make Nav Icons Pop */
    .mobile-nav .nav-icon {
        margin-bottom: 0 !important;
        width: 50px;
        height: 50px;
        font-size: 24px;
        background: transparent;
    }
    
    .mobile-nav .nav-icon.active {
        background: #eff6ff;
        color: #3b82f6;
        border-radius: 20px;
    }

    /* 4. Fix the Header & Cards */
    h1 { font-size: 2.5rem !important; letter-spacing: -0.05em !important; }
    
    .titan-card { 
        border-radius: 24px !important; 
        padding: 1.2rem !important;
        margin-bottom: 1rem !important;
    }

    /* 5. Stack Form Elements */
    .no-print.flex, header.flex {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 15px !important;
    }
    
    .no-print select, .no-print input {
        width: 100% !important;
        font-size: 14px !important;
    }
}
</style>
</head>
<body>

  <aside class="sidebar no-print">
    <div class="mt-auto mb-4 text-slate-400 hover:text-blue-500 cursor-pointer" onclick="toggleMobileView()" title="Simulate Mobile">
    📱
</div>
    <div class="text-slate-900 font-bold text-3xl mb-16 tracking-tighter">T<span class="text-blue-500">.</span></div>
    <nav>
      <a href="index.html" class="nav-icon" title="Registry">👥</a>
      <a href="tables.html" class="nav-icon" title="Schedules">📅</a>
      <a href="classes.html" class="nav-icon" title="Attendance">🏫</a>
      <a href="teachers.html" class="nav-icon active" title="Faculty">👨‍🏫</a>
      <div onclick="toggleMobileView()" class="nav-icon">📱</div>
    </nav>
    <div class="mt-auto mb-10 text-slate-300 hover:text-red-500 cursor-pointer" onclick="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </aside>

  <main class="main-content">
    <header class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
      <div>
        <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">Student <span class="text-slate-400 font-light">Registry</span></h1>
      </div>
      <div class="flex items-center gap-4 bg-white px-5 py-3 rounded-2xl border border-slate-100 shadow-sm">
        <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Search Records..." class="bg-transparent outline-none font-medium text-sm w-64 text-slate-600">
      </div>
    </header>

    <section class="titan-card p-8 mb-10 border-l-4 border-l-blue-500">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
            <input id="newStudentName" type="text" placeholder="Legal Full Name" class="titan-input">
            <select id="newStudentLevel" class="titan-input">
                <optgroup label="Primary Stage">
                    <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option>
                    <option>Primary 4</option><option>Primary 5</option><option>Primary 6</option>
                </optgroup>
                <optgroup label="Preparatory Stage">
                    <option>Prep 1</option><option>Prep 2</option><option>Prep 3</option>
                </optgroup>
            </select>
            <select id="newStudentClass" class="titan-input">
                <option>Group A</option><option>Group B</option><option>Group C</option>
            </select>
            <select id="newStudentLang" class="titan-input">
                <option>English Track</option><option>Arabic Track</option><option>German Track</option>
            </select>
            <button onclick="addNewStudent()" class="btn-primary">Confirm Enrollment</button>
        </div>
    </section>

    <div class="titan-card overflow-hidden">
        <table class="w-full text-left erp-table">
            <thead>
                <tr>
                    <th class="w-1/3">Student Details</th>
                    <th>Academic Level</th>
                    <th>Quick Action</th>
                    <th class="text-right">Management</th>
                </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
        </table>
    </div>

    <footer class="mt-10 flex items-center justify-between">
        <div class="bg-white px-6 py-4 rounded-2xl border border-slate-100">
            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Total Enrollment</p>
            <p id="totalCount" class="text-xl font-bold text-slate-900">00</p>
        </div>
        <p class="text-[10px] text-slate-300 font-medium italic">Titan Cloud Systems v4.2.0</p>
    </footer>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => { 
        if (!user) {
            window.location.href = "login.html";
        } else {
            loadData(); 
        }
    };
function toggleMobileView() {
    const main = document.querySelector('.main-content');
    const sidebar = document.querySelector('.sidebar');
    const isMobile = main.style.maxWidth === '430px';
    
    if (!isMobile) {
        main.style.maxWidth = '430px';
        main.style.margin = '40px auto';
        main.style.border = '12px solid #1e293b';
        main.style.borderRadius = '50px';
        main.style.height = '85vh';
        main.style.overflowY = 'auto';
        if(sidebar) sidebar.style.display = 'none';
        // Force show mobile nav in simulation
        document.querySelector('.mobile-nav').style.display = 'flex'; 
    } else {
        location.reload(); // Quickest way to reset the simulation view
    }
}
    async function loadData() {
        const tbody = document.getElementById("studentsTable");
        const countEl = document.getElementById('totalCount');
        
        try {
            const res = await fetch(`${API}?admin=${user}`);
            const data = await res.json();
            
            tbody.innerHTML = "";
            countEl.innerText = data.length.toString().padStart(2, '0');

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-slate-300 italic">No students enrolled yet.</td></tr>`;
                return;
            }

            data.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center font-bold text-sm">${s.name.charAt(0)}</div>
                                <div>
                                    <p class="text-sm font-bold text-slate-800">${s.name}</p>
                                    <p class="text-[10px] text-slate-400">ID: ${s._id.slice(-5).toUpperCase()}</p>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="flex flex-col">
                                <span class="text-[11px] font-bold text-slate-700">${s.level}</span>
                                <span class="text-[9px] font-bold text-blue-400 uppercase">${s.language} | ${s.className}</span>
                            </div>
                        </td>
                        <td><button onclick="window.location.href='classes.html'" class="text-[10px] font-bold text-slate-400 hover:text-blue-500">Attendance →</button></td>
                        <td class="text-right">
                            <button onclick="deleteStudent('${s._id}')" class="h-9 w-9 bg-red-50 text-red-400 rounded-lg hover:bg-red-500 hover:text-white transition-all">✕</button>
                        </td>
                    </tr>`;
            });
        } catch (e) { 
            tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-red-400">Database Offline</td></tr>`; 
        }
    }

    async function addNewStudent() {
        const name = document.getElementById("newStudentName").value.trim();
        const level = document.getElementById("newStudentLevel").value;
        const className = document.getElementById("newStudentClass").value;
        const language = document.getElementById("newStudentLang").value;

        if(!name) return alert("Please enter a student name");
        
        const btn = document.querySelector(".btn-primary");
        btn.innerText = "Enrolling...";
        btn.disabled = true;

        try {
            const res = await fetch(API, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ name, level, className, language, owner: user }) 
            });

            if(res.ok) {
                document.getElementById("newStudentName").value = "";
                loadData();
            } else {
                alert("Server error. Check your Vercel logs.");
            }
        } catch(err) {
            alert("Connection Failed.");
        } finally {
            btn.innerText = "Confirm Enrollment";
            btn.disabled = false;
        }
    }

    async function deleteStudent(id) { 
        if(confirm("Are you sure you want to delete this student permanently?")) { 
            await fetch(`${API}/${id}?admin=${user}`, { method: "DELETE" }); 
            loadData(); 
        } 
    }
    
    function searchStudents() { 
        const q = document.getElementById("searchInput").value.toLowerCase(); 
        document.querySelectorAll("#studentsTable tr").forEach(row => { 
            row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none"; 
        }); 
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
</script>
</body>
</html>
