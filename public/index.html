<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Class Online Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    /* --- TITAN BRAND TOKENS --- */
    :root { 
      --titan-blue: #1e293b; 
      --accent-blue: #3b82f6; 
      --titan-slate: #fcfdfe; 
      --sidebar-width: 100px; 
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #334155; 
      margin: 0; 
    }

    /* --- NAVIGATION SIDEBAR --- */
    .sidebar { 
      width: var(--sidebar-width); 
      height: 100vh; 
      position: fixed; 
      left: 0; top: 0; 
      background: white; 
      border-right: 1px solid #f1f5f9; 
      z-index: 100; 
      display: flex; flex-direction: column; align-items: center; padding-top: 2.5rem; 
    }

    .nav-icon { 
      width: 54px; height: 54px; margin-bottom: 1.5rem; 
      display: flex; align-items: center; justify-content: center; 
      border-radius: 16px; cursor: pointer; transition: all 0.3s ease; 
      font-size: 22px; color: #94a3b8; text-decoration: none; 
    }

    /* Active state styling for the current page */
    .nav-icon.active { background: #f1f5f9; color: var(--titan-blue); }

    .main-content { margin-left: var(--sidebar-width); padding: 4rem 6rem; max-width: 1500px; }

    /* --- LUXURY UI CARDS --- */
    .titan-card { 
      background: white; 
      border-radius: 2rem; 
      border: 1px solid #f1f5f9; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.01); 
    }

    /* --- TITAN INPUT FIELD SYSTEM --- */
    .titan-input { 
      background: #f8fafc; 
      border: 1px solid #e2e8f0; 
      border-radius: 1rem; 
      padding: 1rem 1.2rem; 
      font-weight: 500; 
      font-size: 13px; 
      outline: none; 
      width: 100%; 
      color: #1e293b; 
      transition: all 0.2s; 
    }
    .titan-input:focus { border-color: var(--accent-blue); background: white; }

    /* --- PRIMARY ACTION BUTTON --- */
    .btn-primary { 
      background: var(--titan-blue); 
      color: white; 
      padding: 0.8rem 2rem; 
      border-radius: 1rem; 
      font-weight: 700; 
      font-size: 11px; 
      text-transform: uppercase; 
      letter-spacing: 0.1em; 
      transition: all 0.3s ease; 
    }
    .btn-primary:hover { background: var(--accent-blue); transform: translateY(-2px); }

    /* --- ERP DATA TABLE DESIGN --- */
    .erp-table th { 
      background: #fafbfd; 
      text-transform: uppercase; 
      font-size: 10px; 
      letter-spacing: 0.15em; 
      padding: 1.5rem 2.5rem; 
      color: #94a3b8; 
      font-weight: 700; 
      border-bottom: 1px solid #f1f5f9; 
    }
    .erp-table td { padding: 1.8rem 2.5rem; border-bottom: 1px solid #f8fafc; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="text-slate-900 font-bold text-3xl mb-16 tracking-tighter">T<span class="text-blue-500">.</span></div>
    <nav>
      <a href="index.html" class="nav-icon active">👥</a>
      <a href="tables.html" class="nav-icon">📅</a>
      <a href="classes.html" class="nav-icon">🏫</a>
      <a href="teachers.html" class="nav-icon">👨‍🏫</a>
    </nav>
    <div class="mt-auto mb-10 text-slate-300 hover:text-red-500 cursor-pointer" onclick="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </aside>

  <main class="main-content">
    <header class="mb-16">
      <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">Class <span class="text-slate-400 font-light">Online Academy</span></h1>
    </header>

    <section class="titan-card p-8 mb-10 border-l-4 border-l-blue-500">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
            <input id="sName" type="text" placeholder="Full Legal Name" class="titan-input">
            <select id="sLevel" class="titan-input">
                <option>Prep 1</option><option>Prep 2</option><option>Prep 3</option>
                <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option>
                <option>Primary 4</option><option>Primary 5</option><option>Primary 6</option>
            </select>
            <select id="sClass" class="titan-input">
                <option>Group A</option><option>Group B</option><option>Group C</option>
            </select>
            <select id="sLang" class="titan-input">
                <option>English</option><option>Arabic</option><option>German</option>
            </select>
            <button id="enrollBtn" onclick="enrollStudent()" class="btn-primary">Enroll Student</button>
        </div>
    </section>

    <div class="titan-card overflow-hidden">
        <table class="w-full text-left erp-table">
            <thead>
                <tr>
                    <th class="w-1/3">Student</th>
                    <th>Level</th>
                    <th>Class / Track</th>
                    <th class="text-right">Action</th>
                </tr>
            </thead>
            <tbody id="studentBody"></tbody>
        </table>
    </div>

    <footer class="mt-10 flex items-center justify-between">
        <div class="bg-white px-6 py-4 rounded-2xl border border-slate-100">
            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Total Enrollment</p>
            <p id="totalCount" class="text-xl font-bold text-slate-900">00</p>
        </div>
    </footer>
  </main>

  <script>
    const API = "/api/students";
    
    /**
     * AUTHENTICATION SYNC:
     * Grabs the 'user' ID from localStorage to ensure we only load data 
     * belonging to the logged-in administrator.
     */
    let user = localStorage.getItem("user"); 

    window.onload = () => { 
        if (!user) {
            // If no user identity is found, kick back to login screen.
            window.location.href = "login.html"; 
        } else {
            loadData(); 
        }
    };

    /**
     * LOAD DATA: Fetches the student registry from Titan Cloud.
     * Note: ?admin=${user} is critical for data separation.
     */
    async function loadData() {
        const tbody = document.getElementById("studentBody");
        tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center italic text-slate-300">Syncing Titan Cloud...</td></tr>`;
        
        try {
            // Call the GET route in your student.js API
            const res = await fetch(`${API}?admin=${user}`);
            const data = await res.json();
            
            tbody.innerHTML = "";
            document.getElementById('totalCount').innerText = data.length.toString().padStart(2, '0');
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium">No students found in your registry.</td></tr>`;
                return;
            }

            // Populate the table with dynamic rows
            data.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td class="text-sm font-bold text-slate-800">${s.name}</td>
                        <td class="text-xs font-bold text-slate-700">${s.level}</td>
                        <td class="text-[9px] font-bold text-blue-400 uppercase">${s.className} | ${s.language}</td>
                        <td class="text-right">
                            <button onclick="deleteStudent('${s._id}')" class="text-red-400 hover:text-red-600 font-bold">✕</button>
                        </td>
                    </tr>`;
            });
        } catch (e) { 
            tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-red-400">Sync Error: Server Unreachable</td></tr>`;
        }
    }

    /**
     * ENROLL STUDENT: Sends a POST request to create a new student entry.
     * It includes the 'owner' field so the student is linked to YOUR account.
     */
    async function enrollStudent() {
        const btn = document.getElementById("enrollBtn");
        const name = document.getElementById("sName").value;
        const level = document.getElementById("sLevel").value;
        const className = document.getElementById("sClass").value;
        const language = document.getElementById("sLang").value;

        if(!name) return alert("Enter Student Name");
        btn.innerText = "SAVING...";

        try {
            const res = await fetch(API, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                // We send 'owner' and 'admin' as the current logged-in user identity.
                body: JSON.stringify({ name, level, className, language, owner: user, admin: user }) 
            });

            if (res.ok) {
                document.getElementById("sName").value = "";
                btn.innerText = "SUCCESS ✓";
                // Delay reload slightly so the user sees the success state.
                setTimeout(() => { btn.innerText = "Enroll Student"; loadData(); }, 1500);
            } else {
                alert("Server rejected the entry.");
                btn.innerText = "Enroll Student";
            }
        } catch (e) { btn.innerText = "Enroll Student"; }
    }

    /**
     * TERMINATE ENTRY: Permanently removes a student record using their unique MongoDB ID.
     */
    async function deleteStudent(id) { 
        if(confirm("Delete this student permanently?")) { 
            await fetch(`${API}/${id}?admin=${user}`, { method: "DELETE" }); 
            loadData(); 
        } 
    }

    // Logout Function: Clears session and redirects to security gate.
    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
