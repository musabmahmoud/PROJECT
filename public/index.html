<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Student Registry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root { 
      --titan-blue: #1e293b; /* Deep Navy for Luxury */
      --accent-blue: #3b82f6;
      --titan-slate: #fcfdfe; 
      --sidebar-width: 100px;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #334155; 
      margin: 0;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    /* --- REFINED SIDEBAR --- */
    .sidebar { 
      width: var(--sidebar-width); 
      height: 100vh; 
      position: fixed; 
      left: 0; 
      top: 0; 
      background: white; 
      border-right: 1px solid #f1f5f9; 
      z-index: 100; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding-top: 2.5rem;
    }

    .nav-icon { 
      width: 54px; 
      height: 54px; 
      margin-bottom: 1.5rem; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border-radius: 16px; 
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      font-size: 22px; 
      text-decoration: none;
      color: #94a3b8;
    }

    .nav-icon:hover { 
      background: #f8fafc; 
      color: var(--accent-blue);
    }

    .nav-icon.active { 
      background: #f1f5f9; 
      color: var(--titan-blue); 
      box-shadow: inset 0 0 0 1px #e2e8f0;
    }

    /* --- CONTENT AREA --- */
    .main-content { 
      margin-left: var(--sidebar-width); 
      padding: 4rem 6rem; 
      max-width: 1500px;
    }

    /* --- LUXURY CARDS --- */
    .titan-card { 
      background: white; 
      border-radius: 2rem; 
      border: 1px solid #f1f5f9; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.01);
    }

    .erp-table th { 
      background: #fafbfd; 
      text-transform: uppercase; 
      font-size: 10px; 
      letter-spacing: 0.15em; 
      padding: 1.5rem 2.5rem; 
      color: #94a3b8; 
      font-weight: 700; 
      border-bottom: 1px solid #f1f5f9;
    }

    .erp-table td { 
      padding: 1.8rem 2.5rem; 
      border-bottom: 1px solid #f8fafc; 
      vertical-align: middle;
    }

    /* --- REFINED INPUTS --- */
    .titan-input {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      font-weight: 500;
      font-size: 13px;
      outline: none;
      width: 100%;
      transition: all 0.2s ease;
      color: #1e293b;
    }

    .titan-input:focus {
      border-color: var(--accent-blue);
      background: white;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05);
    }

    .btn-primary {
      background: var(--titan-blue);
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 1rem;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: #000;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }
  </style>
</head>
<body>

  <aside class="sidebar no-print">
    <div class="text-slate-900 font-bold text-3xl mb-16 tracking-tighter">T<span class="text-blue-500">.</span></div>
    
    <nav>
      <a href="index.html" class="nav-icon active" title="Registry">👥</a>
      <a href="tables.html" class="nav-icon" title="Schedules">📅</a>
      <a href="classes.html" class="nav-icon" title="Attendance">🏫</a>
      <a href="teachers.html" class="nav-icon" title="Faculty">👨‍🏫</a>
    </nav>
    
    <div class="mt-auto mb-10 text-slate-300 hover:text-red-500 cursor-pointer transition-colors" onclick="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </aside>

  <main class="main-content">
    
    <header class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
      <div>
        <div class="flex items-center gap-2 mb-3">
            <span class="status-dot bg-emerald-500"></span>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Institutional Database</p>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">
          Student <span class="text-slate-400 font-light">Registry</span>
        </h1>
      </div>
      
      <div class="no-print flex items-center gap-4 bg-white px-5 py-3 rounded-2xl border border-slate-100 shadow-sm">
        <span class="text-slate-300">🔍</span>
        <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Search Student Records..." 
               class="bg-transparent outline-none font-medium text-sm w-64 text-slate-600">
      </div>
    </header>

    <section class="titan-card p-8 mb-10 border-l-4 border-l-blue-500">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-[11px] font-bold uppercase tracking-widest text-slate-400">Enroll New Student</h3>
            <span class="text-[10px] text-slate-300 font-medium">Academic Year 2025/26</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-4">
            <input id="newStudentName" type="text" placeholder="Legal Full Name" class="titan-input">
            
            <select id="newStudentLevel" class="titan-input">
                <optgroup label="Primary Stage">
                    <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option>
                    <option>Primary 4</option><option>Primary 5</option><option>Primary 6</option>
                </optgroup>
                <optgroup label="Preparatory Stage">
                    <option>Prep 1</option><option>Prep 2</option><option>Prep 3</option>
                </optgroup>
            </select>

            <select id="newStudentClass" class="titan-input">
                <option>Group A</option><option>Group B</option><option>Group C</option>
            </select>

            <select id="newStudentLang" class="titan-input">
                <option>English Track</option><option>Arabic Track</option><option>German Track</option>
            </select>

            <button onclick="addNewStudent()" class="btn-primary">
                Confirm Enrollment
            </button>
        </div>
    </section>

    <div class="titan-card overflow-hidden">
        <table class="w-full text-left erp-table">
            <thead>
                <tr>
                    <th class="w-1/3">Student Details</th>
                    <th>Academic Level</th>
                    <th class="no-print">Quick Action</th>
                    <th class="text-right">Management</th>
                </tr>
            </thead>
            <tbody id="studentsTable">
                </tbody>
        </table>
    </div>

    <footer class="mt-10 flex items-center justify-between no-print">
        <div class="flex gap-6">
            <div class="bg-white px-6 py-4 rounded-2xl border border-slate-100">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-tighter">Total Enrollment</p>
                <p id="totalCount" class="text-xl font-bold text-slate-900">00</p>
            </div>
            <div class="bg-white px-6 py-4 rounded-2xl border border-slate-100">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-tighter">Server Latency</p>
                <p class="text-xl font-bold text-blue-500">24ms</p>
            </div>
        </div>
        <p class="text-[10px] text-slate-300 font-medium italic">Titan Cloud Systems v4.2.0</p>
    </footer>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => { 
        if (!user) window.location.href = "login.html"; 
        loadData(); 
    };

    async function loadData() {
        const tbody = document.getElementById("studentsTable");
        tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center font-medium text-slate-300 italic">Synchronizing Records...</td></tr>`;

        try {
            const res = await fetch(`${API}?admin=${user}`);
            const data = await res.json();
            tbody.innerHTML = "";
            document.getElementById('totalCount').innerText = data.length.toString().padStart(2, '0');

            data.forEach(s => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td>
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-500 text-sm">${s.name.charAt(0)}</div>
                                <div>
                                    <p class="text-sm font-bold text-slate-800 mb-0.5">${s.name}</p>
                                    <p class="text-[10px] font-medium text-slate-400">UID: ${s._id.slice(-8).toUpperCase()}</p>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="flex flex-col gap-1">
                                <span class="text-[11px] font-bold text-slate-700">${s.level}</span>
                                <span class="text-[9px] font-bold text-blue-400 uppercase tracking-tighter">${s.language} | ${s.className}</span>
                            </div>
                        </td>
                        <td class="no-print">
                            <button onclick="window.location.href='classes.html'" class="text-[10px] font-bold text-slate-400 hover:text-blue-500 transition-colors">Mark Attendance →</button>
                        </td>
                        <td>
                            <div class="flex justify-end gap-2">
                                <button onclick="window.location.href='tables.html?id=${s._id}'" class="h-9 px-4 bg-white border border-slate-200 rounded-lg text-[10px] font-bold uppercase hover:bg-slate-50 transition-all">Profile</button>
                                <button onclick="deleteStudent('${s._id}')" class="h-9 w-9 flex items-center justify-center bg-red-50 text-red-400 rounded-lg hover:bg-red-500 hover:text-white transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });
        } catch (e) { 
            tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-red-400 text-xs font-bold">UNABLE TO LINK TO DATABASE.</td></tr>`; 
        }
    }

    async function addNewStudent() {
        const name = document.getElementById("newStudentName").value;
        const level = document.getElementById("newStudentLevel").value;
        const className = document.getElementById("newStudentClass").value;
        const language = document.getElementById("newStudentLang").value;
        if(!name) return;
        
        await fetch(API, { 
            method: "POST", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify({ name, level, className, language, owner: user }) 
        });
        document.getElementById("newStudentName").value = "";
        loadData();
    }

    async function deleteStudent(id) { 
        if(confirm("Permanently archive student record?")) { 
            await fetch(`${API}/${id}?admin=${user}`, { method: "DELETE" }); 
            loadData(); 
        } 
    }
    
    function searchStudents() { 
        const q = document.getElementById("searchInput").value.toLowerCase(); 
        document.querySelectorAll("#studentsTable tr").forEach(row => { 
            row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none"; 
        }); 
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
