<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Pro Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .modal-active { display: flex !important; }
    .scale-95 { transform: scale(0.95); }
    .scale-100 { transform: scale(1); }
  </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 gap-4">
      <div>
        <h1 class="text-2xl font-black text-gray-900">Student Pro</h1>
        <div class="flex gap-4 mt-1">
           <span id="userDisplay" class="text-blue-600 font-bold text-sm">Admin</span>
           <a href="summary.html" class="text-purple-600 font-bold text-sm hover:underline">View Summary →</a>
        </div>
      </div>

      <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-xl border border-gray-100">
        <span class="text-sm font-bold text-gray-400 px-2 uppercase">Month:</span>
        <select id="dashMonth" onchange="loadData()" class="bg-white border-none font-bold text-gray-700 rounded-lg p-1 outline-none shadow-sm">
          <option value="2026-01">Jan 2026</option>
          <option value="2026-02">Feb 2026</option>
          <option value="2026-03" selected>Mar 2026</option>
          <option value="2026-04">Apr 2026</option>
        </select>
      </div>

      <button onclick="logout()" class="bg-red-500 text-white px-5 py-2 rounded-xl font-bold shadow-md hover:bg-red-600 transition">Logout</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Revenue</h2>
        <p id="totalRevenue" class="text-3xl font-black text-gray-800 mt-1">0 EGP</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Presents / Absences</h2>
        <p id="totalAttendanceDisplay" class="text-3xl font-black text-gray-800 mt-1">0 / 0</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-purple-500">
        <h2 class="text-xs font-bold text-gray-400 uppercase">Students</h2>
        <p id="totalStudentsCount" class="text-3xl font-black text-gray-800 mt-1">0</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-8">
      <div class="lg:col-span-2 relative">
        <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Search names..." 
               class="w-full p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
      <div class="bg-white p-2 rounded-2xl shadow-sm flex gap-2 border border-gray-100 lg:col-span-2">
        <input id="newStudentName" type="text" placeholder="Full Name" class="flex-1 p-2 bg-gray-50 rounded-lg outline-none" />
        <select id="newStudentLevel" class="bg-gray-100 p-2 rounded-lg font-bold text-gray-700">
          <optgroup label="Preparatory">
            <option value="Prep 1">Prep 1</option>
            <option value="Prep 2">Prep 2</option>
            <option value="Prep 3">Prep 3</option>
          </optgroup>
          <optgroup label="Secondary">
            <option value="Sec 1">Sec 1</option>
            <option value="Sec 2" selected>Sec 2</option>
            <option value="Sec 3">Sec 3</option>
          </optgroup>
        </select>
        <button onclick="addNewStudent()" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg">+</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 mb-8">
      <table class="min-w-full">
        <thead class="bg-gray-50 border-b text-left text-gray-500 text-xs font-bold uppercase">
          <tr>
            <th class="py-4 px-6">Name</th>
            <th class="py-4 px-6">Level</th>
            <th class="py-4 px-6">Payments</th>
            <th class="py-4 px-6">Attendance</th>
            <th class="py-4 px-6 text-purple-600">Grade</th> 
            <th class="py-4 px-6 text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTable" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
  </div>

  <div id="paymentModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
      <h3 class="text-2xl font-black mb-2">Add Payment</h3>
      <input type="hidden" id="payId">
      <input type="number" id="payAmt" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl mb-6 text-2xl font-black text-blue-600 outline-none" placeholder="0">
      <div class="flex gap-3">
        <button onclick="closeModal('paymentModal')" class="flex-1 py-4 font-bold text-gray-400 hover:bg-gray-50 rounded-2xl">Cancel</button>
        <button onclick="submitPay()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg">Confirm</button>
      </div>
    </div>
  </div>

  <div id="gradeModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div id="gradeBox" class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl scale-95 transition-all">
      <h3 class="text-2xl font-black mb-1">Update Grade</h3>
      <p id="gradeStudentName" class="text-gray-400 font-bold text-xs mb-6 uppercase tracking-widest"></p>
      <input type="hidden" id="gradeId">
      <input type="number" id="gradeInput" class="w-full p-5 bg-gray-50 border-2 border-gray-100 rounded-2xl text-3xl font-black text-purple-600 outline-none mb-8" placeholder="0">
      <div class="flex gap-3">
        <button onclick="closeGradeModal()" class="flex-1 py-4 font-bold text-gray-400 hover:bg-gray-50 rounded-2xl">Cancel</button>
        <button onclick="submitGrade()" class="flex-1 py-4 bg-purple-600 text-white rounded-2xl font-black shadow-lg">Save</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div id="deleteBox" class="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl scale-95 transition-all">
        <h2 class="text-2xl font-black text-center mb-8">Delete Student?</h2>
        <div class="flex gap-3">
            <button onclick="closeDeleteModal()" class="flex-1 py-4 rounded-2xl font-bold text-gray-400">Cancel</button>
            <button onclick="executeDelete()" class="flex-1 py-4 rounded-2xl font-black text-white bg-red-500">Delete</button>
        </div>
    </div>
  </div>

<script>
// Use the same API path as your working index.html
const API = "/api/students";
let allStudentsData = []; 

window.onload = loadSummary;

async function loadSummary() {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    
    // MATCHING DASHBOARD LOGIC: Format is YYYY-MM (e.g., 2026-03)
    const targetMonth = `${year}-${month}`;
    const container = document.getElementById("summaryContainer");
    
    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">Syncing ${targetMonth} Insights...</div>`;

    try {
        // We fetch data for the specific month just like index.html does
        const res = await fetch(`${API}?month=${targetMonth}`);
        if (!res.ok) throw new Error("Server Error");
        
        allStudentsData = await res.json();
        container.innerHTML = "";

        // Group students by their Level (Prep 1, Sec 2, etc.)
        const groups = {};
        allStudentsData.forEach(s => {
            if (!groups[s.level]) groups[s.level] = [];
            groups[s.level].push(s);
        });

        const levels = Object.keys(groups).sort();
        
        if (levels.length === 0) {
            container.innerHTML = `<p class="col-span-full text-center py-10 text-gray-500 font-bold">No data found for ${targetMonth}</p>`;
            return;
        }

        levels.forEach(level => {
            const group = groups[level];
            
            // Calculate Stats for the group
            let totalRev = 0, totalP = 0, totalA = 0, totalG = 0, countG = 0;
            
            group.forEach(s => {
                totalRev += (Number(s.payments) || 0);
                totalP += (Number(s.attendance) || 0);
                totalA += (Number(s.absences) || 0);
                if (s.grade > 0) {
                    totalG += Number(s.grade);
                    countG++;
                }
            });

            const avgGrade = countG > 0 ? (totalG / countG).toFixed(0) : 0;

            container.innerHTML += `
                <div class="glass-card p-8 rounded-[2.5rem] bg-white border border-gray-100 shadow-sm hover:shadow-xl transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-3xl font-black text-gray-900">${level}</h2>
                        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm">${avgGrade}%</div>
                    </div>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between border-b border-gray-50 pb-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Revenue</span>
                            <span class="text-sm font-black text-gray-800">${totalRev.toLocaleString()} EGP</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Attendance</span>
                            <span class="text-sm font-black text-green-600">${totalP}P <span class="text-gray-300">/</span> <span class="text-red-500">${totalA}A</span></span>
                        </div>
                    </div>
                    <button onclick="downloadGradeReport('${level}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">
                        Download ${level} Report
                    </button>
                </div>`;
        });
    } catch (err) {
        container.innerHTML = `<p class="text-red-500 font-bold text-center col-span-full">Failed to load summary. Check server connection.</p>`;
    }
}

// Updated PDF function to use the data we just fetched
function downloadGradeReport(level) {
    const monthName = document.getElementById("monthSelect").options[document.getElementById("monthSelect").selectedIndex].text;
    const year = document.getElementById("yearSelect").value;
    
    const students = allStudentsData.filter(s => s.level === level);
    let rows = "";

    students.forEach(s => {
        rows += `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 12px; font-family: sans-serif;">${s.name}</td>
                <td style="padding: 12px; font-family: sans-serif;">${s.payments || 0} EGP</td>
                <td style="padding: 12px; font-family: sans-serif;">${s.attendance || 0}P / ${s.absences || 0}A</td>
                <td style="padding: 12px; font-family: sans-serif; font-weight: bold; color: #2563eb;">${s.grade || 0}%</td>
            </tr>`;
    });

    const html = `
        <div style="padding: 40px; font-family: sans-serif;">
            <h1 style="text-align: center;">${level} - ${monthName} ${year}</h1>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <tr style="background: #f8fafc; text-align: left;">
                    <th style="padding: 12px;">Student Name</th><th style="padding: 12px;">Paid</th>
                    <th style="padding: 12px;">Attendance</th><th style="padding: 12px;">Grade</th>
                </tr>
                ${rows}
            </table>
        </div>`;

    html2pdf().from(html).set({ filename: `${level}_${monthName}_${year}.pdf`, margin: 0.5 }).save();
}

// Simple logic for the full report
function downloadYearlyReport() {
    alert("Yearly report requires a separate 'all-year' API call. Monthly reports are ready!");
}
</script>
</body>
</html>
