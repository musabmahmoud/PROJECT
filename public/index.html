<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Pro | Ultimate Management Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // CRITICAL: TAILWIND DARK MODE INJECTOR
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
              500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
            },
            dark: {
              bg: '#020617',
              card: '#0f172a',
              border: '#1e2937',
              text: '#f8fafc'
            }
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '3rem',
          }
        }
      }
    }

    // THEME BOOT LOADER (STOPS THE WHITE FLASH)
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();

    // AUTHENTICATION GUARD
    if (!localStorage.getItem("user")) { window.location.href = "login.html"; }
  </script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    
    body { 
        font-family: 'Inter', sans-serif; 
        transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* GLOBAL DARK MODE OVERRIDES */
    .dark body { background-color: #020617 !important; color: #f8fafc; }
    
    /* GLASS MORPHISM EFFECTS */
    .glass-effect {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
    }

    /* CUSTOM ANIMATIONS */
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up { animation: slideUp 0.5s ease forwards; }

    /* TABLE HOVER STATES */
    .table-row-hover { transition: all 0.2s ease; }
    .table-row-hover:hover { transform: scale(1.005); z-index: 10; }

    /* CUSTOM SCROLLBAR */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { 
        background: #cbd5e1; 
        border-radius: 10px; 
    }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
  </style>
</head>

<body class="bg-[#F8FAFC] dark:bg-dark-bg min-h-screen text-slate-900 dark:text-slate-100 selection:bg-blue-100 dark:selection:bg-blue-900">
  
  <div class="max-w-[1400px] mx-auto p-4 md:p-10 lg:p-14">
    
    <header class="flex flex-col lg:flex-row justify-between items-center mb-16 gap-8 animate-slide-up">
      <div class="space-y-2 text-center lg:text-left">
        <h1 class="text-6xl font-[900] tracking-tighter italic group cursor-default">
          Student <span class="text-blue-600 group-hover:text-blue-500 transition-colors">Pro</span>
        </h1>
        <div class="flex items-center justify-center lg:justify-start gap-4">
            <span id="statusIndicator" class="flex h-3 w-3 rounded-full bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.5)]"></span>
            <p id="userDisplay" class="text-[11px] font-[800] text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em]">Initializing Core...</p>
        </div>
      </div>

      <div class="flex flex-wrap items-center justify-center gap-6 bg-white dark:bg-dark-card p-4 rounded-[2.5rem] shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-dark-border">
        <button onclick="toggleDarkMode()" class="p-5 rounded-3xl bg-slate-50 dark:bg-slate-800 text-slate-600 dark:text-yellow-400 border border-slate-200 dark:border-slate-700 hover:rotate-12 transition-all active:scale-90">
          <span id="darkIcon" class="text-2xl">🌙</span>
        </button>

        <div class="h-10 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>

        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-12 py-5 rounded-[1.8rem] font-[900] text-xs uppercase tracking-[0.2em] shadow-lg shadow-red-200 dark:shadow-none transition-all active:scale-95">
          Exit System
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-16">
      <div class="bg-white dark:bg-dark-card p-12 rounded-[4rem] border-b-[10px] border-blue-600 shadow-sm animate-slide-up [animation-delay:100ms]">
        <h3 class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.3em] mb-6">Gross Monthly Revenue</h3>
        <div class="flex items-baseline gap-3">
            <span id="totalRevenue" class="text-6xl font-[900] tracking-tighter">0</span>
            <span class="text-xl font-bold text-blue-600/40 uppercase">EGP</span>
        </div>
      </div>
      
      <div class="bg-white dark:bg-dark-card p-12 rounded-[4rem] border-b-[10px] border-emerald-500 shadow-sm animate-slide-up [animation-delay:200ms]">
        <h3 class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.3em] mb-6">Attendance Delta</h3>
        <div class="flex items-center gap-6">
            <p id="totalAttendanceDisplay" class="text-6xl font-[900] tracking-tighter">0 / 0</p>
            <div class="flex flex-col text-[10px] font-black uppercase opacity-40">
                <span>Pres.</span>
                <span>Abs.</span>
            </div>
        </div>
      </div>

      <div class="bg-white dark:bg-dark-card p-12 rounded-[4rem] border-b-[10px] border-purple-600 shadow-sm animate-slide-up [animation-delay:300ms]">
        <h3 class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.3em] mb-6">Total Enrolled</h3>
        <div class="flex items-baseline gap-3">
            <span id="totalStudentsCount" class="text-6xl font-[900] tracking-tighter">0</span>
            <span class="text-xl font-bold text-purple-600/40 uppercase">Units</span>
        </div>
      </div>
    </div>

    <div class="flex flex-col xl:flex-row gap-8 mb-16 animate-slide-up [animation-delay:400ms]">
      <div class="flex-1 relative group">
        <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Filter global database..." 
               class="w-full bg-white dark:bg-dark-card p-10 pl-20 rounded-[3rem] border-none shadow-sm focus:ring-4 focus:ring-blue-500/10 outline-none text-xl font-bold transition-all dark:text-white placeholder:text-slate-300">
        <span class="absolute left-8 top-1/2 -translate-y-1/2 text-3xl opacity-20 group-focus-within:opacity-100 transition-opacity">🔍</span>
      </div>

      <div class="bg-white dark:bg-dark-card p-4 rounded-[3rem] shadow-sm flex flex-col md:flex-row gap-4 border border-slate-50 dark:border-dark-border">
        <input id="newStudentName" type="text" placeholder="Full Student Name" class="flex-1 bg-slate-50 dark:bg-slate-800 px-10 py-6 rounded-3xl outline-none font-bold text-lg dark:text-white focus:bg-white dark:focus:bg-slate-700 transition-all">
        <select id="newStudentLevel" class="bg-slate-50 dark:bg-slate-800 px-8 py-6 rounded-3xl font-black text-slate-600 dark:text-slate-300 outline-none cursor-pointer hover:bg-slate-100 transition-all">
            <option value="Prep 1">Prep 1</option>
            <option value="Prep 2">Prep 2</option>
            <option value="Prep 3">Prep 3</option>
            <option value="Sec 1">Sec 1</option>
            <option value="Sec 2" selected>Sec 2</option>
            <option value="Sec 3">Sec 3</option>
        </select>
        <button onclick="addNewStudent()" class="bg-blue-600 hover:bg-blue-700 text-white px-14 py-6 rounded-3xl font-[900] text-3xl transition-all active:scale-90 shadow-xl shadow-blue-200 dark:shadow-none">+</button>
      </div>
    </div>

    <div class="bg-white dark:bg-dark-card rounded-[5rem] shadow-sm border border-slate-50 dark:border-dark-border overflow-hidden mb-32 animate-slide-up [animation-delay:500ms]">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50/50 dark:bg-slate-800/30 text-[11px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em]">
              <th class="p-12">Academic Identity</th>
              <th class="p-12">Finance (EGP)</th>
              <th class="p-12 text-center">Status Matrix</th>
              <th class="p-12 text-right">Operational Controls</th>
            </tr>
          </thead>
          <tbody id="studentsTable" class="divide-y divide-slate-50 dark:divide-slate-800/50">
            </tbody>
        </table>
      </div>
    </div>

  </div>

  <div id="paymentModal" class="hidden fixed inset-0 bg-slate-900/60 dark:bg-black/90 backdrop-blur-2xl flex items-center justify-center z-[100] p-6">
    <div class="bg-white dark:bg-dark-card w-full max-w-2xl rounded-[5rem] p-16 shadow-2xl border dark:border-dark-border transform transition-all">
      <div class="text-center mb-12">
        <h3 class="text-4xl font-[900] tracking-tighter mb-4">Financial Entry</h3>
        <p class="text-[10px] font-black text-blue-600 uppercase tracking-[0.4em]">Update Transaction Ledger</p>
      </div>
      <input type="hidden" id="payId">
      <div class="relative mb-12">
        <span class="absolute left-10 top-1/2 -translate-y-1/2 font-black text-slate-300 text-2xl">EGP</span>
        <input type="number" id="payAmt" class="w-full bg-slate-50 dark:bg-slate-800 p-12 pl-28 rounded-[3rem] text-6xl font-[900] text-blue-600 outline-none focus:ring-8 focus:ring-blue-500/10 transition-all">
      </div>
      <div class="flex gap-6">
        <button onclick="closeModal('paymentModal')" class="flex-1 py-8 font-black text-slate-400 uppercase tracking-widest text-xs hover:text-slate-600 transition-colors">Discard</button>
        <button onclick="submitPay()" class="flex-1 bg-blue-600 text-white py-8 rounded-[2rem] font-[900] text-sm uppercase tracking-widest shadow-2xl shadow-blue-200 dark:shadow-none hover:bg-blue-700 transition-all active:scale-95">Verify & Post</button>
      </div>
    </div>
  </div>

  <div id="gradeModal" class="hidden fixed inset-0 bg-slate-900/60 dark:bg-black/90 backdrop-blur-2xl flex items-center justify-center z-[100] p-6">
    <div class="bg-white dark:bg-dark-card w-full max-w-2xl rounded-[5rem] p-16 shadow-2xl border dark:border-dark-border transform transition-all">
      <div class="text-center mb-12">
        <h3 class="text-4xl font-[900] tracking-tighter mb-4">Academic Assessment</h3>
        <p id="gradeStudentName" class="text-[10px] font-black text-purple-600 uppercase tracking-[0.4em]">Assign Performance Score</p>
      </div>
      <input type="hidden" id="gradeId">
      <div class="relative mb-12">
        <span class="absolute right-10 top-1/2 -translate-y-1/2 font-black text-slate-300 text-4xl">%</span>
        <input type="number" id="gradeInput" class="w-full bg-slate-50 dark:bg-slate-800 p-12 pr-28 rounded-[3rem] text-6xl font-[900] text-purple-600 outline-none focus:ring-8 focus:ring-purple-500/10 transition-all">
      </div>
      <div class="flex gap-6">
        <button onclick="closeModal('gradeModal')" class="flex-1 py-8 font-black text-slate-400 uppercase tracking-widest text-xs">Discard</button>
        <button onclick="submitGrade()" class="flex-1 bg-purple-600 text-white py-8 rounded-[2rem] font-[900] text-sm uppercase tracking-widest shadow-2xl shadow-purple-200 dark:shadow-none hover:bg-purple-700 transition-all active:scale-95">Log Grade</button>
      </div>
    </div>
  </div>

<script>
// --- CORE CONFIGURATION ---
const API = "/api/students";
const currentUser = localStorage.getItem("user");

// --- THEME ENGINE ---
function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    updateThemeUI(isDark);
}

function updateThemeUI(isDark) {
    const icon = document.getElementById("darkIcon");
    if (icon) icon.innerText = isDark ? "☀️" : "🌙";
    document.body.className = isDark 
        ? "bg-dark-bg min-h-screen text-slate-100 selection:bg-blue-900" 
        : "bg-[#F8FAFC] min-h-screen text-slate-900 selection:bg-blue-100";
}

// --- BOOTSTRAP ---
window.onload = () => {
    const isDark = document.documentElement.classList.contains('dark');
    updateThemeUI(isDark);
    document.getElementById("userDisplay").innerText = `Command Center: ${currentUser || 'Admin'}`;
    loadData();
};

// --- DATA LOGIC ---
async function loadData() {
    const tbody = document.getElementById("studentsTable");
    tbody.innerHTML = `<tr><td colspan="4" class="p-40 text-center"><div class="inline-block w-16 h-16 border-8 border-blue-600 border-t-transparent rounded-full animate-spin mb-8"></div><p class="text-[11px] font-black text-slate-300 uppercase tracking-[0.5em]">Synchronizing Records...</p></td></tr>`;

    try {
        const res = await fetch(`${API}?admin=${currentUser}`);
        const students = await res.json();
        tbody.innerHTML = "";

        if(students.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-32 text-center text-slate-300 font-black uppercase tracking-widest">No active units in database.</td></tr>`;
            updateStats();
            return;
        }

        students.forEach(s => {
            tbody.innerHTML += `
                <tr class="table-row-hover group border-b border-slate-50 dark:border-slate-800/50">
                    <td class="p-12">
                        <div class="text-2xl font-[900] tracking-tight text-slate-900 dark:text-white group-hover:text-blue-600 transition-colors">${s.name}</div>
                        <div class="flex items-center gap-3 mt-2">
                            <span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-lg text-[9px] font-black uppercase tracking-tighter text-slate-500">${s.level || 'Sec 2'}</span>
                            <span class="text-[9px] font-bold text-slate-300 dark:text-slate-600 uppercase tracking-widest">ID: ${s._id.slice(-6)}</span>
                        </div>
                    </td>
                    <td class="p-12">
                        <div class="text-3xl font-[900] text-blue-600">${s.payments || 0}</div>
                        <div class="text-[9px] font-black text-slate-300 uppercase tracking-[0.2em] mt-1">Confirmed Balance</div>
                    </td>
                    <td class="p-12">
                        <div class="flex items-center justify-center gap-8">
                           <div class="text-center">
                               <p class="text-2xl font-[900] text-emerald-500">${s.attendance || 0}</p>
                               <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1">Present</p>
                           </div>
                           <div class="w-[1px] h-10 bg-slate-100 dark:bg-slate-800"></div>
                           <div class="text-center">
                               <p class="text-2xl font-[900] text-orange-500">${s.absences || 0}</p>
                               <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1">Absent</p>
                           </div>
                        </div>
                    </td>
                    <td class="p-12">
                        <div class="flex justify-end items-center gap-3">
                            <button onclick="markAttendance('${s._id}', 'present')" title="Present" class="w-14 h-14 rounded-2xl bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 font-black text-xl hover:bg-emerald-600 hover:text-white transition-all active:scale-90">P</button>
                            <button onclick="markAttendance('${s._id}', 'absent')" title="Absent" class="w-14 h-14 rounded-2xl bg-orange-50 dark:bg-orange-900/20 text-orange-600 font-black text-xl hover:bg-orange-600 hover:text-white transition-all active:scale-90">A</button>
                            <button onclick="openGradeModal('${s._id}', '${s.name}', ${s.grade || 0})" title="Grades" class="w-14 h-14 rounded-2xl bg-purple-50 dark:bg-purple-900/20 text-purple-600 font-black text-xl hover:bg-purple-600 hover:text-white transition-all active:scale-90">G</button>
                            <button onclick="openPayModal('${s._id}', ${s.payments || 0})" class="px-10 h-14 rounded-2xl bg-blue-600 text-white font-[900] text-xs uppercase tracking-widest hover:bg-blue-700 shadow-xl shadow-blue-100 dark:shadow-none transition-all active:scale-95">Post Pay</button>
                        </div>
                    </td>
                </tr>`;
        });
        updateStats();
    } catch (e) { 
        console.error("CRITICAL SYNC ERROR:", e);
        tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-red-500 font-black">DATABASE CONNECTION FAILED.</td></tr>`;
    }
}

// --- OPERATIONS ---
async function addNewStudent() {
    const name = document.getElementById("newStudentName");
    const level = document.getElementById("newStudentLevel").value;
    if(!name.value.trim()) return;
    
    await fetch(API, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name.value.trim(), level, owner: currentUser })
    });
    name.value = "";
    loadData();
}

async function markAttendance(id, type) {
    await fetch(`${API}/${id}/attendance/${type}`, { 
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ admin: currentUser })
    });
    loadData();
}

// --- ANALYTICS ENGINE ---
function updateStats() {
    let rev = 0, count = 0, att = 0, abs = 0;
    document.querySelectorAll("#studentsTable tr").forEach(row => {
        if(row.cells.length > 1) {
            rev += parseInt(row.cells[1].innerText) || 0;
            const parts = row.cells[2].innerText.match(/\d+/g);
            if(parts) { att += parseInt(parts[0]); abs += parseInt(parts[1]); }
            count++;
        }
    });
    document.getElementById("totalRevenue").innerText = rev.toLocaleString();
    document.getElementById("totalStudentsCount").innerText = count;
    document.getElementById("totalAttendanceDisplay").innerText = `${att} / ${abs}`;
}

// --- MODAL CONTROLS ---
function openPayModal(id, current) {
    document.getElementById("payId").value = id;
    document.getElementById("payAmt").value = current;
    document.getElementById("paymentModal").classList.remove("hidden");
    setTimeout(() => document.getElementById("payAmt").focus(), 100);
}

function openGradeModal(id, name, current) {
    document.getElementById("gradeId").value = id;
    document.getElementById("gradeStudentName").innerText = `Performance Score for ${name}`;
    document.getElementById("gradeInput").value = current;
    document.getElementById("gradeModal").classList.remove("hidden");
    setTimeout(() => document.getElementById("gradeInput").focus(), 100);
}

function closeModal(id) { document.getElementById(id).classList.add("hidden"); }

async function submitPay() {
    const id = document.getElementById("payId").value;
    const val = document.getElementById("payAmt").value;
    await fetch(`${API}/${id}/update-value`, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ field: "payments", value: val, admin: currentUser })
    });
    closeModal('paymentModal'); loadData();
}

async function submitGrade() {
    const id = document.getElementById("gradeId").value;
    const val = document.getElementById("gradeInput").value;
    await fetch(`${API}/${id}/update-value`, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ field: "grade", value: val, admin: currentUser })
    });
    closeModal('gradeModal'); loadData();
}

function searchStudents() {
    let q = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll("#studentsTable tr").forEach(row => {
        if(row.cells.length > 1) row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none";
    });
    updateStats();
}

function logout() { localStorage.clear(); window.location.href="login.html"; }
</script>
</body>
</html>
