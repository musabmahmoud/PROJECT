<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Primary & Prep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #f8fafc; 
      color: #0f172a; 
    }
    .card-shadow { 
      background: white; 
      border: 1px solid #e2e8f0; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); 
    }
    .btn-primary { 
      background-color: #2563eb; 
      color: white; 
      transition: all 0.2s; 
    }
    .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); }
  </style>
</head>
<body class="min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-20 hidden lg:flex flex-col items-center py-10 bg-white border-r border-slate-200 z-50">
    <div class="text-2xl font-black text-blue-600 mb-12 italic">T.</div>
    <div class="space-y-10 flex-1">
      <a href="index.html" class="p-4 bg-blue-600 text-white rounded-2xl block shadow-lg">📊</a>
      <a href="classes.html" class="p-4 text-slate-400 hover:text-blue-600 transition-all block text-xl text-center">🏫</a>
      <a href="teachers.html" class="p-4 text-slate-400 hover:text-blue-600 transition-all block text-xl text-center">👨‍🏫</a>
    </div>
  </aside>

  <main class="lg:ml-20 p-6 md:p-12 max-w-7xl mx-auto">
    
    <header class="flex justify-between items-end mb-10">
      <div>
        <h1 class="text-4xl font-black tracking-tighter italic text-slate-900">Titan <span class="text-blue-600">ERP</span></h1>
        <p class="text-slate-500 font-bold mt-1 uppercase text-[10px] tracking-widest">School Management | <span id="userName" class="text-blue-600">Admin</span></p>
      </div>
      <button onclick="logout()" class="px-6 py-3 bg-slate-100 text-slate-600 rounded-xl font-black text-xs uppercase hover:bg-red-50 hover:text-white transition-all">Logout</button>
    </header>

    <section class="bg-white p-4 rounded-3xl mb-8 border border-slate-200 shadow-sm">
        <div class="grid grid-cols-1 lg:grid-cols-6 gap-3">
            <input id="newStudentName" type="text" placeholder="Student Full Name..." class="lg:col-span-2 bg-slate-50 p-4 rounded-2xl outline-none font-semibold border border-transparent focus:border-blue-500 transition-all">
            
            <select id="newStudentLevel" class="bg-slate-50 p-4 rounded-2xl font-black text-[10px] uppercase outline-none border border-transparent">
                <optgroup label="Primary Stage">
                    <option value="Primary 1">Primary 1</option>
                    <option value="Primary 2">Primary 2</option>
                    <option value="Primary 3">Primary 3</option>
                    <option value="Primary 4">Primary 4</option>
                    <option value="Primary 5">Primary 5</option>
                    <option value="Primary 6">Primary 6</option>
                </optgroup>
                <optgroup label="Preparatory Stage">
                    <option value="Prep 1">Prep 1</option>
                    <option value="Prep 2">Prep 2</option>
                    <option value="Prep 3">Prep 3</option>
                </optgroup>
            </select>

            <select id="newStudentClass" class="bg-slate-50 p-4 rounded-2xl font-black text-[10px] uppercase outline-none border border-transparent">
                <option value="Group A">Group A</option>
                <option value="Group B">Group B</option>
            </select>

            <select id="newStudentLang" class="bg-slate-50 p-4 rounded-2xl font-black text-[10px] uppercase outline-none text-blue-600 border border-transparent">
                <option value="English">English</option>
                <option value="Arabic">Arabic</option>
            </select>

            <button onclick="addNewStudent()" class="btn-primary rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-md active:scale-95">
                Register Student +
            </button>
        </div>
    </section>

    <div class="bg-white rounded-[2rem] overflow-hidden border border-slate-200 shadow-sm">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
            <h3 class="font-black uppercase tracking-widest text-xs text-slate-500">Active Students</h3>
            <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Search..." class="bg-white px-4 py-2 rounded-xl outline-none text-xs border border-slate-200 w-48 focus:ring-2 focus:ring-blue-500/20">
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-white">
                        <th class="p-6">Student Information</th>
                        <th class="p-6">Grade / Group</th>
                        <th class="p-6">Payment Status</th>
                        <th class="p-6 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="studentsTable" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </div>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => {
        if (!user) window.location.href = "login.html";
        document.getElementById("userName").innerText = user;
        loadData();
    };

    async function loadData() {
        const tbody = document.getElementById("studentsTable");
        tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center font-bold text-slate-300 animate-pulse">LOADING DATA...</td></tr>`;

        try {
            const res = await fetch(`${API}?admin=${user}`);
            const data = await res.json();
            tbody.innerHTML = "";

            data.forEach(s => {
                const currentMonth = new Date().toISOString().slice(0, 7);
                const record = s.records?.find(r => r.month === currentMonth) || { payments: 0 };

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition-all">
                        <td class="p-6">
                            <p class="text-lg font-bold text-slate-800 tracking-tight">${s.name}</p>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${s.language || 'English'}</p>
                        </td>
                        <td class="p-6">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black rounded-lg uppercase">${s.level}</span>
                            <span class="ml-2 text-[9px] font-bold text-slate-400 uppercase">${s.className || 'A'}</span>
                        </td>
                        <td class="p-6 text-lg font-black ${record.payments > 0 ? 'text-emerald-600' : 'text-slate-300'}">
                            ${record.payments} <span class="text-[10px]">EGP</span>
                        </td>
                        <td class="p-6 text-right space-x-2">
                            <button onclick="window.location.href='tables.html?id=${s._id}'" class="px-4 py-2 bg-slate-900 text-white rounded-xl font-black text-[9px] uppercase hover:bg-blue-600 transition-all shadow-sm">Details</button>
                            <button onclick="deleteStudent('${s._id}')" class="px-4 py-2 bg-red-50 text-red-600 bg-opacity-10 rounded-xl font-black text-[9px] uppercase hover:bg-red-600 hover:text-white transition-all">Delete</button>
                        </td>
                    </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500 font-black">DATABASE CONNECTION FAILED</td></tr>`;
        }
    }

    async function addNewStudent() {
        const name = document.getElementById("newStudentName").value;
        const level = document.getElementById("newStudentLevel").value;
        const className = document.getElementById("newStudentClass").value;
        const language = document.getElementById("newStudentLang").value;
        if(!name) return;

        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, level, className, language, owner: user })
        });
        document.getElementById("newStudentName").value = "";
        loadData();
    }

    async function deleteStudent(id) {
        if(!confirm("Delete student?")) return;
        await fetch(`${API}/${id}?admin=${user}`, { method: "DELETE" });
        loadData();
    }

    function searchStudents() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#studentsTable tr");
        rows.forEach(row => row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none");
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
