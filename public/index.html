<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Global Campus Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // SECURITY GATE: Redirect if not logged in
    if (!localStorage.getItem("user")) { window.location.href = "login.html"; }
    
    // DARK MODE PERSISTENCE
    (function() {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
    
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { darkbg: '#020617', darkcard: '#0f172a', darkborder: '#1e2937' },
          borderRadius: { '4xl': '2rem', '5xl': '3.5rem' }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.4s ease; }
    .dark body { background-color: #020617 !important; color: #f8fafc; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .animate-float { animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
  </style>
</head>

<body class="bg-[#F1F5F9] min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-24 hidden xl:flex flex-col items-center py-10 bg-white dark:bg-darkcard border-r dark:border-darkborder z-50">
    <div class="text-3xl font-[900] text-blue-600 mb-12 animate-float">T.</div>
    <div class="space-y-8 flex-1">
      <a href="index.html" class="p-4 bg-blue-600 text-white rounded-2xl block shadow-lg shadow-blue-200">📊</a>
      <a href="classes.html" class="p-4 text-slate-400 hover:text-blue-600 transition-colors block text-xl">🏫</a>
      <a href="teachers.html" class="p-4 text-slate-400 hover:text-blue-600 transition-colors block text-xl">👨‍🏫</a>
      <a href="summary.html" class="p-4 text-slate-400 hover:text-blue-600 transition-colors block text-xl">📉</a>
    </div>
    <button onclick="toggleTheme()" class="p-4 text-slate-400 text-xl">🌗</button>
  </aside>

  <main class="xl:ml-24 p-6 md:p-12 lg:p-20">
    
    <header class="flex flex-col lg:flex-row justify-between items-end mb-16 gap-8">
      <div>
        <div class="flex items-center gap-3 mb-4">
          <span class="px-4 py-1.5 bg-blue-600 text-white text-[10px] font-black uppercase tracking-[0.3em] rounded-full">Secure Node</span>
          <span id="liveClock" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">00:00:00 AM</span>
        </div>
        <h1 class="text-7xl font-[800] tracking-tighter italic">Titan <span class="text-blue-600">ERP</span></h1>
        <p class="text-slate-500 font-medium mt-2">Authenticated as: <span id="userName" class="text-blue-600 font-black uppercase">Admin</span></p>
      </div>

      <div class="flex gap-4">
        <div class="bg-white dark:bg-darkcard p-5 rounded-3xl border dark:border-darkborder shadow-sm text-right min-w-[150px]">
          <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Database</p>
          <p class="text-emerald-500 font-black flex items-center gap-2 justify-end">SYNCED <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span></p>
        </div>
        <button onclick="logout()" class="bg-slate-900 text-white px-10 py-5 rounded-3xl font-black text-xs uppercase tracking-widest hover:bg-red-600 transition-all">Logout</button>
      </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-4 gap-8 mb-16">
      <div class="xl:col-span-3 bg-white dark:bg-darkcard p-10 rounded-[4rem] shadow-sm border dark:border-darkborder relative overflow-hidden">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h3 class="text-2xl font-black tracking-tight">Revenue Stream</h3>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Academic Year 2025-2026</p>
            </div>
        </div>
        <canvas id="revenueChart" style="max-height: 280px;"></canvas>
      </div>

      <div class="space-y-8">
        <div class="bg-blue-600 p-8 rounded-[3.5rem] text-white shadow-xl shadow-blue-200 dark:shadow-none">
            <p class="text-[10px] font-black uppercase tracking-widest opacity-60">Total Collected</p>
            <h4 id="totalRevenue" class="text-5xl font-[900] mt-2 tracking-tighter">0</h4>
            <p class="text-xs mt-4 font-bold">EGP Total Balance</p>
        </div>
        <div class="bg-white dark:bg-darkcard p-8 rounded-[3.5rem] border dark:border-darkborder">
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Student Count</p>
            <h4 id="totalStudentsCount" class="text-5xl font-[900] mt-2 tracking-tighter text-slate-800 dark:text-white">0</h4>
            <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full mt-6">
                <div class="bg-blue-600 h-2 rounded-full" style="width: 65%"></div>
            </div>
        </div>
      </div>
    </div>

    <div class="bg-white dark:bg-darkcard p-4 rounded-[3.5rem] border dark:border-darkborder shadow-xl mb-16">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-3">
        <input id="newStudentName" type="text" placeholder="Full Name..." class="lg:col-span-2 bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl outline-none font-bold text-lg">
        
        <select id="newStudentLevel" class="bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl font-black text-xs uppercase outline-none">
            <option value="Sec 2" selected>Sec 2</option>
            <option value="Sec 1">Sec 1</option>
            <option value="Prep 3">Prep 3</option>
            <option value="Primary 6">Primary 6</option>
        </select>

        <select id="newStudentClass" class="bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl font-black text-xs uppercase">
            <option value="Class A">Class A</option>
            <option value="Class B">Class B</option>
        </select>

        <select id="newStudentLang" class="bg-slate-50 dark:bg-slate-800 p-6 rounded-3xl font-black text-blue-600 text-xs uppercase">
            <option value="English">English</option>
            <option value="Arabic">Arabic</option>
        </select>

        <button onclick="addNewStudent()" class="bg-blue-600 hover:bg-blue-700 text-white rounded-3xl font-black text-3xl shadow-lg transition-transform active:scale-95">+</button>
      </div>
    </div>

    <div class="bg-white dark:bg-darkcard rounded-[5rem] shadow-sm border dark:border-darkborder overflow-hidden mb-40">
      <div class="p-10 border-b dark:border-darkborder flex justify-between items-center flex-wrap gap-4">
        <div class="relative w-full md:w-1/3">
            <span class="absolute left-6 top-1/2 -translate-y-1/2 opacity-30">🔍</span>
            <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Filter student records..." 
                   class="w-full pl-16 pr-8 py-5 bg-slate-50 dark:bg-slate-800 rounded-3xl outline-none font-bold text-sm focus:ring-4 focus:ring-blue-600/10">
        </div>
        <button onclick="loadData()" class="px-8 py-5 bg-blue-50 text-blue-600 rounded-3xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">Refresh Database</button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-slate-50/50 dark:bg-slate-800/30 text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em]">
              <th class="p-12">Identification</th>
              <th class="p-12">Level</th>
              <th class="p-12">Total Paid</th>
              <th class="p-12 text-center">Department</th>
              <th class="p-12 text-right">Action</th>
            </tr>
          </thead>
          <tbody id="studentsTable" class="divide-y dark:divide-darkborder">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API = "/api/students";
    const currentUser = localStorage.getItem("user");

    window.onload = () => {
        document.getElementById("userName").innerText = currentUser;
        initClock();
        initChart();
        loadData();
    };

    function initClock() {
        setInterval(() => {
            document.getElementById("liveClock").innerText = new Date().toLocaleTimeString();
        }, 1000);
    }

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }

    async function loadData() {
        const tbody = document.getElementById("studentsTable");
        tbody.innerHTML = `<tr><td colspan="5" class="p-40 text-center font-black text-slate-300 animate-pulse">CONNECTING TO TITAN CLOUD...</td></tr>`;

        try {
            const res = await fetch(`${API}?admin=${currentUser}`);
            const data = await res.json();
            tbody.innerHTML = "";
            let revenue = 0;

            data.forEach(s => {
                const currentMonth = new Date().toISOString().slice(0, 7);
                const record = s.records?.find(r => r.month === currentMonth) || { payments: 0 };
                revenue += record.payments;

                tbody.innerHTML += `
                    <tr class="group hover:bg-slate-50/50 dark:hover:bg-slate-800/10 transition-all">
                        <td class="p-12">
                            <p class="text-2xl font-[800] tracking-tight">${s.name}</p>
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1">ID: ${s._id.slice(-6)}</p>
                        </td>
                        <td class="p-12">
                            <span class="px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-[10px] font-black text-slate-600 dark:text-slate-300 uppercase">${s.level}</span>
                        </td>
                        <td class="p-12">
                            <p class="text-2xl font-[900] text-blue-600">${record.payments.toLocaleString()} <span class="text-xs opacity-50">EGP</span></p>
                        </td>
                        <td class="p-12 text-center">
                            <p class="text-[10px] font-black text-blue-500 uppercase">${s.language || 'English'}</p>
                            <p class="text-[9px] font-bold text-slate-300 uppercase">${s.className || 'A'}</p>
                        </td>
                        <td class="p-12 text-right">
                            <button onclick="window.location.href='tables.html?id=${s._id}'" class="p-4 bg-slate-900 dark:bg-blue-600 text-white rounded-2xl font-black text-[9px] uppercase tracking-widest shadow-lg hover:scale-105 active:scale-95 transition-all">Access Hub</button>
                        </td>
                    </tr>`;
            });

            document.getElementById("totalRevenue").innerText = revenue.toLocaleString();
            document.getElementById("totalStudentsCount").innerText = data.length;
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-red-500 font-black">UNABLE TO REACH SERVER. CHECK NETWORK.</td></tr>`;
        }
    }

    async function addNewStudent() {
        const name = document.getElementById("newStudentName").value;
        const level = document.getElementById("newStudentLevel").value;
        const cls = document.getElementById("newStudentClass").value;
        const lang = document.getElementById("newStudentLang").value;

        if (!name) return alert("Name is required");

        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, level, className: cls, language: lang, owner: currentUser })
        });

        document.getElementById("newStudentName").value = "";
        loadData();
    }

    function searchStudents() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const rows = document.querySelectorAll("#studentsTable tr");
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none";
        });
    }

    function initChart() {
        const ctx = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                datasets: [{
                    data: [4500, 8200, 6100, 9500],
                    borderColor: '#2563eb',
                    borderWidth: 6,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(37, 99, 235, 0.05)',
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } } }
            }
        });
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }
  </script>
</body>
</html>
