<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Titan ERP | Student Registry</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">

  <div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6">Student Registry</h1>

    <div class="grid grid-cols-5 gap-4 mb-8">
      <input id="name" type="text" placeholder="Name" class="border p-2 rounded">
      
      <select id="level" class="border p-2 rounded">
        <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option>
        <option>Primary 4</option><option>Primary 5</option><option>Primary 6</option>
        <option>Prep 1</option><option>Prep 2</option><option>Prep 3</option>
      </select>

      <select id="className" class="border p-2 rounded">
        <option>Group A</option><option>Group B</option>
      </select>

      <select id="language" class="border p-2 rounded">
        <option>English Track</option><option>Arabic Track</option><option>German Track</option>
      </select>

      <button onclick="addStudent()" class="bg-blue-600 text-white rounded font-bold">Add Student</button>
    </div>

    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-50">
          <th class="p-3 border">Name</th>
          <th class="p-3 border">Level</th>
          <th class="p-3 border">Class/Lang</th>
          <th class="p-3 border">Actions</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>
  </div>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => {
      if (!user) window.location.href = "login.html";
      loadStudents();
    };

    async function loadStudents() {
      const res = await fetch(`${API}?admin=${user}`);
      const data = await res.json();
      const tbody = document.getElementById("studentTable");
      tbody.innerHTML = "";

      data.forEach(s => {
        tbody.innerHTML += `
          <tr>
            <td class="p-3 border">${s.name}</td>
            <td class="p-3 border">${s.level}</td>
            <td class="p-3 border">${s.className} | ${s.language}</td>
            <td class="p-3 border">
              <button onclick="deleteStudent('${s._id}')" class="text-red-500">Delete</button>
            </td>
          </tr>`;
      });
    }

    async function addStudent() {
      const name = document.getElementById("name").value;
      const level = document.getElementById("level").value;
      const className = document.getElementById("className").value;
      const language = document.getElementById("language").value;

      if (!name) return alert("Enter name");

      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        // Back to the ORIGINAL keys that your server uses
        body: JSON.stringify({ 
          name: name, 
          level: level, 
          className: className, 
          language: language, 
          owner: user 
        })
      });

      if (res.ok) {
        document.getElementById("name").value = "";
        loadStudents();
      } else {
        const err = await res.json();
        alert("Error: " + err.error);
      }
    }

    async function deleteStudent(id) {
      if (confirm("Delete?")) {
        await fetch(`${API}/${id}?admin=${user}`, { method: "DELETE" });
        loadStudents();
      }
    }
  </script>
</body>
</html>
