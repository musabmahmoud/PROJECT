<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan Pro | Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    if (!localStorage.getItem("user")) { window.location.href = "login.html"; }
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { 
            titanBlue: '#2563eb',
            titanDark: '#020617',
            titanGlass: 'rgba(15, 23, 42, 0.7)' 
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #020617; 
      color: #f8fafc;
      background-image: radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
    }
    .glass-panel { 
      background: rgba(15, 23, 42, 0.7); 
      backdrop-filter: blur(16px); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
    }
    .student-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .student-card:hover {
      transform: translateY(-8px);
      border-color: #2563eb;
      box-shadow: 0 20px 40px -20px rgba(37, 99, 235, 0.4);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="min-h-screen pb-20">

  <nav class="sticky top-0 z-50 px-6 py-4 flex justify-between items-center glass-panel border-b border-white/5 mb-10">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl italic">T</div>
      <h1 class="text-xl font-extrabold tracking-tighter">TITAN<span class="text-blue-500">PRO</span></h1>
    </div>
    <div class="flex items-center gap-6">
        <div class="hidden md:block text-right">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Active Operator</p>
            <p id="userName" class="text-xs font-bold text-blue-400 uppercase">Loading...</p>
        </div>
        <button onclick="logout()" class="p-3 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        </button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6">
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="glass-panel p-8 rounded-[2.5rem] relative overflow-hidden">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Campus Population</p>
            <h2 id="totalStudentsCount" class="text-6xl font-black italic">0</h2>
            <div class="absolute -right-4 -bottom-4 opacity-5 text-8xl font-black">STU</div>
        </div>
        <div class="glass-panel p-8 rounded-[2.5rem] border-l-4 border-emerald-500">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Monthly Cashflow</p>
            <h2 id="totalRevenue" class="text-6xl font-black italic text-emerald-500">0</h2>
            <p class="text-xs font-bold mt-2 opacity-50">EGP TOTAL COLLECTED</p>
        </div>
        <div class="glass-panel p-8 rounded-[2.5rem]">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">System Status</p>
            <div class="flex items-center gap-3 text-2xl font-black">
                <span class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></span>
                ONLINE
            </div>
            <p id="liveClock" class="text-xs font-bold mt-4 text-slate-500 tracking-widest">00:00:00 AM</p>
        </div>
    </div>

    <div class="glass-panel p-3 rounded-[3rem] mb-12 flex flex-col lg:flex-row gap-3">
        <input id="newStudentName" type="text" placeholder="Enter Full Student Name..." 
               class="flex-1 bg-white/5 p-6 rounded-[2rem] outline-none font-bold text-lg focus:bg-white/10 transition-all px-10">
        
        <div class="flex gap-2">
            <select id="newStudentLevel" class="bg-white/5 p-6 rounded-[2rem] font-black text-xs uppercase appearance-none px-8">
                <option value="Sec 2">Secondary 2</option>
                <option value="Sec 1">Secondary 1</option>
            </select>

            <button onclick="addNewStudent()" class="bg-blue-600 hover:bg-blue-700 text-white px-12 rounded-[2rem] font-black text-sm uppercase tracking-widest transition-all active:scale-95 flex items-center gap-3">
                ADD ENTRY <span class="text-xl">+</span>
            </button>
        </div>
    </div>

    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <h3 class="text-2xl font-black italic uppercase tracking-tighter text-blue-500">Student Database</h3>
        <div class="relative w-full md:w-96">
            <input type="text" id="searchInput" onkeyup="searchStudents()" placeholder="Search names..." 
                   class="w-full bg-white/5 border border-white/10 pl-12 pr-6 py-4 rounded-2xl outline-none font-bold text-sm focus:border-blue-600">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 opacity-30 text-xl">🔍</span>
        </div>
    </div>

    <div id="studentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => {
        document.getElementById("userName").innerText = user;
        initClock();
        loadData();
    };

    function initClock() {
        setInterval(() => {
            document.getElementById("liveClock").innerText = new Date().toLocaleTimeString();
        }, 1000);
    }

    async function loadData() {
        const grid = document.getElementById("studentGrid");
        grid.innerHTML = `<div class="col-span-full py-40 text-center font-black text-slate-600 animate-pulse text-2xl uppercase tracking-[0.5em]">Syncing Intelligence...</div>`;

        try {
            const res = await fetch(`${API}?admin=${user}`);
            const data = await res.json();
            grid.innerHTML = "";
            let revenue = 0;

            data.forEach(s => {
                const currentMonth = new Date().toISOString().slice(0, 7);
                const record = s.records?.find(r => r.month === currentMonth) || { payments: 0, attendance: 0 };
                revenue += record.payments;

                grid.innerHTML += `
                    <div class="glass-panel p-8 rounded-[3.5rem] student-card flex flex-col justify-between group">
                        <div>
                            <div class="flex justify-between items-start mb-6">
                                <span class="px-4 py-1.5 bg-blue-600/10 text-blue-500 text-[10px] font-black uppercase tracking-widest rounded-full border border-blue-600/20">
                                    ${s.level}
                                </span>
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">ID: ${s._id.slice(-5)}</p>
                            </div>
                            <h4 class="text-3xl font-black tracking-tight leading-tight mb-2">${s.name}</h4>
                            <p class="text-xs font-bold text-slate-500 mb-8">${s.language || 'English'} Department • ${s.className || 'A'}</p>
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between items-end bg-white/5 p-6 rounded-3xl border border-white/5">
                                <div>
                                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Financials</p>
                                    <p class="text-2xl font-black ${record.payments > 0 ? 'text-emerald-500' : 'text-slate-400'}">
                                        ${record.payments.toLocaleString()} <span class="text-[10px]">EGP</span>
                                    </p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Attendance</p>
                                    <p class="text-2xl font-black">${record.attendance || 0} <span class="text-[10px]">DAYS</span></p>
                                </div>
                            </div>

                            <button onclick="window.location.href='tables.html?id=${s._id}'" 
                                    class="w-full py-5 bg-white text-titanDark rounded-3xl font-black text-xs uppercase tracking-[0.2em] hover:bg-blue-600 hover:text-white transition-all shadow-xl active:scale-95">
                                Enter Academic Hub
                            </button>
                        </div>
                    </div>`;
            });

            document.getElementById("totalRevenue").innerText = revenue.toLocaleString();
            document.getElementById("totalStudentsCount").innerText = data.length;
        } catch (err) {
            grid.innerHTML = `<div class="col-span-full py-20 text-center text-red-500 font-black">UPLINK FAILED. RESTART ENGINE.</div>`;
        }
    }

    async function addNewStudent() {
        const name = document.getElementById("newStudentName").value;
        const level = document.getElementById("newStudentLevel").value;

        if (!name) return alert("System requires a name for registration.");

        const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, level, owner: user })
        });

        if (res.ok) {
            document.getElementById("newStudentName").value = "";
            loadData();
        }
    }

    function searchStudents() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const cards = document.querySelectorAll(".student-card");
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(q) ? "" : "none";
        });
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }
  </script>
</body>
</html>
