<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Admin Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
  <div class="bg-white p-10 rounded-2xl shadow-xl w-96 border border-gray-100">
    <h1 class="text-3xl font-extrabold mb-2 text-center text-gray-900">Welcome Back</h1>
    <p class="text-gray-500 text-center mb-8 text-sm">Please enter your details</p>
    
  <div class="space-y-4">
  <input id="email" type="text" placeholder="Username" 
         class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition bg-gray-50 focus:bg-white" />
  
  <input id="password" type="password" placeholder="Password" 
         class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition bg-gray-50 focus:bg-white" />
  
  <button id="loginBtn" onclick="login()" 
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition duration-200 transform active:scale-95">
    Sign In
  </button>
</div>
  </div>

<script>
const API = "/api/auth";

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:5001/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    if (res.ok) {
        const data = await res.json();
        // This 'OWNER_01' ID will now be used for all your saves
        localStorage.setItem("user", data.user.id); 
        window.location.href = "tables.html"; 
    } else {
        alert("Wrong Owner Credentials!");
    }
}
</script>
</body>
</html>
