<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Global Timeline</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
    
    /* Modern Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

    /* Modern Input Styling */
    .titan-input { 
      background: #f1f5f9; 
      border: 2px solid transparent; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .titan-input:focus { 
      background: white; 
      border-color: #2563eb; 
      outline: none; 
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1); 
    }

    /* Modern Date Pill */
    .date-pill {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 10px 20px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .status-active { background: #2563eb !important; color: white !important; border-color: transparent !important; transform: scale(1.05); }
  </style>
</head>
<body class="min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-20 hidden lg:flex flex-col items-center py-10 bg-white border-r border-slate-200 z-50">
    <div class="text-2xl font-black text-blue-600 mb-12 italic tracking-tighter">T.</div>
    <div class="space-y-10 flex-1">
      <a href="index.html" class="p-4 text-slate-400 hover:text-blue-600 block text-xl text-center transition-colors">📊</a>
      <a href="classes.html" class="p-4 bg-blue-600 text-white rounded-2xl block shadow-xl shadow-blue-500/30 text-center">🏫</a>
      <a href="teachers.html" class="p-4 text-slate-400 hover:text-blue-600 block text-xl text-center transition-colors">👨‍🏫</a>
    </div>
  </aside>

  <main class="lg:ml-20 p-6 md:p-12 max-w-7xl mx-auto">
    
    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-6 mb-12">
      <div>
        <h1 class="text-5xl font-black tracking-tighter uppercase italic text-slate-900">
          Daily <span class="text-blue-600">Timeline</span>
        </h1>
        <div class="mt-4 flex items-center gap-4">
          <div class="date-pill">
            <span class="text-[10px] font-black text-blue-600 uppercase">Session Date</span>
            <input type="date" id="logDate" onchange="loadRoster()" class="font-bold text-sm outline-none bg-transparent cursor-pointer">
          </div>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Live Academic Node</p>
        </div>
      </div>

      <div class="flex gap-3 bg-white p-2 rounded-3xl border border-slate-200 shadow-sm">
        <select id="selLevel" onchange="loadRoster()" class="p-3 rounded-2xl text-[10px] font-black uppercase outline-none bg-slate-50 border-none cursor-pointer">
          <optgroup label="Primary">
            <option value="Primary 1">Primary 1</option><option value="Primary 2">Primary 2</option>
            <option value="Primary 3">Primary 3</option><option value="Primary 4">Primary 4</option>
            <option value="Primary 5">Primary 5</option><option value="Primary 6">Primary 6</option>
          </optgroup>
          <optgroup label="Preparatory">
            <option value="Prep 1" selected>Prep 1</option><option value="Prep 2">Prep 2</option><option value="Prep 3">Prep 3</option>
          </optgroup>
        </select>
        <select id="selGroup" onchange="loadRoster()" class="p-3 rounded-2xl text-[10px] font-black uppercase outline-none bg-slate-50 border-none cursor-pointer">
          <option value="Group A">Group A Only</option>
          <option value="Group B">Group B Only</option>
          <option value="Both">View All Students</option>
        </select>
      </div>
    </header>

    <section class="bg-white p-6 rounded-[2.5rem] mb-10 border border-slate-200 shadow-sm grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
      <div class="flex gap-3">
        <input id="fastName" type="text" placeholder="Enroll new student to this class..." class="titan-input p-4 rounded-2xl w-full font-bold text-sm">
        <button onclick="fastEnroll()" class="bg-blue-600 text-white px-8 rounded-2xl font-black text-[10px] uppercase hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/20">Add +</button>
      </div>
      <div class="flex gap-3 border-l border-slate-100 lg:pl-8">
        <input id="globalSub" type="text" placeholder="Active Subject (e.g. English)..." class="titan-input p-4 rounded-2xl w-full font-bold text-sm border-emerald-100">
        <button onclick="applyGlobalSubject()" class="bg-slate-900 text-white px-8 rounded-2xl font-black text-[10px] uppercase hover:bg-blue-600 transition-all">Apply All</button>
      </div>
    </section>

    <div class="bg-white rounded-[3rem] overflow-hidden border border-slate-200 shadow-xl shadow-slate-200/50">
      <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></div>
            <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500 italic">Global Sync Status</h3>
        </div>
        <button onclick="saveAllRows()" class="bg-emerald-500 text-white px-8 py-3 rounded-2xl font-black text-[11px] uppercase hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-500/20 active:scale-95">Save Entire Class</button>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
              <th class="p-8">Student Identification</th>
              <th class="p-8 text-center">Daily Status</th>
              <th class="p-8">Payment (EGP)</th>
              <th class="p-8">Subject & Grade</th>
              <th class="p-8 text-right">Action</th>
            </tr>
          </thead>
          <tbody id="rosterBody" class="divide-y divide-slate-50"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    // Initialize with Today's Date
    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('logDate').value = today;
        if(!user) window.location.href="login.html";
        loadRoster();
    };

    async function loadRoster() {
        const level = document.getElementById('selLevel').value;
        const group = document.getElementById('selGroup').value;
        const tbody = document.getElementById("rosterBody");
        tbody.innerHTML = `<tr><td colspan="5" class="p-32 text-center font-black text-slate-200 animate-pulse uppercase tracking-[0.5em] text-xs">Accessing Cloud...</td></tr>`;

        try {
            let url = `${API}?admin=${user}&level=${level}`;
            if(group !== "Both") url += `&className=${encodeURIComponent(group)}`;
            
            const res = await fetch(url);
            let data = await res.json();
            
            // Safety filter for Group bleeding
            const filtered = (group === "Both") ? data : data.filter(s => s.className === group);

            tbody.innerHTML = "";
            filtered.forEach(s => {
                tbody.innerHTML += `
                <tr class="hover:bg-blue-50/30 transition-all student-row" data-id="${s._id}">
                    <td class="p-8">
                        <p class="text-2xl font-black text-slate-800 tracking-tighter">${s.name}</p>
                        <p class="text-[10px] font-black uppercase mt-1 ${s.className === 'Group A' ? 'text-blue-500' : 'text-purple-600'}">
                            ${s.className} | ${s.language || 'English'}
                        </p>
                    </td>
                    <td class="p-8">
                        <div class="flex justify-center gap-2">
                            <button onclick="markAtt(this, 'emerald')" class="att-btn w-12 h-12 rounded-2xl border border-slate-200 text-slate-400 font-black text-xs hover:border-emerald-500 transition-all">P</button>
                            <button onclick="markAtt(this, 'red')" class="att-btn w-12 h-12 rounded-2xl border border-slate-200 text-slate-400 font-black text-xs hover:border-red-500 transition-all">A</button>
                        </div>
                    </td>
                    <td class="p-8">
                        <input type="number" id="pay-${s._id}" placeholder="000" class="titan-input p-4 rounded-2xl w-32 text-sm font-black text-emerald-600">
                    </td>
                    <td class="p-8">
                        <div class="flex gap-2">
                            <input type="text" id="sub-${s._id}" placeholder="Subject" class="titan-input subj-input p-4 rounded-2xl w-36 text-[11px] font-black">
                            <input type="number" id="grd-${s._id}" placeholder="00" class="titan-input p-4 rounded-2xl w-20 text-sm font-black text-center text-blue-600">
                        </div>
                    </td>
                    <td class="p-8 text-right">
                        <button onclick="saveRow('${s._id}')" class="px-6 py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase hover:bg-blue-600 transition-all shadow-md">Sync</button>
                    </td>
                </tr>`;
            });
        } catch (e) { tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-red-500 font-black">DATABASE ERROR</td></tr>`; }
    }

    function applyGlobalSubject() {
        const val = document.getElementById('globalSub').value;
        if(!val) return alert("Enter subject first");
        document.querySelectorAll('.subj-input').forEach(i => i.value = val);
    }

    function markAtt(btn, color) {
        btn.parentElement.querySelectorAll('.att-btn').forEach(b => {
            b.classList.remove('status-active', 'bg-emerald-500', 'bg-red-500');
            b.className = "att-btn w-12 h-12 rounded-2xl border border-slate-200 text-slate-400 font-black text-xs hover:border-emerald-500 transition-all";
        });
        btn.classList.add('status-active', `bg-${color}-500`);
    }

    async function fastEnroll() {
        const name = document.getElementById('fastName').value;
        const level = document.getElementById('selLevel').value;
        const group = document.getElementById('selGroup').value;
        const className = (group === "Both") ? "Group A" : group; 
        if(!name) return;
        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, level, className, owner: user, language: 'English' })
        });
        document.getElementById('fastName').value = "";
        loadRoster();
    }

    async function saveRow(id) {
        const date = document.getElementById('logDate').value;
        const pay = document.getElementById(`pay-${id}`).value;
        const sub = document.getElementById(`sub-${id}`).value;
        const grd = document.getElementById(`grd-${id}`).value;

        // Logic for timeline entry
        const payload = { studentId: id, date, subject: sub.toLowerCase(), payment: pay, grade: grd };
        
        await fetch(`${API}/daily-log`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        return true;
    }

    async function saveAllRows() {
        const rows = document.querySelectorAll('.student-row');
        for(let r of rows) { await saveRow(r.dataset.id); }
        alert("Full Class Sync Complete.");
        loadRoster();
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
