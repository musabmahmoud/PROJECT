<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Daily Timeline Master</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    
    :root { --titan-blue: #2563eb; --titan-emerald: #10b981; --titan-slate: #f8fafc; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #0f172a; 
      letter-spacing: -0.01em;
    }

    /* Modern Glass Cards */
    .titan-card { 
      background: white; 
      border-radius: 2.5rem; 
      border: 1px solid #edf2f7; 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.02), 0 10px 10px -5px rgba(0, 0, 0, 0.01);
    }

    /* Input Focus States */
    .titan-input { 
      background: #f1f5f9; 
      border: 2px solid transparent; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .titan-input:focus { 
      background: white; 
      border-color: var(--titan-blue); 
      outline: none; 
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.08); 
    }

    /* Attendance Button Logic */
    .att-btn { 
      width: 48px; 
      height: 48px; 
      border-radius: 16px; 
      font-weight: 800; 
      font-size: 13px; 
      transition: all 0.2s ease;
      border: 1px solid #e2e8f0;
      color: #94a3b8;
    }
    .btn-p:hover, .active-p { background: var(--titan-emerald); color: white; border-color: transparent; box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2); }
    .btn-a:hover, .active-a { background: #ef4444; color: white; border-color: transparent; box-shadow: 0 8px 15px rgba(239, 68, 68, 0.2); }

    /* Floating Table Rows */
    .student-row { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .student-row:hover { transform: translateY(-2px); }

    /* Hide Default Date Icon for Modern Look */
    input[type="date"]::-webkit-inner-spin-button,
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
  </style>
</head>
<body class="min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-24 hidden lg:flex flex-col items-center py-12 bg-white border-r border-slate-100 z-50">
    <div class="text-3xl font-black text-blue-600 mb-20 italic tracking-tighter">T.</div>
    <nav class="space-y-12 flex-1">
      <a href="index.html" class="p-5 text-slate-300 hover:text-blue-600 block text-2xl transition-all">📊</a>
      <a href="classes.html" class="p-5 bg-blue-600 text-white rounded-[1.5rem] block shadow-2xl shadow-blue-500/40 text-2xl">🏫</a>
      <a href="teachers.html" class="p-5 text-slate-300 hover:text-blue-600 block text-2xl transition-all">👨‍🏫</a>
    </nav>
    <button onclick="logout()" class="p-5 text-slate-300 hover:text-red-500 text-xl transition-all">📂</button>
  </aside>

  <main class="lg:ml-24 p-8 md:p-16 max-w-[1500px] mx-auto">
    
    <header class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-8 mb-16">
      <div>
        <h1 class="text-6xl font-black tracking-tighter uppercase italic text-slate-900 leading-none">
          Daily <span class="text-blue-600">Timeline</span>
        </h1>
        <div class="mt-6 flex flex-wrap items-center gap-4">
          <div class="bg-white border border-slate-200 px-6 py-3 rounded-full shadow-sm flex items-center gap-4">
            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Session Date</span>
            <input type="date" id="logDate" onchange="loadRoster()" class="font-bold text-sm outline-none bg-transparent cursor-pointer">
          </div>
          <span class="h-8 w-[1px] bg-slate-200"></span>
          <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.3em]">Node: Academic_Command_V4</p>
        </div>
      </div>

      <div class="flex gap-4 bg-white p-3 rounded-[2rem] border border-slate-100 shadow-sm">
        <select id="selLevel" onchange="loadRoster()" class="p-4 bg-slate-50 rounded-2xl text-xs font-black uppercase outline-none cursor-pointer hover:bg-slate-100 transition-all">
          <optgroup label="Primary">
            <option value="Primary 1">Primary 1</option><option value="Primary 2">Primary 2</option>
            <option value="Primary 3">Primary 3</option><option value="Primary 4">Primary 4</option>
            <option value="Primary 5">Primary 5</option><option value="Primary 6">Primary 6</option>
          </optgroup>
          <optgroup label="Preparatory">
            <option value="Prep 1" selected>Prep 1</option><option value="Prep 2">Prep 2</option><option value="Prep 3">Prep 3</option>
          </optgroup>
        </select>
        <select id="selGroup" onchange="loadRoster()" class="p-4 bg-slate-50 rounded-2xl text-xs font-black uppercase outline-none cursor-pointer hover:bg-slate-100 transition-all">
          <option value="Group A">Group A Only</option>
          <option value="Group B">Group B Only</option>
          <option value="Both">Show Both Groups</option>
        </select>
      </div>
    </header>

    <section class="titan-card p-8 mb-12 grid grid-cols-1 xl:grid-cols-2 gap-10 items-center bg-white/80 backdrop-blur-md">
      <div class="flex gap-4">
        <input id="fastName" type="text" placeholder="Enroll student to this grade..." class="titan-input p-5 rounded-2xl w-full font-bold text-sm">
        <button onclick="fastEnroll()" class="bg-blue-600 text-white px-10 rounded-2xl font-black text-[11px] uppercase hover:bg-blue-700 shadow-xl shadow-blue-500/20 transition-all active:scale-95">Add +</button>
      </div>
      <div class="flex gap-4 xl:border-l xl:pl-10 border-slate-100">
        <input id="globalSub" type="text" placeholder="Set Active Subject (e.g. Arabic)..." class="titan-input p-5 rounded-2xl w-full font-bold text-sm border-emerald-50">
        <button onclick="applySubject()" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-[11px] uppercase hover:bg-blue-600 transition-all active:scale-95">Apply All</button>
      </div>
    </section>

    <div class="titan-card overflow-hidden">
      <div class="p-10 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center bg-slate-50/20 gap-6">
        <div class="flex items-center gap-4">
          <div class="w-3 h-3 bg-blue-600 rounded-full animate-pulse shadow-[0_0_15px_rgba(37,99,235,0.5)]"></div>
          <h3 class="text-[12px] font-black uppercase tracking-[0.3em] text-slate-400">Class Synchronization Log</h3>
        </div>
        <button onclick="saveAll()" class="bg-[#10b981] text-white px-12 py-5 rounded-[1.5rem] font-black text-xs uppercase hover:opacity-90 shadow-2xl shadow-emerald-500/30 transition-all active:scale-95">Save Entire Class Data</button>
      </div>

      <div class="overflow-x-auto p-6">
        <table class="w-full text-left border-separate border-spacing-y-5">
          <thead>
            <tr class="text-[11px] font-black text-slate-300 uppercase tracking-widest">
              <th class="px-10 py-2">Student Profile</th>
              <th class="px-10 py-2 text-center">Status</th>
              <th class="px-10 py-2">Financials (EGP)</th>
              <th class="px-10 py-2">Academic Result</th>
              <th class="px-10 py-2 text-right">Control</th>
            </tr>
          </thead>
          <tbody id="rosterBody">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    // Initialize Page
    window.onload = () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('logDate').value = today;
      if(!user) { window.location.href="login.html"; return; }
      loadRoster();
    };

    async function loadRoster() {
      const level = document.getElementById('selLevel').value;
      const group = document.getElementById('selGroup').value;
      const tbody = document.getElementById("rosterBody");
      
      tbody.innerHTML = `<tr><td colspan="5" class="p-32 text-center text-slate-200 font-black uppercase tracking-[0.6em] animate-pulse text-xs">Pinging Data Node...</td></tr>`;

      try {
        let url = `${API}?admin=${user}&level=${level}`;
        if(group !== "Both") url += `&className=${encodeURIComponent(group)}`;
        
        const res = await fetch(url);
        let data = await res.json();
        
        // Strict Group Filter
        const filtered = (group === "Both") ? data : data.filter(s => s.className === group);

        tbody.innerHTML = "";
        if(filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-slate-300 font-black uppercase text-xs tracking-widest">No Records Found for this Selection</td></tr>`;
          return;
        }

        filtered.forEach(s => {
          tbody.innerHTML += `
            <tr class="bg-white group student-row shadow-sm hover:shadow-md transition-all duration-300">
              <td class="px-10 py-8 rounded-l-[2rem] border-y border-l border-slate-50">
                <p class="text-2xl font-black text-slate-800 tracking-tighter">${s.name}</p>
                <div class="flex items-center gap-2 mt-2">
                  <span class="px-2 py-0.5 rounded-md text-[9px] font-black uppercase ${s.className === 'Group A' ? 'bg-blue-50 text-blue-600' : 'bg-purple-50 text-purple-600'}">
                    ${s.className}
                  </span>
                  <span class="text-[9px] font-bold text-slate-300 uppercase">${s.language || 'English'}</span>
                </div>
              </td>
              <td class="px-10 py-8 border-y border-slate-50">
                <div class="flex justify-center gap-3">
                  <button onclick="markAtt(this, 'p')" class="att-btn btn-p">P</button>
                  <button onclick="markAtt(this, 'a')" class="att-btn btn-a">A</button>
                </div>
              </td>
              <td class="px-10 py-8 border-y border-slate-50">
                <div class="relative">
                  <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-300">£</span>
                  <input type="number" id="pay-${s._id}" placeholder="000" class="titan-input p-4 pl-8 rounded-2xl w-32 text-sm font-black text-emerald-600">
                </div>
              </td>
              <td class="px-10 py-8 border-y border-slate-50">
                <div class="flex gap-3">
                  <input type="text" id="sub-${s._id}" placeholder="Subject" class="titan-input subj-box p-4 rounded-2xl w-40 text-[10px] font-black uppercase tracking-wider">
                  <input type="number" id="grd-${s._id}" placeholder="00" class="titan-input p-4 rounded-2xl w-20 text-sm font-black text-center text-blue-600">
                </div>
              </td>
              <td class="px-10 py-8 rounded-r-[2rem] border-y border-r border-slate-50 text-right">
                <button onclick="saveRow('${s._id}')" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase hover:bg-blue-600 transition-all shadow-lg active:scale-95">Sync Log</button>
              </td>
            </tr>`;
        });
      } catch (e) { console.error(e); }
    }

    function markAtt(btn, type) {
      btn.parentElement.querySelectorAll('button').forEach(b => b.className = "att-btn");
      btn.classList.add(type === 'p' ? 'active-p' : 'active-a');
    }

    function applySubject() {
      const val = document.getElementById('globalSub').value;
      if(!val) return;
      document.querySelectorAll('.subj-box').forEach(i => i.value = val);
    }

    async function fastEnroll() {
      const name = document.getElementById('fastName').value;
      const level = document.getElementById('selLevel').value;
      const group = document.getElementById('selGroup').value;
      const className = (group === "Both") ? "Group A" : group; 
      if(!name) return;

      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, level, className, owner: user, language: 'English' })
      });
      document.getElementById('fastName').value = "";
      loadRoster();
    }

    async function saveRow(id) {
      const date = document.getElementById('logDate').value;
      const sub = document.getElementById(`sub-${id}`).value;
      const grd = document.getElementById(`grd-${id}`).value;
      const pay = document.getElementById(`pay-${id}`).value;
      
      const payload = { studentId: id, date, subject: sub.toLowerCase().trim(), grade: Number(grd), payment: Number(pay) };
      
      const res = await fetch(`${API}/daily-log`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      return res.ok;
    }

    async function saveAll() {
      const rows = document.querySelectorAll('[id^="pay-"]');
      const total = rows.length;
      let count = 0;
      for (let r of rows) {
        const success = await saveRow(r.id.split('-')[1]);
        if(success) count++;
      }
      alert(`Timeline Updated: ${count}/${total} Students Synced.`);
      loadRoster();
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
