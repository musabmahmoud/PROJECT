<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Hub | Student Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { extend: { colors: { darkbg: '#020617', darkcard: '#0f172a', darkborder: '#1e2937' } } } 
        }
        if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: 0.4s ease; }
        .dark body { background-color: #020617 !important; color: #f8fafc; }
        .grade-card:hover { transform: translateY(-10px) scale(1.02); }
    </style>
</head>
<body class="bg-[#F8FAFC] p-6 md:p-14">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-end mb-20">
            <div>
                <h1 class="text-7xl font-[900] tracking-tighter italic">Campus <span class="text-blue-600">Map</span></h1>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.5em] mt-4">Primary 1 through Prep 3</p>
            </div>
            <div class="flex gap-4">
                <a href="index.html" class="bg-white dark:bg-darkcard px-8 py-4 rounded-2xl font-black text-xs uppercase border dark:border-darkborder">Dashboard</a>
            </div>
        </header>

        <div class="mb-20">
            <h2 class="text-2xl font-black uppercase tracking-[0.2em] text-blue-600 mb-10 flex items-center gap-4">
                <span class="h-[2px] w-12 bg-blue-600"></span> Primary Department
            </h2>
            <div id="primaryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                </div>
        </div>

        <div class="mb-32">
            <h2 class="text-2xl font-black uppercase tracking-[0.2em] text-purple-600 mb-10 flex items-center gap-4">
                <span class="h-[2px] w-12 bg-purple-600"></span> Preparatory Department
            </h2>
            <div id="prepGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                </div>
        </div>
    </div>

<script>
const grades = {
    primary: ["Primary 1", "Primary 2", "Primary 3", "Primary 4", "Primary 5", "Primary 6"],
    prep: ["Prep 1", "Prep 2", "Prep 3"]
};

function renderGrades() {
    const pGrid = document.getElementById('primaryGrid');
    const prGrid = document.getElementById('prepGrid');

    pGrid.innerHTML = grades.primary.map(g => createGradeCard(g, 'blue')).join('');
    prGrid.innerHTML = grades.prep.map(g => createGradeCard(g, 'purple')).join('');
}

function createGradeCard(name, color) {
    return `
        <div class="grade-card bg-white dark:bg-darkcard p-10 rounded-[4rem] border dark:border-darkborder shadow-sm transition-all cursor-pointer group" onclick="goToTables('${name}')">
            <div class="flex justify-between items-start mb-8">
                <div class="text-5xl group-hover:scale-110 transition-transform">🏫</div>
                <span class="bg-${color}-50 text-${color}-600 dark:bg-${color}-900/20 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Active</span>
            </div>
            <h3 class="text-4xl font-[900] tracking-tighter mb-4">${name}</h3>
            <div class="flex gap-4">
                <div class="flex-1 bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase">English</p>
                    <p class="font-bold text-lg">Class A/B</p>
                </div>
                <div class="flex-1 bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Arabic</p>
                    <p class="font-bold text-lg">Class A/B</p>
                </div>
            </div>
        </div>
    `;
}

function goToTables(grade) {
    window.location.href = `tables.html?grade=${encodeURIComponent(grade)}`;
}

window.onload = renderGrades;
</script>
</body>
</html>
