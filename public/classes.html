<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Class Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .titan-input { background: #f1f5f9; border: 1px solid transparent; transition: all 0.2s; }
    .titan-input:focus { background: white; border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    .btn-sync { background-color: #2563eb; color: white; transition: all 0.2s; }
    .btn-sync:hover { background-color: #1d4ed8; transform: translateY(-1px); }
  </style>
</head>
<body class="min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-20 hidden lg:flex flex-col items-center py-10 bg-white border-r border-slate-200 z-50">
    <div class="text-2xl font-black text-blue-600 mb-12 italic">T.</div>
    <div class="space-y-8 flex-1">
      <a href="index.html" class="p-4 text-slate-400 hover:text-blue-600 block text-xl text-center">📊</a>
      <a href="classes.html" class="p-4 bg-blue-600 text-white rounded-2xl block shadow-lg text-center">🏫</a>
      <a href="teachers.html" class="p-4 text-slate-400 hover:text-blue-600 block text-xl text-center">👨‍🏫</a>
    </div>
  </aside>

  <main class="lg:ml-20 p-6 md:p-12 max-w-7xl mx-auto">
    
    <header class="mb-10">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-8">
        <div>
            <h1 class="text-4xl font-black tracking-tighter uppercase italic text-slate-900">Class <span class="text-blue-600">Command</span></h1>
            <p class="text-slate-400 font-bold text-[10px] tracking-[0.3em] uppercase mt-1">Primary 1 - Prep 3 Global Roster</p>
        </div>
        
        <div class="flex gap-3">
            <select id="selLevel" onchange="loadRoster()" class="bg-white border border-slate-200 p-4 rounded-2xl text-[10px] font-black uppercase outline-none focus:border-blue-500 shadow-sm">
                <optgroup label="Primary Stage">
                    <option value="Primary 1">Primary 1</option><option value="Primary 2">Primary 2</option>
                    <option value="Primary 3">Primary 3</option><option value="Primary 4">Primary 4</option>
                    <option value="Primary 5">Primary 5</option><option value="Primary 6">Primary 6</option>
                </optgroup>
                <optgroup label="Preparatory Stage">
                    <option value="Prep 1">Prep 1</option><option value="Prep 2">Prep 2</option><option value="Prep 3">Prep 3</option>
                </optgroup>
            </select>
            <select id="selGroup" onchange="loadRoster()" class="bg-white border border-slate-200 p-4 rounded-2xl text-[10px] font-black uppercase outline-none focus:border-blue-500 shadow-sm">
                <option value="Group A">Group A Only</option>
                <option value="Group B">Group B Only</option>
                <option value="Both">Show Both Groups</option>
            </select>
        </div>
      </div>

      <div class="bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="flex gap-2">
              <input id="fastName" type="text" placeholder="Quick Student Enroll..." class="titan-input p-4 rounded-2xl w-full font-bold text-sm">
              <button onclick="fastEnroll()" class="bg-blue-600 text-white px-8 rounded-2xl font-black text-[10px] uppercase hover:bg-blue-700 transition-all whitespace-nowrap">Add Student</button>
          </div>
          <div class="flex gap-2 border-l border-slate-100 lg:pl-6">
              <input id="globalSub" type="text" placeholder="Set Subject for Class..." class="titan-input p-4 rounded-2xl w-full font-bold text-sm">
              <button onclick="applyGlobalSubject()" class="bg-slate-900 text-white px-8 rounded-2xl font-black text-[10px] uppercase hover:bg-blue-600 transition-all whitespace-nowrap">Apply to All</button>
          </div>
      </div>
    </header>

    <div class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-200 shadow-sm">
        <div class="p-6 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 italic">Active Class Records</h3>
            <button onclick="saveAllRows()" class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-black text-[10px] uppercase hover:bg-emerald-600 shadow-lg shadow-emerald-500/20 transition-all">Save All Records</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-white">
                        <th class="p-8">Student Identification</th>
                        <th class="p-8 text-center">Attendance</th>
                        <th class="p-8">Monthly Payment</th>
                        <th class="p-8">Subject & Grade</th>
                        <th class="p-8 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="rosterBody" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </div>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => { if(!user) window.location.href="login.html"; loadRoster(); };

    async function loadRoster() {
        const level = document.getElementById('selLevel').value;
        const group = document.getElementById('selGroup').value;
        const tbody = document.getElementById("rosterBody");
        tbody.innerHTML = `<tr><td colspan="5" class="p-24 text-center font-black text-slate-300 animate-pulse text-xs tracking-widest uppercase">Fetching Node Data...</td></tr>`;

        try {
            let url = `${API}?admin=${user}&level=${level}`;
            if(group !== "Both") url += `&className=${encodeURIComponent(group)}`;
            
            const res = await fetch(url);
            let data = await res.json();
            
            // Hard Frontend Filter to prevent Group A/B bleeding
            const filteredData = (group === "Both") ? data : data.filter(s => s.className === group);

            tbody.innerHTML = "";
            if(filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-slate-300 font-bold uppercase text-[10px]">No students found for this selection.</td></tr>`;
                return;
            }

            filteredData.forEach(s => {
                tbody.innerHTML += `
                <tr class="hover:bg-blue-50/30 transition-all student-row" data-id="${s._id}">
                    <td class="p-8">
                        <p class="text-xl font-extrabold text-slate-800 tracking-tight">${s.name}</p>
                        <p class="text-[9px] font-black uppercase mt-1 ${s.className === 'Group A' ? 'text-blue-500' : 'text-purple-600'}">
                            ${s.className} | ${s.language || 'English'}
                        </p>
                    </td>
                    <td class="p-8">
                        <div class="flex justify-center gap-1">
                            <button onclick="mark(this, 'emerald')" class="att-btn w-9 h-9 rounded-xl border border-slate-200 text-slate-400 font-black text-[10px] hover:border-emerald-500">P</button>
                            <button onclick="mark(this, 'red')" class="att-btn w-9 h-9 rounded-xl border border-slate-200 text-slate-400 font-black text-[10px] hover:border-red-500">A</button>
                        </div>
                    </td>
                    <td class="p-8">
                        <input type="number" id="pay-${s._id}" placeholder="EGP" class="titan-input p-3 rounded-xl w-28 text-sm font-black text-emerald-600">
                    </td>
                    <td class="p-8">
                        <div class="flex gap-2">
                            <input type="text" id="sub-${s._id}" placeholder="Subject" class="titan-input subj-input p-3 rounded-xl w-32 text-[10px] font-bold">
                            <input type="number" id="grd-${s._id}" placeholder="00" class="titan-input p-3 rounded-xl w-16 text-sm font-black text-center text-blue-600">
                        </div>
                    </td>
                    <td class="p-8 text-right">
                        <button onclick="saveRow('${s._id}')" class="px-6 py-3 bg-slate-900 text-white rounded-xl font-black text-[9px] uppercase hover:bg-blue-600 transition-all shadow-md">Sync</button>
                    </td>
                </tr>`;
            });
        } catch (e) { tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-red-500 font-black">DATABASE ERROR</td></tr>`; }
    }

    function applyGlobalSubject() {
        const val = document.getElementById('globalSub').value;
        if(!val) return alert("Type a subject name first!");
        document.querySelectorAll('.subj-input').forEach(input => input.value = val);
    }

    function mark(btn, color) {
        btn.parentElement.querySelectorAll('.att-btn').forEach(b => {
            b.className = "att-btn w-9 h-9 rounded-xl border border-slate-200 text-slate-400 font-black text-[10px]";
        });
        btn.className = `att-btn w-9 h-9 rounded-xl bg-${color}-500 text-white font-black text-[10px] shadow-lg shadow-${color}-500/30 border-transparent`;
    }

    async function fastEnroll() {
        const name = document.getElementById('fastName').value;
        const level = document.getElementById('selLevel').value;
        const group = document.getElementById('selGroup').value;
        const className = (group === "Both") ? "Group A" : group; 
        if(!name) return alert("Enter a name");

        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, level, className, owner: user, language: 'English' })
        });
        document.getElementById('fastName').value = "";
        loadRoster();
    }

    async function saveRow(id) {
        const pay = document.getElementById(`pay-${id}`).value;
        const sub = document.getElementById(`sub-${id}`).value;
        const grd = document.getElementById(`grd-${id}`).value;
        const month = new Date().toISOString().slice(0, 7);

        if(pay) {
            await fetch(`${API}/update-value`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ studentId: id, month, field: 'payments', value: Number(pay) })
            });
        }
        if(sub && grd) {
            await fetch(`${API}/update-value`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ studentId: id, month, field: sub.toLowerCase().trim(), value: Number(grd) })
            });
        }
        return true; 
    }

    async function saveAllRows() {
        const rows = document.querySelectorAll('.student-row');
        for (let row of rows) {
            const id = row.getAttribute('data-id');
            await saveRow(id);
        }
        alert("All class data has been synced to the database.");
        loadRoster();
    }
  </script>
</body>
</html>
