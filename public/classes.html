<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Daily Registry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root { 
      --titan-blue: #1e293b; --accent-blue: #3b82f6; --titan-emerald: #10b981;
      --titan-slate: #fcfdfe; --sidebar-width: 100px;
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--titan-slate); color: #334155; margin: 0; -webkit-font-smoothing: antialiased; }

    /* --- DESKTOP SIDEBAR --- */
    .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; background: white; border-right: 1px solid #f1f5f9; z-index: 500; display: flex; flex-direction: column; align-items: center; padding-top: 2.5rem; }
    .nav-icon { width: 54px; height: 54px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; transition: all 0.3s ease; font-size: 22px; text-decoration: none; color: #94a3b8; }
    .nav-icon.active { background: #f1f5f9; color: var(--titan-blue); }

    .main-content { margin-left: var(--sidebar-width); padding: 4rem 6rem; max-width: 1700px; }

    /* --- CARDS & INPUTS --- */
    .titan-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.01); }
    .titan-input { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 0.8rem 1.2rem; font-weight: 600; font-size: 13px; outline: none; width: 100%; }

    /* --- ATTENDANCE BUTTONS --- */
    .att-btn { width: 44px; height: 44px; border-radius: 12px; font-weight: 800; font-size: 12px; transition: all 0.2s ease; border: 1px solid #f1f5f9; color: #cbd5e1; background: white; }
    .active-p { background: var(--titan-emerald) !important; color: white !important; border-color: transparent; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
    .active-a { background: #ef4444 !important; color: white !important; border-color: transparent; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }

    /* --- SIDE PANEL (HISTORY) --- */
    #sidePanel { position: fixed; right: 0; top: 0; height: 100vh; width: 450px; background: white; z-index: 2000; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1); padding: 2rem; }
    #sidePanel.open { transform: translateX(0); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); z-index: 1500; }

    /* --- MOBILE RESPONSIVE ENGINE --- */
    .mobile-nav { display: none; }

    @media (max-width: 768px) {
        .sidebar { display: none !important; }
        .main-content { margin-left: 0 !important; padding: 2rem 1rem 100px 1rem !important; }
        #sidePanel { width: 100%; } /* History takes full screen on mobile */

        /* Floating Bottom Nav */
        .mobile-nav { 
            display: flex; position: fixed; bottom: 20px; left: 15px; right: 15px; 
            height: 70px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 15px 35px rgba(30, 41, 59, 0.15); z-index: 1000;
            justify-content: space-around; align-items: center;
        }

        /* Card-ify the Roster */
        .erp-table thead { display: none; }
        .erp-table tr { display: flex; flex-direction: column; background: white; margin-bottom: 1.5rem; border: 1px solid #f1f5f9; border-radius: 2rem; padding: 1.5rem; }
        .erp-table td { display: block; width: 100% !important; border: none !important; padding: 0.5rem 0 !important; text-align: left !important; }
        
        /* Flexbox for the mobile inputs */
        .mobile-input-row { display: flex; gap: 10px; margin-top: 10px; }
        .sync-btn-mobile { width: 100%; margin-top: 15px; padding: 12px !important; font-size: 11px !important; }

        header { flex-direction: column !important; align-items: flex-start !important; }
        .no-print.flex { flex-wrap: wrap; width: 100%; gap: 10px; }
        .no-print select, .no-print input { flex: 1; min-width: 45%; }
    }
  /* --- TITAN MOBILE CORE --- */
@media (max-width: 768px) {
    /* 1. Kill the Sidebar Gap */
    .sidebar { display: none !important; }
    
    .main-content { 
        margin-left: 0 !important; 
        padding: 2rem 1rem 120px 1rem !important; /* Extra bottom padding for the nav bar */
        width: 100% !important;
        max-width: 100vw !important;
        overflow-x: hidden;
    }

    /* 2. Floating Bottom Navigation Styling */
    .mobile-nav { 
        display: flex !important; 
        position: fixed; 
        bottom: 25px; 
        left: 20px; 
        right: 20px; 
        height: 75px; 
        background: rgba(255, 255, 255, 0.8); 
        backdrop-filter: blur(20px); /* iPhone style blur */
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 30px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        z-index: 9999;
        justify-content: space-around; 
        align-items: center;
    }

    /* 3. Make Nav Icons Pop */
    .mobile-nav .nav-icon {
        margin-bottom: 0 !important;
        width: 50px;
        height: 50px;
        font-size: 24px;
        background: transparent;
    }
    
    .mobile-nav .nav-icon.active {
        background: #eff6ff;
        color: #3b82f6;
        border-radius: 20px;
    }

    /* 4. Fix the Header & Cards */
    h1 { font-size: 2.5rem !important; letter-spacing: -0.05em !important; }
    
    .titan-card { 
        border-radius: 24px !important; 
        padding: 1.2rem !important;
        margin-bottom: 1rem !important;
    }

    /* 5. Stack Form Elements */
    .no-print.flex, header.flex {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 15px !important;
    }
    
    .no-print select, .no-print input {
        width: 100% !important;
        font-size: 14px !important;
    }
}
</style>
</head>
<body>

  <div id="overlay" class="overlay" onclick="closePanel()"></div>

  <aside class="sidebar no-print">
    <div class="mt-auto mb-4 text-slate-400 hover:text-blue-500 cursor-pointer" onclick="toggleMobileView()" title="Simulate Mobile">
    📱
</div>
    <div class="text-slate-900 font-bold text-3xl mb-16 tracking-tighter">T<span class="text-blue-500">.</span></div>
    <nav>
      <a href="index.html" class="nav-icon" title="Registry">👥</a>
      <a href="tables.html" class="nav-icon" title="Schedules">📅</a>
      <a href="classes.html" class="nav-icon" title="Attendance">🏫</a>
      <a href="teachers.html" class="nav-icon active" title="Faculty">👨‍🏫</a>
      <div onclick="toggleMobileView()" class="nav-icon">📱</div>
    </nav>
    <div class="mt-auto mb-10 text-slate-300 hover:text-red-500 cursor-pointer" onclick="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </aside>

  <div id="sidePanel">
    <div class="flex justify-between items-center mb-10">
      <div>
        <h2 id="panelName" class="text-3xl font-extrabold text-slate-900 tracking-tight">Student History</h2>
        <p class="text-[10px] font-bold uppercase text-blue-500 tracking-widest mt-1">Academic Log Records</p>
      </div>
      <button onclick="closePanel()" class="text-slate-300 hover:text-red-500 font-bold">✕</button>
    </div>
    <div id="panelContent" class="space-y-4"></div>
  </div>

  <main class="main-content">
    
    <header class="flex flex-col xl:flex-row justify-between items-end mb-16 gap-8">
      <div>
        <div class="flex items-center gap-2 mb-3">
            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Registry Logs</p>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">Daily <span class="text-slate-400 font-light">Timeline</span></h1>
      </div>

      <div class="no-print flex items-center gap-3 bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
        <input type="date" id="logDate" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none text-slate-600">
        
        <select id="selLevel" onchange="loadRoster()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none text-slate-600">
            <optgroup label="Primary Stage">
                <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option>
                <option>Primary 4</option><option>Primary 5</option><option>Primary 6</option>
            </optgroup>
            <optgroup label="Preparatory Stage">
                <option selected>Prep 1</option><option>Prep 2</option><option>Prep 3</option>
            </optgroup>
        </select>
        <select id="selGroup" onchange="loadRoster()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none text-slate-600">
            <option>Group A</option><option>Group B</option>
        </select>
        <select id="selTrack" onchange="loadRoster()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none text-slate-600">
            <option>English Track</option><option>Arabic Track</option>
        </select>

        <button onclick="saveAll()" class="bg-slate-900 text-white px-8 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-blue-600 transition-all">Mass Sync</button>
      </div>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
        <div class="titan-card p-8 bg-slate-900 text-white">
            <h4 class="text-[9px] font-bold uppercase text-slate-500 mb-4 tracking-widest">Global Subject Update</h4>
            <div class="flex gap-3">
                <input id="globalSub" type="text" placeholder="Enter Subject Name..." class="titan-input flex-1 !bg-white/10 !border-white/5 !text-white">
                <button onclick="applySubject()" class="bg-white text-slate-900 px-6 py-2 rounded-xl font-bold text-[10px] uppercase">Inject</button>
            </div>
        </div>
        <div class="titan-card p-8 flex items-center justify-between">
            <div>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Active Enrollment</p>
                <p id="nodeCount" class="text-4xl font-extrabold text-slate-900 tracking-tighter">00</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Expected Revenue</p>
                <p id="totalRev" class="text-4xl font-extrabold text-emerald-500 tracking-tighter">0.00 <span class="text-xs text-slate-300">EGP</span></p>
            </div>
        </div>
    </section>

    <div class="titan-card overflow-hidden">
        <table class="w-full text-left erp-table">
          <thead>
            <tr>
              <th class="w-[30%]">Student Information</th>
              <th class="text-center">Attendance</th>
              <th>Financial (EGP)</th>
              <th>Course & Grade</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="rosterBody"></tbody>
        </table>
    </div>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => {
      document.getElementById('logDate').value = new Date().toISOString().split('T')[0];
      if(!user) { window.location.href="login.html"; return; }
      loadRoster();
    };
function toggleMobileView() {
    const main = document.querySelector('.main-content');
    const isMobile = main.style.maxWidth === '430px';
    
    if (!isMobile) {
        main.style.maxWidth = '430px';
        main.style.margin = '0 auto';
        main.style.border = '10px solid #1e293b';
        main.style.borderRadius = '40px';
        main.style.height = '90vh';
        main.style.overflowY = 'auto';
        alert("Mobile View Simulated (iPhone Size)");
    } else {
        main.style.maxWidth = '1700px';
        main.style.margin = '0 0 0 100px';
        main.style.border = 'none';
        main.style.height = 'auto';
    }
}
    async function loadRoster() {
      const level = document.getElementById('selLevel').value;
      const className = document.getElementById('selGroup').value;
      const language = document.getElementById('selTrack').value;
      const tbody = document.getElementById("rosterBody");
      
      tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-slate-300 animate-pulse font-bold text-sm uppercase tracking-widest">Establishing Secure Uplink...</td></tr>`;

      try {
        // Updated API call to match the Backend filters
        const res = await fetch(`${API}?admin=${user}&level=${encodeURIComponent(level)}&className=${encodeURIComponent(className)}&language=${encodeURIComponent(language)}`);
        const data = await res.json();
        
        tbody.innerHTML = "";
        document.getElementById('nodeCount').innerText = data.length.toString().padStart(2, '0');

        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-slate-400 font-medium italic">No students found in this group.</td></tr>`;
            return;
        }

      data.forEach(s => {
          tbody.innerHTML += `
            <tr class="hover:bg-slate-50/50">
              <td>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-500 text-xs">${s.name.charAt(0)}</div>
                    <div>
                        <button onclick="openHistory('${s._id}', '${s.name}')" class="text-sm font-extrabold text-slate-800 hover:text-blue-500 transition-all text-left">${s.name}</button>
                        <p class="text-[9px] font-bold text-slate-300 uppercase tracking-tighter">ID: ${s._id.slice(-5).toUpperCase()}</p>
                    </div>
                </div>
              </td>
              <td class="text-center">
                <div class="flex justify-center gap-2">
                  <button id="p-${s._id}" onclick="markAtt('${s._id}', 'p')" class="att-btn">P</button>
                  <button id="a-${s._id}" onclick="markAtt('${s._id}', 'a')" class="att-btn">A</button>
                </div>
              </td>
              <td>
                <div class="mobile-input-row">
                    <input type="number" id="pay-${s._id}" oninput="calcRev()" placeholder="EGP" class="titan-input !bg-emerald-50/30 text-emerald-600 font-bold">
                    <input type="number" id="grd-${s._id}" placeholder="Grade %" class="titan-input text-center text-blue-500">
                </div>
              </td>
              <td>
                <input type="text" id="sub-${s._id}" placeholder="Subject" class="titan-input subj-box uppercase text-[10px]">
              </td>
              <td class="text-right">
                <button onclick="saveRow('${s._id}', this)" class="sync-btn-mobile px-5 py-2 bg-slate-100 text-slate-500 rounded-xl font-bold text-[9px] uppercase hover:bg-slate-900 hover:text-white transition-all">Sync Records</button>
              </td>
            </tr>`;
        });
        
        calcRev();
      } catch (e) { console.error("Database Link Failure", e); }
    }

    function markAtt(id, type) {
      const pBtn = document.getElementById(`p-${id}`);
      const aBtn = document.getElementById(`a-${id}`);
      pBtn.classList.remove('active-p');
      aBtn.classList.remove('active-a');
      
      if (type === 'p') pBtn.classList.add('active-p');
      else aBtn.classList.add('active-a');
    }

  async function openHistory(id, name) {
  document.getElementById('panelName').innerText = name;
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('sidePanel').classList.add('open');
  
  const content = document.getElementById('panelContent');
  content.innerHTML = `<div class="p-10 text-center text-slate-400">Loading History...</div>`;

  try {
    const res = await fetch(`${API}/history?admin=${user}&name=${encodeURIComponent(name)}`);
    const data = await res.json();

    // Sort by date so newest is on top
    const sortedLogs = data.history.reverse();

    content.innerHTML = sortedLogs.map(log => `
      <div class="p-5 mb-4 rounded-2xl border border-slate-100 bg-white shadow-sm hover:shadow-md transition-shadow">
        <div class="flex justify-between items-center mb-3">
          <span class="text-[10px] font-bold text-slate-400">${log.date}</span>
          <span class="px-2 py-1 rounded text-[9px] font-black uppercase ${log.status === 'present' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
            ${log.status}
          </span>
        </div>
        <h4 class="text-sm font-bold text-slate-800 mb-1">${log.subject}</h4>
        <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-50">
          <p class="text-xs font-bold text-blue-500">Score: ${log.grade}%</p>
          <p class="text-xs font-bold text-emerald-500">+ £${log.payment}</p>
        </div>
      </div>
    `).join('');

  } catch (err) {
    content.innerHTML = `<div class="text-red-500">Failed to load history.</div>`;
  }
}

    function calcRev() {
        let total = 0;
        document.querySelectorAll('[id^="pay-"]').forEach(input => { total += Number(input.value) || 0; });
        document.getElementById('totalRev').innerText = total.toFixed(2);
    }

    function closePanel() {
      document.getElementById('sidePanel').classList.remove('open');
      document.getElementById('overlay').style.display = 'none';
    }

    function applySubject() {
      const val = document.getElementById('globalSub').value;
      document.querySelectorAll('.subj-box').forEach(i => i.value = val);
    }

    async function saveRow(id, btn) {
      const date = document.getElementById('logDate').value;
      const subject = document.getElementById(`sub-${id}`).value;
      const grade = document.getElementById(`grd-${id}`).value;
      const payment = document.getElementById(`pay-${id}`).value;
      const isAbsent = document.getElementById(`a-${id}`).classList.contains('active-a');
      
      btn.innerText = "⏳";
      
      try {
          const res = await fetch(`${API}/daily-log`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                studentId: id, 
                date, 
                subject: subject || "General", 
                grade: Number(grade) || 0, 
                payment: Number(payment) || 0, 
                status: isAbsent ? 'absent' : 'present', 
                admin: user 
            })
          });

          if(res.ok) { 
              btn.innerText = "DONE";
              btn.classList.replace('bg-slate-100', 'bg-emerald-500');
              btn.classList.replace('text-slate-500', 'text-white');
              setTimeout(() => { 
                  btn.innerText = "Sync"; 
                  btn.classList.replace('bg-emerald-500', 'bg-slate-100');
                  btn.classList.replace('text-white', 'text-slate-500');
              }, 2000);
          }
      } catch (err) {
          alert("Sync Failed. Connection Lost.");
          btn.innerText = "Sync";
      }
    }

    async function saveAll() {
      const btns = document.querySelectorAll('button[onclick^="saveRow"]');
      for (let b of btns) { await b.click(); }
      alert("Mass Synchronization Complete ✅");
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
