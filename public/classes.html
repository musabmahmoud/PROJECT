<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Full Roster</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .titan-input { background: #f1f5f9; border: 1px solid transparent; transition: all 0.2s; }
    .titan-input:focus { background: white; border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
  </style>
</head>
<body class="min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-20 hidden lg:flex flex-col items-center py-10 bg-white border-r border-slate-200 z-50">
    <div class="text-2xl font-black text-blue-600 mb-12 italic">T.</div>
    <div class="space-y-8 flex-1">
      <a href="index.html" class="p-4 text-slate-400 hover:text-blue-600 block text-xl">📊</a>
      <a href="classes.html" class="p-4 bg-blue-600 text-white rounded-2xl block shadow-lg">🏫</a>
      <a href="teachers.html" class="p-4 text-slate-400 hover:text-blue-600 block text-xl">👨‍🏫</a>
    </div>
  </aside>

  <main class="lg:ml-20 p-6 md:p-12 max-w-7xl mx-auto">
    
    <header class="mb-10">
      <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-3xl font-black tracking-tight uppercase italic text-slate-900">Class <span class="text-blue-600">Command</span></h1>
            <p class="text-slate-400 font-bold text-[10px] tracking-[0.2em] uppercase">Primary 1 - Prep 3 Management</p>
        </div>
        
        <div class="flex gap-2">
            <select id="selLevel" onchange="loadRoster()" class="bg-white border border-slate-200 p-3 rounded-xl text-[10px] font-black uppercase outline-none focus:border-blue-500">
                <optgroup label="Primary">
                    <option value="Primary 1">Primary 1</option><option value="Primary 2">Primary 2</option>
                    <option value="Primary 3">Primary 3</option><option value="Primary 4">Primary 4</option>
                    <option value="Primary 5">Primary 5</option><option value="Primary 6">Primary 6</option>
                </optgroup>
                <optgroup label="Preparatory">
                    <option value="Prep 1">Prep 1</option><option value="Prep 2">Prep 2</option><option value="Prep 3">Prep 3</option>
                </optgroup>
            </select>
            <select id="selGroup" onchange="loadRoster()" class="bg-white border border-slate-200 p-3 rounded-xl text-[10px] font-black uppercase outline-none focus:border-blue-500">
                <option value="Group A">Group A</option>
                <option value="Group B">Group B</option>
                <option value="Both">Show Both Groups</option>
            </select>
        </div>
      </div>

      <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm grid grid-cols-1 lg:grid-cols-4 gap-4">
          <div class="flex gap-2 lg:col-span-2">
              <input id="fastName" type="text" placeholder="Add Student to this Grade..." class="titan-input p-3 rounded-xl w-full font-bold text-sm">
              <button onclick="fastEnroll()" class="bg-blue-600 text-white px-6 rounded-xl font-black text-[10px] uppercase hover:bg-blue-700 transition-all">Add +</button>
          </div>
          <div class="flex gap-2 lg:col-span-2 border-l border-slate-100 pl-4">
              <input id="globalSub" type="text" placeholder="Set Class Subject (e.g. Arabic)" class="titan-input p-3 rounded-xl w-full font-bold text-sm">
              <button onclick="applyGlobalSubject()" class="bg-slate-900 text-white px-6 rounded-xl font-black text-[10px] uppercase hover:bg-blue-600 transition-all">Apply to All</button>
          </div>
      </div>
    </header>

    <div class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-200 shadow-sm">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-slate-50/50">
                    <th class="p-6">Student</th>
                    <th class="p-6 text-center">Presence</th>
                    <th class="p-6">EGP Payment</th>
                    <th class="p-6">Subject & Grade</th>
                    <th class="p-6 text-right">Action</th>
                </tr>
            </thead>
            <tbody id="rosterBody" class="divide-y divide-slate-50"></tbody>
        </table>
    </div>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = loadRoster;

    async function loadRoster() {
        const level = document.getElementById('selLevel').value;
        const group = document.getElementById('selGroup').value;
        const tbody = document.getElementById("rosterBody");
        tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center font-bold text-slate-300 animate-pulse uppercase tracking-widest">Accessing Node...</td></tr>`;

        try {
            // Logic to handle "Both Groups" or specific filter
            let url = `${API}?admin=${user}&level=${level}`;
            if(group !== "Both") url += `&className=${group}`;
            
            const res = await fetch(url);
            const data = await res.json();
            tbody.innerHTML = "";

            data.forEach(s => {
                tbody.innerHTML += `
                <tr class="hover:bg-blue-50/20 transition-all">
                    <td class="p-6">
                        <p class="font-extrabold text-slate-800">${s.name}</p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">${s.className} | ${s.language || 'English'}</p>
                    </td>
                    <td class="p-6">
                        <div class="flex justify-center gap-1">
                            <button onclick="mark(this, 'emerald')" class="w-8 h-8 rounded-lg border border-slate-200 text-slate-400 font-black text-[10px] hover:border-emerald-500">P</button>
                            <button onclick="mark(this, 'red')" class="w-8 h-8 rounded-lg border border-slate-200 text-slate-400 font-black text-[10px] hover:border-red-500">A</button>
                        </div>
                    </td>
                    <td class="p-6">
                        <input type="number" id="pay-${s._id}" placeholder="Amount" class="titan-input p-2 rounded-lg w-24 text-xs font-black">
                    </td>
                    <td class="p-6">
                        <div class="flex gap-1">
                            <input type="text" id="sub-${s._id}" placeholder="Subject" class="titan-input subj-input p-2 rounded-lg w-28 text-[10px] font-bold">
                            <input type="number" id="grd-${s._id}" placeholder="00" class="titan-input p-2 rounded-lg w-12 text-[10px] font-bold text-center">
                        </div>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="saveRow('${s._id}')" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-black text-[9px] uppercase hover:bg-blue-700 transition-all">Sync</button>
                    </td>
                </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500 font-black">DATABASE OFFLINE</td></tr>`;
        }
    }

    function applyGlobalSubject() {
        const val = document.getElementById('globalSub').value;
        if(!val) return;
        document.querySelectorAll('.subj-input').forEach(input => {
            input.value = val;
        });
    }

    function mark(btn, color) {
        btn.parentElement.querySelectorAll('button').forEach(b => {
            b.className = "w-8 h-8 rounded-lg border border-slate-200 text-slate-400 font-black text-[10px]";
        });
        btn.className = `w-8 h-8 rounded-lg bg-${color}-500 text-white font-black text-[10px] shadow-sm`;
    }

    async function fastEnroll() {
        const name = document.getElementById('fastName').value;
        const level = document.getElementById('selLevel').value;
        const group = document.getElementById('selGroup').value;
        const className = (group === "Both") ? "Group A" : group; 
        if(!name) return;

        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, level, className, owner: user, language: 'English' })
        });
        document.getElementById('fastName').value = "";
        loadRoster();
    }

    async function saveRow(id) {
        const pay = document.getElementById(`pay-${id}`).value;
        const sub = document.getElementById(`sub-${id}`).value;
        const grd = document.getElementById(`grd-${id}`).value;
        const month = new Date().toISOString().slice(0, 7);

        if(pay) {
            await fetch(`${API}/update-value`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ studentId: id, month, field: 'payments', value: Number(pay) })
            });
        }
        if(sub && grd) {
            await fetch(`${API}/update-value`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ studentId: id, month, field: sub.toLowerCase().trim(), value: Number(grd) })
            });
        }
        alert("Entry Recorded.");
    }
  </script>
</body>
</html>
