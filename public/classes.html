<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Daily Timeline V15</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    
    :root { 
      --titan-blue: #2563eb; 
      --titan-emerald: #10b981; 
      --titan-slate: #f8fafc; 
      --sidebar-width: 115px;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #0f172a; 
      margin: 0;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* --- SIDEBAR ARCHITECTURE --- */
    .sidebar { 
      width: var(--sidebar-width); 
      height: 100vh; 
      position: fixed; 
      left: 0; 
      top: 0; 
      background: white; 
      border-right: 1px solid #edf2f7; 
      z-index: 200; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding-top: 3rem;
      box-shadow: 10px 0 30px rgba(0,0,0,0.01);
    }

    .nav-icon { 
      width: 62px; 
      height: 62px; 
      margin-bottom: 2rem; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border-radius: 22px; 
      cursor: pointer; 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      font-size: 26px; 
      text-decoration: none;
      color: #cbd5e1;
    }

    .nav-icon:hover { 
      background: #f8fafc; 
      color: var(--titan-blue);
      transform: translateX(5px);
    }

    .nav-icon.active { 
      background: var(--titan-blue); 
      color: white; 
      box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3); 
    }

    /* --- MAIN CONTENT & LAYOUT --- */
    .main-content { 
      margin-left: var(--sidebar-width); 
      padding: 5rem; 
      max-width: 1700px;
      position: relative;
    }

    /* --- TITAN COMPONENT LIBRARY --- */
    .titan-card { 
      background: white; 
      border-radius: 3.5rem; 
      border: 1px solid #edf2f7; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.03);
      position: relative;
      overflow: hidden;
    }

    .titan-input {
      background: #f8fafc;
      border: 2px solid transparent;
      border-radius: 1.5rem;
      padding: 1.25rem 1.75rem;
      font-weight: 800;
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: all 0.3s ease;
      color: #1e293b;
    }

    .titan-input:focus {
      border-color: var(--titan-blue);
      background: white;
      box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.06);
    }

    /* --- ATTENDANCE PULSE --- */
    .att-btn { 
      width: 52px; 
      height: 52px; 
      border-radius: 18px; 
      font-weight: 900; 
      font-size: 14px; 
      transition: all 0.3s ease;
      border: 2px solid #f1f5f9;
      color: #94a3b8;
    }

    .btn-p:hover, .active-p { background: var(--titan-emerald); color: white; border-color: transparent; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
    .btn-a:hover, .active-a { background: #ef4444; color: white; border-color: transparent; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }

    /* --- SIDE ANALYTICS PANEL --- */
    #sidePanel { 
      position: fixed;
      right: 0;
      top: 0;
      height: 100vh;
      width: 500px;
      background: white;
      z-index: 300;
      transform: translateX(100%);
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: -30px 0 70px rgba(15, 23, 42, 0.1);
      padding: 4rem;
    }

    #sidePanel.open { transform: translateX(0); }

    .overlay { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(15, 23, 42, 0.2); 
      backdrop-filter: blur(8px); 
      z-index: 250; 
    }

    /* --- TABLE CUSTOMIZATION --- */
    .erp-table th { 
      padding: 2.5rem; 
      text-transform: uppercase; 
      font-size: 10px; 
      letter-spacing: 0.3em; 
      color: #94a3b8; 
      font-weight: 900;
      border-bottom: 1px solid #f8fafc;
    }

    .erp-table td { padding: 2.5rem; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
    .erp-row:hover { background: #fbfcfe; }

    /* Glass Effects */
    .glass-header {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>

  <div id="overlay" class="overlay" onclick="closePanel()"></div>

  <aside class="sidebar">
    <div class="text-blue-600 font-black text-5xl italic mb-20 tracking-tighter">T.</div>
    <nav>
      <a href="index.html" class="nav-icon" title="Main Dashboard">📊</a>
      <a href="classes.html" class="nav-icon active" title="Daily Timeline">📅</a>
      <a href="teachers.html" class="nav-icon" title="Faculty Node">👨‍🏫</a>
      <a href="reports.html" class="nav-icon" title="Data Analytics">📈</a>
    </nav>
    <div class="mt-auto mb-12" onclick="logout()">
      <div class="nav-icon !mb-0 text-slate-300 hover:text-red-500 transition-colors">📂</div>
    </div>
  </aside>

  <div id="sidePanel">
    <div class="flex justify-between items-center mb-12">
      <div>
        <h2 id="panelName" class="text-5xl font-black italic text-slate-900 tracking-tighter">Node_Data</h2>
        <p class="text-[10px] font-black uppercase text-blue-600 tracking-[0.4em] mt-2 italic">Timeline Synchronization</p>
      </div>
      <button onclick="closePanel()" class="w-14 h-14 rounded-full bg-slate-50 flex items-center justify-center font-bold text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all">✕</button>
    </div>
    
    <div id="panelContent" class="space-y-6">
      </div>
  </div>

  <main class="main-content">
    
    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-20 gap-10">
      <div>
        <div class="flex items-center gap-3 mb-4">
          <div class="w-12 h-[2px] bg-blue-600"></div>
          <p class="text-[11px] font-black text-blue-600 uppercase tracking-[0.5em] italic">Academic_Command_V4</p>
        </div>
        <h1 class="text-8xl font-black italic tracking-tighter uppercase text-slate-900 leading-[0.8]">
          Daily <span class="text-blue-600">Timeline</span>
        </h1>
      </div>

      <div class="glass-header p-4 rounded-[2.5rem] flex items-center gap-8 shadow-xl border border-white">
        <div class="pl-6 border-r border-slate-100 pr-8">
          <p class="text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Active Date</p>
          <input type="date" id="logDate" class="font-black italic text-lg outline-none cursor-pointer bg-transparent text-slate-900">
        </div>
        <div class="pr-6">
           <select id="selLevel" onchange="loadRoster()" class="bg-transparent font-black text-[11px] uppercase outline-none cursor-pointer text-blue-600">
              <option value="Prep 1">Prep 1 Node</option>
              <option value="Prep 2">Prep 2 Node</option>
              <option value="Primary 5">Primary 5 Node</option>
           </select>
        </div>
        <button onclick="saveAll()" class="bg-blue-600 text-white px-10 py-5 rounded-[1.5rem] font-black text-[11px] uppercase tracking-[0.2em] hover:bg-slate-900 transition-all shadow-2xl shadow-blue-200">
          Uplink All
        </button>
      </div>
    </header>

    <section class="titan-card p-10 mb-16 grid grid-cols-1 xl:grid-cols-2 gap-12 bg-white/60 backdrop-blur-xl">
      <div class="relative group">
        <p class="text-[9px] font-black uppercase text-slate-400 mb-4 tracking-widest">Enrollment Interface</p>
        <div class="flex gap-4">
          <input id="fastName" type="text" placeholder="Identity Name..." class="titan-input">
          <button onclick="fastEnroll()" class="bg-slate-900 text-white px-10 rounded-2xl font-black text-[11px] uppercase hover:bg-blue-600 transition-all">Add +</button>
        </div>
      </div>
      <div class="relative group border-l border-slate-100 pl-12">
        <p class="text-[9px] font-black uppercase text-slate-400 mb-4 tracking-widest">Global Subject Node</p>
        <div class="flex gap-4">
          <input id="globalSub" type="text" placeholder="Define Subject..." class="titan-input !bg-blue-50/50">
          <button onclick="applySubject()" class="bg-blue-600 text-white px-10 rounded-2xl font-black text-[11px] uppercase hover:bg-slate-900 transition-all">Inject</button>
        </div>
      </div>
    </section>

    <div class="titan-card">
      <div class="p-10 border-b border-slate-50 flex items-center justify-between">
         <div class="flex items-center gap-4">
            <div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.4)] animate-pulse"></div>
            <h3 class="text-xs font-black uppercase tracking-[0.4em] text-slate-400 italic">Live_System_Synchronization</h3>
         </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left erp-table">
          <thead>
            <tr>
              <th>Entity Identification</th>
              <th class="text-center">Pulse Check</th>
              <th>Financial Node</th>
              <th>Academic Track</th>
              <th class="text-right">Operation</th>
            </tr>
          </thead>
          <tbody id="rosterBody">
            </tbody>
        </table>
      </div>
    </div>

    <footer class="mt-12 flex gap-8">
        <div class="bg-white px-10 py-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-2">Total Node Count</p>
            <p id="nodeCount" class="text-4xl font-black italic text-slate-900">00</p>
        </div>
        <div class="bg-white px-10 py-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-2">System Encryption</p>
            <p class="text-4xl font-black italic text-blue-600 uppercase">AES-256</p>
        </div>
    </footer>

  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    window.onload = () => {
      document.getElementById('logDate').value = new Date().toISOString().split('T')[0];
      if(!user) { window.location.href="login.html"; return; }
      loadRoster();
    };

    async function loadRoster() {
      const level = document.getElementById('selLevel').value;
      const tbody = document.getElementById("rosterBody");
      tbody.innerHTML = `<tr><td colspan="5" class="p-40 text-center font-black italic text-slate-100 text-6xl animate-pulse tracking-tighter">LOADING_NODE_DATABASE...</td></tr>`;

      try {
        const res = await fetch(`${API}?admin=${user}&level=${encodeURIComponent(level)}`);
        const data = await res.json();
        tbody.innerHTML = "";
        document.getElementById('nodeCount').innerText = data.length.toString().padStart(2, '0');

        data.forEach(s => {
          tbody.innerHTML += `
            <tr class="erp-row transition-all duration-300">
              <td>
                <div class="flex items-center gap-6">
                    <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center font-black text-blue-600 text-2xl italic border border-slate-100">${s.name.charAt(0)}</div>
                    <div>
                        <button onclick="openHistory('${s._id}', '${s.name}')" class="text-3xl font-black text-slate-800 tracking-tighter hover:text-blue-600 transition-colors text-left leading-none uppercase italic">${s.name}</button>
                        <p class="text-[10px] font-black text-slate-300 uppercase mt-2 tracking-widest">ID: ${s._id.slice(-8).toUpperCase()}</p>
                    </div>
                </div>
              </td>
              <td>
                <div class="flex justify-center gap-3">
                  <button id="p-${s._id}" onclick="markAtt('${s._id}', 'p')" class="att-btn btn-p">P</button>
                  <button id="a-${s._id}" onclick="markAtt('${s._id}', 'a')" class="att-btn btn-a">A</button>
                </div>
              </td>
              <td>
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 font-black text-slate-300 text-xs">EGP</span>
                    <input type="number" id="pay-${s._id}" placeholder="000" class="titan-input !pl-14 !bg-emerald-50/30 text-emerald-600">
                </div>
              </td>
              <td>
                <div class="flex gap-3">
                  <input type="text" id="sub-${s._id}" placeholder="Subject" class="titan-input !text-[10px] uppercase subj-box !w-36">
                  <input type="number" id="grd-${s._id}" placeholder="%" class="titan-input !w-20 text-center text-blue-600">
                </div>
              </td>
              <td class="text-right">
                <button onclick="saveRow('${s._id}')" class="px-8 py-5 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase hover:bg-blue-600 transition-all shadow-xl active:scale-95">Sync Node</button>
              </td>
            </tr>`;
        });
      } catch (e) { console.error(e); }
    }

    function markAtt(id, type) {
      document.getElementById(`p-${id}`).className = "att-btn btn-p";
      document.getElementById(`a-${id}`).className = "att-btn btn-a";
      document.getElementById(`${type}-${id}`).classList.add(type === 'p' ? 'active-p' : 'active-a');
    }

    async function openHistory(id, name) {
      document.getElementById('panelName').innerText = name.split(' ')[0];
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('sidePanel').classList.add('open');
      const content = document.getElementById('panelContent');
      content.innerHTML = `<p class="p-20 text-center font-black italic text-slate-100 text-2xl animate-pulse">FETCHING_LOGS...</p>`;
      
      try {
        const res = await fetch(`${API}/history?admin=${user}&name=${encodeURIComponent(name)}`);
        const data = await res.json();
        content.innerHTML = data.history.map(l => `
          <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="font-black text-slate-900 text-lg italic tracking-tight uppercase">${l.date}</p>
                    <p class="text-[10px] font-black uppercase text-blue-600 tracking-widest mt-1">${l.subject}</p>
                </div>
                <span class="text-[9px] font-black px-4 py-2 rounded-xl ${l.status === 'present' ? 'bg-emerald-50 text-emerald-500' : 'bg-red-50 text-red-500'} uppercase">${l.status}</span>
            </div>
            <div class="flex justify-between items-end border-t border-slate-50 pt-4">
              <p class="text-2xl font-black text-emerald-500 tracking-tighter">+${l.payment} <span class="text-xs uppercase opacity-40">EGP</span></p>
              <p class="text-sm font-black text-slate-900">${l.grade}% Result</p>
            </div>
          </div>`).join('');
      } catch (e) { content.innerHTML = "SYSTEM ERROR IN DATA RETRIEVAL."; }
    }

    function closePanel() {
      document.getElementById('sidePanel').classList.remove('open');
      document.getElementById('overlay').style.display = 'none';
    }

    function applySubject() {
      const val = document.getElementById('globalSub').value;
      document.querySelectorAll('.subj-box').forEach(i => i.value = val);
    }

    async function saveRow(id) {
      const date = document.getElementById('logDate').value;
      const sub = document.getElementById(`sub-${id}`).value;
      const grd = document.getElementById(`grd-${id}`).value;
      const pay = document.getElementById(`pay-${id}`).value;
      const isAbsent = document.getElementById(`a-${id}`).classList.contains('active-a');
      
      const res = await fetch(`${API}/daily-log`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          studentId: id, date, subject: sub.toLowerCase(), grade: Number(grd), 
          payment: Number(pay), status: isAbsent ? 'absent' : 'present', admin: user 
        })
      });
      return res.ok;
    }

    async function saveAll() {
      const rows = document.querySelectorAll('[id^="pay-"]');
      for (let r of rows) { await saveRow(r.id.split('-')[1]); }
      alert("MASS DATABASE UPLINK SUCCESSFUL.");
      loadRoster();
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
