<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Timeline Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .titan-input { background: #f1f5f9; border: 1px solid transparent; transition: all 0.2s; }
    .titan-input:focus { background: white; border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    .date-badge { background: #ebf2ff; color: #2563eb; padding: 8px 16px; border-radius: 12px; font-weight: 800; font-size: 12px; }
  </style>
</head>
<body class="min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-20 hidden lg:flex flex-col items-center py-10 bg-white border-r border-slate-200 z-50">
    <div class="text-2xl font-black text-blue-600 mb-12 italic">T.</div>
    <div class="space-y-8 flex-1">
      <a href="index.html" class="p-4 text-slate-400 hover:text-blue-600 block text-xl text-center">📊</a>
      <a href="classes.html" class="p-4 bg-blue-600 text-white rounded-2xl block shadow-lg text-center">🏫</a>
    </div>
  </aside>

  <main class="lg:ml-20 p-6 md:p-12 max-w-7xl mx-auto">
    
    <header class="mb-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
        <div>
            <h1 class="text-4xl font-black tracking-tighter uppercase italic">Daily <span class="text-blue-600">Log</span></h1>
            <div class="flex items-center gap-3 mt-2">
                <input type="date" id="logDate" onchange="loadRoster()" class="bg-white border border-slate-200 p-2 rounded-xl font-bold text-sm outline-none focus:border-blue-500 shadow-sm">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Session Date</span>
            </div>
        </div>
        
        <div class="flex gap-2">
            <select id="selLevel" onchange="loadRoster()" class="bg-white border border-slate-200 p-4 rounded-2xl text-[10px] font-black uppercase outline-none focus:border-blue-500 shadow-sm">
                <option value="Primary 4">Primary 4</option>
                <option value="Prep 1" selected>Prep 1</option>
                <option value="Prep 3">Prep 3</option>
            </select>
            <select id="selGroup" onchange="loadRoster()" class="bg-white border border-slate-200 p-4 rounded-2xl text-[10px] font-black uppercase outline-none focus:border-blue-500 shadow-sm">
                <option value="Group A">Group A</option>
                <option value="Group B">Group B</option>
            </select>
        </div>
      </div>

      <div class="bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm flex flex-wrap items-center gap-4">
          <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest px-2">Active Subject:</p>
          <input id="currentSubject" type="text" placeholder="e.g., English" class="titan-input p-3 rounded-xl font-bold text-sm w-48 border-blue-200">
          <div class="h-8 w-[1px] bg-slate-100 hidden md:block"></div>
          <button onclick="setToday()" class="text-[10px] font-black uppercase text-blue-600 hover:underline">Reset to Today</button>
      </div>
    </header>

    <div class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-200 shadow-sm">
        <table class="w-full text-left">
            <thead>
                <tr class="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-white">
                    <th class="p-8">Student</th>
                    <th class="p-8 text-center">Status</th>
                    <th class="p-8">Payment (EGP)</th>
                    <th class="p-8">Grade</th>
                    <th class="p-8 text-right">Action</th>
                </tr>
            </thead>
            <tbody id="rosterBody" class="divide-y divide-slate-50"></tbody>
        </table>
    </div>
  </main>

  <script>
    const API = "/api/students";
    const user = localStorage.getItem("user");

    // Set default date to today
    function setToday() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('logDate').value = today;
        if(user) loadRoster();
    }
    window.onload = setToday;

    async function loadRoster() {
        const date = document.getElementById('logDate').value;
        const level = document.getElementById('selLevel').value;
        const group = document.getElementById('selGroup').value;
        const tbody = document.getElementById("rosterBody");

        tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center font-black text-slate-300 animate-pulse uppercase tracking-widest">Loading Timeline...</td></tr>`;

        try {
            const res = await fetch(`${API}?admin=${user}&level=${level}&className=${group}`);
            const data = await res.json();
            
            tbody.innerHTML = "";
            data.forEach(s => {
                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all" data-id="${s._id}">
                    <td class="p-8">
                        <p class="text-lg font-extrabold text-slate-800">${s.name}</p>
                        <p class="text-[9px] font-black text-slate-400 uppercase">${date}</p>
                    </td>
                    <td class="p-8">
                        <div class="flex justify-center gap-1">
                            <button onclick="markAtt(this, 'emerald')" class="att-btn w-10 h-10 rounded-xl border border-slate-200 text-slate-400 font-black text-[10px]">P</button>
                            <button onclick="markAtt(this, 'red')" class="att-btn w-10 h-10 rounded-xl border border-slate-200 text-slate-400 font-black text-[10px]">A</button>
                        </div>
                    </td>
                    <td class="p-8">
                        <input type="number" id="pay-${s._id}" placeholder="600" class="titan-input p-3 rounded-xl w-28 text-sm font-black text-emerald-600">
                    </td>
                    <td class="p-8">
                        <input type="number" id="grd-${s._id}" placeholder="00" class="titan-input p-3 rounded-xl w-20 text-sm font-black text-center text-blue-600">
                    </td>
                    <td class="p-8 text-right">
                        <button onclick="saveDailyEntry('${s._id}')" class="px-6 py-3 bg-slate-900 text-white rounded-xl font-black text-[9px] uppercase hover:bg-blue-600 transition-all">Save Log</button>
                    </td>
                </tr>`;
            });
        } catch (e) { console.error(e); }
    }

    function markAtt(btn, color) {
        btn.parentElement.querySelectorAll('.att-btn').forEach(b => {
            b.className = "att-btn w-10 h-10 rounded-xl border border-slate-200 text-slate-400 font-black text-[10px]";
        });
        btn.className = `att-btn w-10 h-10 rounded-xl bg-${color}-500 text-white font-black text-[10px] shadow-lg shadow-${color}-500/20`;
    }

    async function saveDailyEntry(id) {
        const date = document.getElementById('logDate').value; // e.g. 2026-03-28
        const subject = document.getElementById('currentSubject').value.toLowerCase().trim();
        const pay = document.getElementById(`pay-${id}`).value;
        const grade = document.getElementById(`grd-${id}`).value;

        if(!subject) return alert("Please specify the Subject (English/Arabic etc)");

        // We send the date as part of the data so the backend knows WHERE in the timeline to save it
        const payload = {
            studentId: id,
            date: date, 
            subject: subject,
            payment: Number(pay),
            grade: Number(grade)
        };

        const res = await fetch(`${API}/daily-log`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            alert(`Log saved for ${subject} on ${date}`);
        }
    }
  </script>
</body>
</html>
