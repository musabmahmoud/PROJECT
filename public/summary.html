<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Summary | Student Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 mb-10">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Academic <span class="text-blue-600">Insights</span></h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Performance by Level</p>
            </div>

            <div class="flex items-center gap-3 bg-gray-100 p-1.5 rounded-2xl border border-gray-200">
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <span class="text-blue-500 text-lg">📅</span>
                    <select id="monthSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03" selected>March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <select id="yearSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <a href="index.html" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition-all shadow-md">Back</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6">
        <div class="mb-8 flex justify-end">
            <button onclick="downloadYearlyReport()" class="bg-white text-gray-700 border border-gray-200 px-6 py-3 rounded-2xl font-bold hover:bg-black hover:text-white transition-all shadow-sm">
                🗓️ Full Annual Report (All Grades)
            </button>
        </div>

        <div id="summaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

<script>
// Use the same API path as your working index.html
const API = "/api/students";
let allStudentsData = []; 

window.onload = loadSummary;

async function loadSummary() {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    
    // MATCHING DASHBOARD LOGIC: Format is YYYY-MM (e.g., 2026-03)
    const targetMonth = `${year}-${month}`;
    const container = document.getElementById("summaryContainer");
    
    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">Syncing ${targetMonth} Insights...</div>`;

    try {
        // We fetch data for the specific month just like index.html does
        const res = await fetch(`${API}?month=${targetMonth}`);
        if (!res.ok) throw new Error("Server Error");
        
        allStudentsData = await res.json();
        container.innerHTML = "";

        // Group students by their Level (Prep 1, Sec 2, etc.)
        const groups = {};
        allStudentsData.forEach(s => {
            if (!groups[s.level]) groups[s.level] = [];
            groups[s.level].push(s);
        });

        const levels = Object.keys(groups).sort();
        
        if (levels.length === 0) {
            container.innerHTML = `<p class="col-span-full text-center py-10 text-gray-500 font-bold">No data found for ${targetMonth}</p>`;
            return;
        }

        levels.forEach(level => {
            const group = groups[level];
            
            // Calculate Stats for the group
            let totalRev = 0, totalP = 0, totalA = 0, totalG = 0, countG = 0;
            
            group.forEach(s => {
                totalRev += (Number(s.payments) || 0);
                totalP += (Number(s.attendance) || 0);
                totalA += (Number(s.absences) || 0);
                if (s.grade > 0) {
                    totalG += Number(s.grade);
                    countG++;
                }
            });

            const avgGrade = countG > 0 ? (totalG / countG).toFixed(0) : 0;

            container.innerHTML += `
                <div class="glass-card p-8 rounded-[2.5rem] bg-white border border-gray-100 shadow-sm hover:shadow-xl transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-3xl font-black text-gray-900">${level}</h2>
                        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm">${avgGrade}%</div>
                    </div>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between border-b border-gray-50 pb-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Revenue</span>
                            <span class="text-sm font-black text-gray-800">${totalRev.toLocaleString()} EGP</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Attendance</span>
                            <span class="text-sm font-black text-green-600">${totalP}P <span class="text-gray-300">/</span> <span class="text-red-500">${totalA}A</span></span>
                        </div>
                    </div>
                    <button onclick="downloadGradeReport('${level}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">
                        Download ${level} Report
                    </button>
                </div>`;
        });
    } catch (err) {
        container.innerHTML = `<p class="text-red-500 font-bold text-center col-span-full">Failed to load summary. Check server connection.</p>`;
    }
}

// Updated PDF function to use the data we just fetched
function downloadGradeReport(level) {
    const monthName = document.getElementById("monthSelect").options[document.getElementById("monthSelect").selectedIndex].text;
    const year = document.getElementById("yearSelect").value;
    
    const students = allStudentsData.filter(s => s.level === level);
    let rows = "";

    students.forEach(s => {
        rows += `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 12px; font-family: sans-serif;">${s.name}</td>
                <td style="padding: 12px; font-family: sans-serif;">${s.payments || 0} EGP</td>
                <td style="padding: 12px; font-family: sans-serif;">${s.attendance || 0}P / ${s.absences || 0}A</td>
                <td style="padding: 12px; font-family: sans-serif; font-weight: bold; color: #2563eb;">${s.grade || 0}%</td>
            </tr>`;
    });

    const html = `
        <div style="padding: 40px; font-family: sans-serif;">
            <h1 style="text-align: center;">${level} - ${monthName} ${year}</h1>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <tr style="background: #f8fafc; text-align: left;">
                    <th style="padding: 12px;">Student Name</th><th style="padding: 12px;">Paid</th>
                    <th style="padding: 12px;">Attendance</th><th style="padding: 12px;">Grade</th>
                </tr>
                ${rows}
            </table>
        </div>`;

    html2pdf().from(html).set({ filename: `${level}_${monthName}_${year}.pdf`, margin: 0.5 }).save();
}

// Simple logic for the full report
function downloadYearlyReport() {
    alert("Yearly report requires a separate 'all-year' API call. Monthly reports are ready!");
}
</script>
</body>
</html>
