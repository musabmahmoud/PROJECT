<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Summary | Student Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        /* Style for the hidden report container */
        #report-template { display: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 mb-10">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Academic <span class="text-blue-600">Insights</span></h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Performance by Level</p>
            </div>

            <div class="flex items-center gap-3 bg-gray-100 p-1.5 rounded-2xl border border-gray-200">
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <span class="text-blue-500 text-lg">📅</span>
                    <select id="monthSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03" selected>March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <select id="yearSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <a href="index.html" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition-all">Back</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6">
        <div class="mb-8 flex justify-end">
            <button onclick="generateFullYearlyReport()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all flex items-center gap-2">
                <span>📄</span> Download Full Yearly Report (All Students)
            </button>
        </div>

        <div id="summaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

<script>
const API = "/api/students";

window.onload = loadSummary;

async function loadSummary() {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    const targetMonth = `${year}-${month}`;
    const container = document.getElementById("summaryContainer");
    
    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">Fetching ${month}/${year} Data...</div>`;

    try {
        // We fetch the students filtered by month from the API
        const res = await fetch(`${API}?month=${targetMonth}`);
        const students = await res.json();
        container.innerHTML = "";

        const groups = {};
        students.forEach(s => {
            if (!groups[s.level]) groups[s.level] = [];
            groups[s.level].push(s);
        });

        Object.keys(groups).sort().forEach(level => {
            const group = groups[level];
            
            const totalMoney = group.reduce((a, s) => a + (Number(s.payments) || 0), 0);
            const totalPresents = group.reduce((a, s) => a + (Number(s.attendance) || 0), 0);
            const totalAbsences = group.reduce((a, s) => a + (Number(s.absences) || 0), 0);
            
            const graded = group.filter(s => s.grade > 0);
            const avgGrade = graded.length > 0 
                ? (graded.reduce((a, s) => a + s.grade, 0) / graded.length).toFixed(0)
                : 0;

            const attendRate = (totalPresents + totalAbsences > 0) 
                ? Math.round((totalPresents / (totalPresents + totalAbsences)) * 100) 
                : 0;

            container.innerHTML += `
                <div class="glass-card p-8 rounded-[2.5rem] hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 group">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-3xl font-black text-gray-900">${level}</h2>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">${group.length} Students</p>
                        </div>
                        <div class="bg-blue-50 text-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black">
                            ${avgGrade}%
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Monthly Revenue</p>
                            <p class="text-2xl font-black text-gray-800">${totalMoney.toLocaleString()} <span class="text-xs text-gray-400">EGP</span></p>
                        </div>

                        <div>
                            <div class="flex justify-between text-[10px] font-black text-gray-400 uppercase mb-2">
                                <span>Attendance Rate</span>
                                <span class="text-blue-600">${attendRate}%</span>
                            </div>
                            <div class="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 rounded-full" style="width: ${attendRate}%"></div>
                            </div>
                            <div class="flex justify-between mt-3 text-[11px] font-bold">
                                <span class="text-green-500">✅ ${totalPresents} P</span>
                                <span class="text-red-400">❌ ${totalAbsences} A</span>
                            </div>
                        </div>
                    </div>

                    <button onclick="generateFullYearlyReport()" class="w-full mt-8 py-4 bg-gray-900 text-white rounded-2xl font-bold text-sm group-hover:bg-blue-600 transition-all">
                        Full Report (PDF)
                    </button>
                </div>
            `;
        });
    } catch (err) {
        container.innerHTML = `<p class="text-red-500 font-bold">Error loading summary.</p>`;
    }
}

// FUNCTION TO GENERATE THE YEARLY REPORT
async function generateFullYearlyReport() {
    const year = document.getElementById("yearSelect").value;
    // We fetch ALL students (the whole model) to calculate yearly totals
    const res = await fetch(API); 
    const students = await res.json();

    let reportHTML = `
        <div style="padding: 40px; font-family: 'Plus Jakarta Sans', sans-serif; color: #1a202c;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 5px;">STUDENT PRO ANNUAL REPORT</h1>
                <p style="text-transform: uppercase; color: #718096; font-weight: 600; font-size: 12px; letter-spacing: 2px;">Academic Year: ${year}</p>
            </div>

            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f7fafc; border-bottom: 2px solid #edf2f7;">
                        <th style="padding: 15px; text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #a0aec0;">Student Name</th>
                        <th style="padding: 15px; text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #a0aec0;">Level</th>
                        <th style="padding: 15px; text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #a0aec0;">Total Paid (YTD)</th>
                        <th style="padding: 15px; text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #a0aec0;">Attendance</th>
                        <th style="padding: 15px; text-align: left; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #a0aec0;">Avg Grade</th>
                    </tr>
                </thead>
                <tbody>
    `;

    students.forEach(s => {
        let yearlyPay = 0, yearlyAtt = 0, yearlyAbs = 0, totalG = 0, gCount = 0;

        // Iterate through all months in the student's records array
        s.records.forEach(r => {
            if (r.month.startsWith(year)) {
                yearlyPay += (r.payments || 0);
                yearlyAtt += (r.attendance || 0);
                yearlyAbs += (r.absences || 0);
                if (r.grade > 0) {
                    totalG += r.grade;
                    gCount++;
                }
            }
        });

        const finalGrade = gCount > 0 ? (totalG / gCount).toFixed(0) : 0;

        reportHTML += `
            <tr style="border-bottom: 1px solid #edf2f7;">
                <td style="padding: 15px; font-weight: 600; font-size: 14px;">${s.name}</td>
                <td style="padding: 15px; font-size: 12px; color: #718096;">${s.level}</td>
                <td style="padding: 15px; font-weight: 800; color: #3182ce;">${yearlyPay.toLocaleString()} EGP</td>
                <td style="padding: 15px; font-size: 12px;">✅ ${yearlyAtt} | ❌ ${yearlyAbs}</td>
                <td style="padding: 15px; font-weight: 800; color: #805ad5;">${finalGrade}%</td>
            </tr>
        `;
    });

    reportHTML += `</tbody></table></div>`;

    const opt = {
        margin: 0.5,
        filename: `Yearly_Report_${year}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    html2pdf().from(reportHTML).set(opt).save();
}
</script>
</body>
</html>
