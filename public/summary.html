<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #9333ea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-black text-gray-900">Academic Summary</h1>
            <button onclick="downloadPDF()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-2xl flex gap-2 items-center transition-all">
                Download PDF
            </button>
        </div>

        <div id="reportContent">
            <h2 class="text-xl font-bold text-blue-600 mb-4">Preparatory Levels</h2>
            <div id="prepContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div>

            <h2 class="text-xl font-bold text-purple-600 mb-4">Secondary Levels</h2>
            <div id="secContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script>
        async function initSummary() {
            const prepBox = document.getElementById("prepContainer");
            const secBox = document.getElementById("secContainer");

            try {
                const res = await fetch("/api/students");
                const students = await res.json();

                const render = (levels, container, color) => {
                    container.innerHTML = "";
                    levels.forEach(lvl => {
                        const group = students.filter(s => s.level?.toString().trim().toLowerCase() === lvl.toLowerCase());
                        const money = group.reduce((a, s) => a + (Number(s.payments) || 0), 0);
                        const avg = group.length ? (group.reduce((a, s) => a + (Number(s.grade) || 0), 0) / group.length).toFixed(1) : "0.0";
                        
                        container.innerHTML += `
                            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                                <h3 class="text-xl font-black">${lvl}</h3>
                                <p class="text-sm text-gray-400 mb-4">${group.length} Students</p>
                                <div class="bg-gray-50 p-4 rounded-xl mb-4">
                                    <p class="text-xs font-bold text-gray-500 uppercase">Average Grade</p>
                                    <p class="text-2xl font-black text-purple-600">${avg}%</p>
                                </div>
                                <div class="flex justify-between font-bold text-sm">
                                    <span class="text-green-600">EGP ${money}</span>
                                    <span class="text-gray-400">Total</span>
                                </div>
                            </div>`;
                    });
                };

                render(["Prep 1", "Prep 2", "Prep 3"], prepBox, "blue");
                render(["Sec 1", "Sec 2", "Sec 3"], secBox, "purple");

            } catch (e) { console.error(e); }
        }

        function downloadPDF() {
            const element = document.getElementById('reportContent');
            const opt = { margin: 10, filename: 'Report.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        }

        window.addEventListener('DOMContentLoaded', initSummary);
    </script>
</body>
</html>
