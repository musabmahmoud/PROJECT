<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Summary | Student Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        if (!localStorage.getItem("user")) { window.location.href = "login.html"; }
    </script>
    <style>
        body { font-family: sans-serif; background-color: #F8FAFC; }
        .glass-card { background: white; border: 1px solid #edf2f7; }
    </style>
</head>
<body class="pb-20">
    
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 mb-10">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Academic <span class="text-blue-600">Insights</span></h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Classroom Analytics</p>
            </div>

            <div class="flex items-center gap-3 bg-gray-100 p-1.5 rounded-2xl border border-gray-200">
                <select id="monthSelect" onchange="loadSummary()" class="px-4 py-2 bg-white rounded-xl font-bold outline-none">
                    <option value="01">January</option><option value="02">February</option>
                    <option value="03" selected>March</option><option value="04">April</option>
                </select>
                <select id="yearSelect" onchange="loadSummary()" class="px-4 py-2 bg-white rounded-xl font-bold outline-none">
                    <option value="2025">2025</option><option value="2026" selected>2026</option>
                </select>
                <a href="index.html" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold">Back</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6">
        <div id="summaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

<script>
const API = "/api/students";
const currentUser = localStorage.getItem("user");
let allStudentsData = [];

window.onload = loadSummary;

async function loadSummary() {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    const targetMonth = `${year}-${month}`;
    const container = document.getElementById("summaryContainer");
    
    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">Syncing data for ${currentUser}...</div>`;

    try {
        const res = await fetch(`${API}?month=${targetMonth}&admin=${currentUser}`);
        allStudentsData = await res.json();
        container.innerHTML = "";

        const groups = {};
        allStudentsData.forEach(s => {
            if (!groups[s.level]) groups[s.level] = [];
            groups[s.level].push(s);
        });

        Object.keys(groups).sort().forEach(level => {
            const group = groups[level];
            let rev = 0, p = 0, a = 0, g = 0, c = 0;

            group.forEach(s => {
                rev += (Number(s.payments) || 0);
                p += (Number(s.attendance) || 0);
                a += (Number(s.absences) || 0);
                if (Number(s.grade) > 0) { g += Number(s.grade); c++; }
            });

            container.innerHTML += `
                <div class="glass-card p-8 rounded-[2.5rem] shadow-sm hover:shadow-xl transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-3xl font-black text-gray-900">${level}</h2>
                        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm">${c > 0 ? (g/c).toFixed(0) : 0}%</div>
                    </div>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between border-b pb-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Revenue</span>
                            <span class="text-sm font-black text-gray-800">${rev.toLocaleString()} EGP</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Attendance</span>
                            <span class="text-sm font-black text-green-600">${p}P / ${a}A</span>
                        </div>
                    </div>
                    <button onclick="downloadGradeReport('${level}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg">Download Report</button>
                </div>`;
        });
    } catch (e) { container.innerHTML = `<p class="text-red-500 font-bold text-center col-span-full">Connection Error</p>`; }
}

function downloadGradeReport(level) {
    const monthName = document.getElementById("monthSelect").options[document.getElementById("monthSelect").selectedIndex].text;
    const year = document.getElementById("yearSelect").value;
    const students = allStudentsData.filter(s => s.level === level);
    
    let rowsHtml = "";
    students.forEach(s => {
        rowsHtml += `<tr style="border-bottom: 1px solid #eee;"><td style="padding: 12px;">${s.name}</td><td style="padding: 12px;">${s.payments} EGP</td><td style="padding: 12px;">${s.attendance}P / ${s.absences}A</td><td style="padding: 12px; font-weight: bold; color: #2563eb;">${s.grade}%</td></tr>`;
    });

    const pdfTemplate = `
        <div style="padding: 40px; font-family: sans-serif;">
            <h1 style="text-align: center; margin-bottom: 20px;">${level} Report - ${monthName} ${year}</h1>
            <table style="width: 100%; border-collapse: collapse;">
                <thead style="background: #f8fafc;">
                    <tr><th style="padding: 12px; text-align: left;">Name</th><th style="padding: 12px; text-align: left;">Paid</th><th style="padding: 12px; text-align: left;">Attendance</th><th style="padding: 12px; text-align: left;">Grade</th></tr>
                </thead>
                <tbody>${rowsHtml}</tbody>
            </table>
        </div>`;

    html2pdf().from(pdfTemplate).set({ filename: `${level}_Report.pdf`, margin: 0.5 }).save();
}
</script>
</body>
</html>
