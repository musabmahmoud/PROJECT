<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Summary | Student Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 mb-10">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Academic <span class="text-blue-600">Insights</span></h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Performance by Level</p>
            </div>

            <div class="flex items-center gap-3 bg-gray-100 p-1.5 rounded-2xl border border-gray-200">
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <span class="text-blue-500 text-lg">📅</span>
                    <select id="monthSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03" selected>March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <select id="yearSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <a href="index.html" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition-all shadow-md">Back</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6">
        <div class="mb-8 flex justify-end">
            <button onclick="downloadYearlyReport()" class="bg-white text-gray-700 border border-gray-200 px-6 py-3 rounded-2xl font-bold hover:bg-black hover:text-white transition-all shadow-sm">
                🗓️ Full Annual Report (All Grades)
            </button>
        </div>

        <div id="summaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

<script>
let allStudentsData = [];

window.onload = loadSummary;

async function loadSummary() {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    const targetMonth = `${year}-${month}`; // e.g., 2026-03
    const altTargetMonth = `${year}-${parseInt(month)}`; // e.g., 2026-3
    
    const container = document.getElementById("summaryContainer");
    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">Fetching ${targetMonth} Data...</div>`;

    try {
        let res = await fetch("/api/students");
        if (!res.ok) res = await fetch("/students");
        if (!res.ok) throw new Error("API not responding");

        allStudentsData = await res.json();
        console.log("Students Loaded:", allStudentsData);
        
        container.innerHTML = "";
        const groups = {};

        allStudentsData.forEach(s => {
            if (!groups[s.level]) groups[s.level] = [];
            groups[s.level].push(s);
        });

        const levels = Object.keys(groups).sort();
        if (levels.length === 0) {
            container.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400">No students found.</p>`;
            return;
        }

        levels.forEach(level => {
            const group = groups[level];
            let mRev = 0, mP = 0, mA = 0, mT = 0, mC = 0;

            group.forEach(s => {
                // Find matching record with flexible month format check
                const rec = (s.records || []).find(r => r.month === targetMonth || r.month === altTargetMonth);
                if (rec) {
                    mRev += (Number(rec.payments) || 0);
                    mP += (Number(rec.attendance) || 0);
                    mA += (Number(rec.absences) || 0);
                    if (rec.grade > 0) { mT += Number(rec.grade); mC++; }
                }
            });

            const avg = mC > 0 ? (mT / mC).toFixed(0) : 0;

            container.innerHTML += `
                <div class="glass-card p-8 rounded-[2.5rem] hover:shadow-2xl transition-all border border-white/50">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-3xl font-black text-gray-900">${level}</h2>
                        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm">${avg}%</div>
                    </div>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between border-b border-gray-100 pb-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Revenue</span>
                            <span class="text-sm font-black text-gray-800">${mRev.toLocaleString()} EGP</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Attendance</span>
                            <span class="text-sm font-black text-green-600">${mP}P <span class="text-gray-300">/</span> <span class="text-red-500">${mA}A</span></span>
                        </div>
                    </div>
                    <button onclick="downloadGradeReport('${level}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">
                        Download ${level} Report
                    </button>
                </div>`;
        });
    } catch (err) {
        console.error("API Error:", err);
        container.innerHTML = `<div class="col-span-full text-center py-20 text-red-500 font-bold uppercase tracking-widest">Database Offline or Error</div>`;
    }
}

function downloadGradeReport(level) {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    const targetMonth = `${year}-${month}`;
    const altTargetMonth = `${year}-${parseInt(month)}`;
    
    const students = allStudentsData.filter(s => s.level === level);
    
    let rows = "";
    students.forEach(s => {
        const rec = (s.records || []).find(r => r.month === targetMonth || r.month === altTargetMonth) 
                    || { payments: 0, attendance: 0, absences: 0, grade: 0 };
        rows += `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 12px; font-family: sans-serif;">${s.name}</td>
                <td style="padding: 12px; font-family: sans-serif;">${rec.payments} EGP</td>
                <td style="padding: 12px; font-family: sans-serif;">${rec.attendance}P | ${rec.absences}A</td>
                <td style="padding: 12px; font-family: sans-serif; font-weight: bold; color: #2563eb;">${rec.grade}%</td>
            </tr>`;
    });

    const htmlContent = `
        <div style="padding: 40px; font-family: sans-serif;">
            <h1 style="text-align: center;">${level.toUpperCase()} PERFORMANCE REPORT</h1>
            <p style="text-align: center; color: #666;">Month: ${targetMonth} | Year: ${year}</p>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0; text-align: left;">
                    <th style="padding: 12px;">Student Name</th>
                    <th style="padding: 12px;">Paid</th>
                    <th style="padding: 12px;">Attendance</th>
                    <th style="padding: 12px;">Grade</th>
                </tr>
                ${rows}
            </table>
        </div>`;

    html2pdf().from(htmlContent).set({ 
        margin: 0.5, 
        filename: `${level}_Report_${targetMonth}.pdf`,
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    }).save();
}

function downloadYearlyReport() {
    const year = document.getElementById("yearSelect").value;
    let rows = "";

    allStudentsData.forEach(s => {
        let yP = 0, yAtt = 0, yAbs = 0, tG = 0, gC = 0;
        (s.records || []).forEach(r => {
            if (r.month && r.month.startsWith(year)) {
                yP += (Number(r.payments) || 0);
                yAtt += (Number(r.attendance) || 0);
                yAbs += (Number(r.absences) || 0);
                if (r.grade > 0) { tG += Number(r.grade); gC++; }
            }
        });

        rows += `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 8px; font-weight: 600;">${s.name}</td>
                <td style="padding: 8px;">${s.level}</td>
                <td style="padding: 8px; color: #2563eb;">${yP} EGP</td>
                <td style="padding: 8px;">${yAtt}P / ${yAbs}A</td>
                <td style="padding: 8px; font-weight: bold;">${gC > 0 ? (tG/gC).toFixed(0) : 0}%</td>
            </tr>`;
    });

    const htmlContent = `
        <div style="padding: 30px; font-family: sans-serif;">
            <h1 style="text-align: center;">FULL ANNUAL ACADEMIC REPORT ${year}</h1>
            <table style="width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 20px;">
                <tr style="background: #1a202c; color: white; text-align: left;">
                    <th style="padding: 8px;">Name</th>
                    <th style="padding: 8px;">Level</th>
                    <th style="padding: 8px;">Yearly Total</th>
                    <th style="padding: 8px;">Attendance</th>
                    <th style="padding: 8px;">Avg Grade</th>
                </tr>
                ${rows}
            </table>
        </div>`;

    html2pdf().from(htmlContent).set({ margin: 0.5, filename: `Annual_Report_${year}.pdf` }).save();
}
</script>
</body>
</html>
