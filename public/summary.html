<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Summary | Student Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 mb-10">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Academic <span class="text-blue-600">Insights</span></h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Performance by Level</p>
            </div>

            <div class="flex items-center gap-3 bg-gray-100 p-1.5 rounded-2xl border border-gray-200">
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <span class="text-blue-500 text-lg">📅</span>
                    <select id="monthSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03" selected>March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <select id="yearSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <a href="index.html" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition-all">Back</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6">
        <div class="mb-8 flex justify-end">
            <button onclick="downloadYearlyReport()" class="bg-gray-200 text-gray-700 px-6 py-3 rounded-2xl font-bold hover:bg-black hover:text-white transition-all">
                🗓️ Full Annual Report (All Grades)
            </button>
        </div>

        <div id="summaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

<script>
const API = "/api/students";
let allStudentsData = []; // Store fetched data globally for filtering

window.onload = loadSummary;

async function loadSummary() {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    const targetMonth = `${year}-${month}`;
    const container = document.getElementById("summaryContainer");
    
    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">Analyzing ${targetMonth}...</div>`;

    try {
        const res = await fetch(API); 
        allStudentsData = await res.json();
        container.innerHTML = "";

        const groups = {};
        allStudentsData.forEach(s => {
            if (!groups[s.level]) groups[s.level] = [];
            groups[s.level].push(s);
        });

        Object.keys(groups).sort().forEach(level => {
            const group = groups[level];
            
            // Calculate REAL monthly stats for the card UI
            let mRevenue = 0, mPres = 0, mAbs = 0, mTotalG = 0, mGCount = 0;
            group.forEach(s => {
                const rec = s.records.find(r => r.month === targetMonth);
                if (rec) {
                    mRevenue += (Number(rec.payments) || 0);
                    mPres += (Number(rec.attendance) || 0);
                    mAbs += (Number(rec.absences) || 0);
                    if (rec.grade > 0) { mTotalG += rec.grade; mGCount++; }
                }
            });

            const avgGrade = mGCount > 0 ? (mTotalG / mGCount).toFixed(0) : 0;
            const attendRate = (mPres + mAbs > 0) ? Math.round((mPres / (mPres + mAbs)) * 100) : 0;

            container.innerHTML += `
                <div class="glass-card p-8 rounded-[2.5rem] hover:shadow-2xl transition-all group">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-3xl font-black text-gray-900">${level}</h2>
                        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm">${avgGrade}%</div>
                    </div>
                    <div class="space-y-4 mb-8">
                        <p class="text-sm font-bold text-gray-500">Monthly Revenue: <span class="text-gray-900">${mRevenue.toLocaleString()} EGP</span></p>
                        <p class="text-sm font-bold text-gray-500">Attendance: <span class="text-green-600">${mPres}P</span> / <span class="text-red-500">${mAbs}A</span></p>
                    </div>
                    <button onclick="downloadGradeReport('${level}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all">
                        Download ${level} Report
                    </button>
                </div>
            `;
        });
    } catch (err) {
        container.innerHTML = `<p class="text-red-500 font-bold">Failed to load data.</p>`;
    }
}

// 1. DOWNLOAD PDF FOR SPECIFIC GRADE & MONTH
function downloadGradeReport(level) {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    const targetMonth = `${year}-${month}`;
    
    const gradeStudents = allStudentsData.filter(s => s.level === level);
    
    let rows = "";
    gradeStudents.forEach(s => {
        const rec = s.records.find(r => r.month === targetMonth) || { payments: 0, attendance: 0, absences: 0, grade: 0 };
        rows += `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 10px;">${s.name}</td>
                <td style="padding: 10px;">${rec.payments} EGP</td>
                <td style="padding: 10px;">${rec.attendance}P / ${rec.absences}A</td>
                <td style="padding: 10px; font-weight: bold;">${rec.grade}%</td>
            </tr>
        `;
    });

    const docHtml = `
        <div style="padding: 30px; font-family: sans-serif;">
            <h1 style="text-align: center;">${level} - Monthly Report</h1>
            <p style="text-align: center; color: #666;">Month: ${targetMonth} | Total Students: ${gradeStudents.length}</p>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <tr style="background: #f4f4f4; text-align: left;">
                    <th style="padding: 10px;">Student Name</th>
                    <th style="padding: 10px;">Paid</th>
                    <th style="padding: 10px;">Attendance</th>
                    <th style="padding: 10px;">Grade</th>
                </tr>
                ${rows}
            </table>
        </div>
    `;

    html2pdf().from(docHtml).set({ filename: `${level}_${targetMonth}.pdf`, margin: 0.5 }).save();
}

// 2. DOWNLOAD ISOLATED YEARLY REPORT (EVERYONE)
function downloadYearlyReport() {
    const year = document.getElementById("yearSelect").value;
    let rows = "";

    allStudentsData.forEach(s => {
        let yPay = 0, yAtt = 0, yAbs = 0, totalG = 0, gCount = 0;
        s.records.forEach(r => {
            if (r.month.startsWith(year)) {
                yPay += (Number(r.payments) || 0);
                yAtt += (Number(r.attendance) || 0);
                yAbs += (Number(r.absences) || 0);
                if (r.grade > 0) { totalG += r.grade; gCount++; }
            }
        });

        rows += `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 8px;">${s.name}</td>
                <td style="padding: 8px;">${s.level}</td>
                <td style="padding: 8px; color: blue;">${yPay} EGP</td>
                <td style="padding: 8px;">${yAtt}P / ${yAbs}A</td>
                <td style="padding: 8px; font-weight: bold;">${gCount > 0 ? (totalG/gCount).toFixed(0) : 0}%</td>
            </tr>
        `;
    });

    const docHtml = `
        <div style="padding: 30px; font-family: sans-serif;">
            <h1 style="text-align: center;">ANNUAL ACADEMIC REPORT ${year}</h1>
            <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
                <tr style="background: #333; color: white; text-align: left;">
                    <th style="padding: 8px;">Name</th><th style="padding: 8px;">Level</th>
                    <th style="padding: 8px;">Yearly Paid</th><th style="padding: 8px;">Attendance</th>
                    <th style="padding: 8px;">Avg Grade</th>
                </tr>
                ${rows}
            </table>
        </div>
    `;

    html2pdf().from(docHtml).set({ filename: `Annual_Report_${year}.pdf`, margin: 0.5 }).save();
}
</script>
</body>
</html>
