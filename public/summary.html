<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Summary | Student Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #edf2f7; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 mb-10">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Academic <span class="text-blue-600">Insights</span></h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Performance by Level</p>
            </div>

            <div class="flex items-center gap-3 bg-gray-100 p-1.5 rounded-2xl border border-gray-200">
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <select id="monthSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03" selected>March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <select id="yearSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <a href="index.html" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition-all">Back</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6">
        <div id="summaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

<script>
const API = "/api/students";
let allStudentsData = [];

window.onload = loadSummary;

async function loadSummary() {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    const targetMonth = `${year}-${month}`;
    const container = document.getElementById("summaryContainer");
    
    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">Loading ${targetMonth}...</div>`;

    try {
        const res = await fetch(`${API}?month=${targetMonth}`);
        allStudentsData = await res.json();
        container.innerHTML = "";

        const groups = {};
        allStudentsData.forEach(s => {
            if (!groups[s.level]) groups[s.level] = [];
            groups[s.level].push(s);
        });

        Object.keys(groups).sort().forEach(level => {
            const group = groups[level];
            let totalRev = 0, totalP = 0, totalA = 0, totalG = 0, countG = 0;

            group.forEach(s => {
                totalRev += (Number(s.payments) || 0);
                totalP += (Number(s.attendance) || 0);
                totalA += (Number(s.absences) || 0);
                if (Number(s.grade) > 0) { totalG += Number(s.grade); countG++; }
            });

            const avg = countG > 0 ? (totalG / countG).toFixed(0) : 0;

            container.innerHTML += `
                <div class="glass-card p-8 rounded-[2.5rem] shadow-sm hover:shadow-xl transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <h2 class="text-3xl font-black text-gray-900">${level}</h2>
                        <div class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black text-sm">${avg}%</div>
                    </div>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between border-b border-gray-50 pb-2">
                            <span class="text-xs font-bold text-gray-400 uppercase">Revenue</span>
                            <span class="text-sm font-black text-gray-800">${totalRev.toLocaleString()} EGP</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-xs font-bold text-gray-400 uppercase">Attendance</span>
                            <span class="text-sm font-black text-green-600">${totalP}P / ${totalA}A</span>
                        </div>
                    </div>
                    <button onclick="downloadGradeReport('${level}')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">
                        Download ${level} Report
                    </button>
                </div>`;
        });
    } catch (e) {
        container.innerHTML = `<p class="text-red-500 text-center col-span-full font-bold">Error loading data.</p>`;
    }
}

function downloadGradeReport(level) {
    const monthName = document.getElementById("monthSelect").options[document.getElementById("monthSelect").selectedIndex].text;
    const year = document.getElementById("yearSelect").value;
    
    // Filter all students belonging to this level
    const students = allStudentsData.filter(s => s.level === level);
    
    // Build table rows correctly for ANY number of students (1, 2, or 50)
    let rowsHtml = "";
    students.forEach(s => {
        rowsHtml += `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 12px; font-size: 14px;">${s.name}</td>
                <td style="padding: 12px; font-size: 14px; font-weight: bold;">${s.payments || 0} EGP</td>
                <td style="padding: 12px; font-size: 14px;">${s.attendance || 0}P / ${s.absences || 0}A</td>
                <td style="padding: 12px; font-size: 14px; font-weight: bold; color: #2563eb;">${s.grade || 0}%</td>
            </tr>`;
    });

    const pdfTemplate = `
        <div style="padding: 40px; font-family: 'Helvetica', sans-serif; color: #333;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="margin: 0; color: #1a202c; font-size: 28px;">${level} Academic Report</h1>
                <p style="margin: 5px 0; color: #718096; font-weight: bold;">${monthName} ${year}</p>
            </div>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background-color: #f7fafc; border-bottom: 2px solid #e2e8f0;">
                        <th style="padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; color: #4a5568;">Student Name</th>
                        <th style="padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; color: #4a5568;">Payments</th>
                        <th style="padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; color: #4a5568;">Attendance</th>
                        <th style="padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; color: #4a5568;">Grade</th>
                    </tr>
                </thead>
                <tbody>
                    ${rowsHtml}
                </tbody>
            </table>
            <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; font-size: 10px; color: #a0aec0; text-align: center;">
                Generated by Student Pro Dashboard
            </div>
        </div>`;

    const options = {
        margin: 0.5,
        filename: `${level}_Report_${monthName}_${year}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    html2pdf().from(pdfTemplate).set(options).save();
}
</script>
</body>
</html>
