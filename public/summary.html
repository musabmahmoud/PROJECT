<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Summary | Student Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 mb-10">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Academic <span class="text-blue-600">Insights</span></h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Performance by Level</p>
            </div>

            <div class="flex items-center gap-3 bg-gray-100 p-1.5 rounded-2xl border border-gray-200">
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <span class="text-blue-500 text-lg">📅</span>
                    <select id="monthSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03" selected>March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm">
                    <select id="yearSelect" onchange="loadSummary()" class="font-black text-gray-700 bg-transparent outline-none cursor-pointer">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <a href="index.html" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition-all">Back</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6">
        <div class="mb-8 flex justify-end">
            <button id="mainPdfBtn" onclick="generateFullYearlyReport(this)" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all flex items-center gap-2">
                <span id="btnIcon">📄</span> <span id="btnText">Download Full Yearly Report</span>
            </button>
        </div>

        <div id="summaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

<script>
const API = "/api/students";

window.onload = loadSummary;

async function loadSummary() {
    const month = document.getElementById("monthSelect").value;
    const year = document.getElementById("yearSelect").value;
    const targetMonth = `${year}-${month}`;
    const container = document.getElementById("summaryContainer");
    
    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 font-bold animate-pulse">Fetching ${month}/${year} Data...</div>`;

    try {
        const res = await fetch(`${API}?month=${targetMonth}`);
        const students = await res.json();
        container.innerHTML = "";

        const groups = {};
        students.forEach(s => {
            if (!groups[s.level]) groups[s.level] = [];
            groups[s.level].push(s);
        });

        Object.keys(groups).sort().forEach(level => {
            const group = groups[level];
            const totalMoney = group.reduce((a, s) => a + (Number(s.payments) || 0), 0);
            const totalPresents = group.reduce((a, s) => a + (Number(s.attendance) || 0), 0);
            const totalAbsences = group.reduce((a, s) => a + (Number(s.absences) || 0), 0);
            const graded = group.filter(s => s.grade > 0);
            const avgGrade = graded.length > 0 ? (graded.reduce((a, s) => a + s.grade, 0) / graded.length).toFixed(0) : 0;
            const attendRate = (totalPresents + totalAbsences > 0) ? Math.round((totalPresents / (totalPresents + totalAbsences)) * 100) : 0;

            container.innerHTML += `
                <div class="glass-card p-8 rounded-[2.5rem] hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 group">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-3xl font-black text-gray-900">${level}</h2>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">${group.length} Students</p>
                        </div>
                        <div class="bg-blue-50 text-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center font-black">
                            ${avgGrade}%
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase mb-1">Monthly Revenue</p>
                            <p class="text-2xl font-black text-gray-800">${totalMoney.toLocaleString()} <span class="text-xs text-gray-400">EGP</span></p>
                        </div>
                        <div>
                            <div class="flex justify-between text-[10px] font-black text-gray-400 uppercase mb-2">
                                <span>Attendance Rate</span>
                                <span class="text-blue-600">${attendRate}%</span>
                            </div>
                            <div class="w-full h-2.5 bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 rounded-full" style="width: ${attendRate}%"></div>
                            </div>
                            <div class="flex justify-between mt-3 text-[11px] font-bold">
                                <span class="text-green-500">✅ ${totalPresents} P</span>
                                <span class="text-red-400">❌ ${totalAbsences} A</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="generateFullYearlyReport(this)" class="w-full mt-8 py-4 bg-gray-900 text-white rounded-2xl font-bold text-sm group-hover:bg-blue-600 transition-all">
                        Full Yearly PDF
                    </button>
                </div>
            `;
        });
    } catch (err) {
        container.innerHTML = `<p class="text-red-500 font-bold text-center col-span-full">Error loading summary data.</p>`;
    }
}

async function generateFullYearlyReport(btn) {
    // 1. Loading State UI
    const originalContent = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = "<span>⏳</span> Generating PDF...";

    try {
        const year = document.getElementById("yearSelect").value;
        const res = await fetch(API); 
        const students = await res.json();

        // 2. Create hidden container for PDF content
        const element = document.createElement('div');
        element.style.padding = '40px';
        element.style.background = 'white';
        
        let tableRows = '';
        students.forEach(s => {
            let yPay = 0, yAtt = 0, yAbs = 0, totalG = 0, gCount = 0;
            if (s.records) {
                s.records.forEach(r => {
                    if (r.month && r.month.startsWith(year)) {
                        yPay += (Number(r.payments) || 0);
                        yAtt += (Number(r.attendance) || 0);
                        yAbs += (Number(r.absences) || 0);
                        if (r.grade > 0) { totalG += Number(r.grade); gCount++; }
                    }
                });
            }
            const finalGrade = gCount > 0 ? (totalG / gCount).toFixed(0) : 0;

            tableRows += `
                <tr style="border-bottom: 1px solid #edf2f7;">
                    <td style="padding: 12px; font-weight: 600;">${s.name}</td>
                    <td style="padding: 12px;">${s.level}</td>
                    <td style="padding: 12px; font-weight: 800; color: #2563eb;">${yPay.toLocaleString()} EGP</td>
                    <td style="padding: 12px;">✅ ${yAtt} | ❌ ${yAbs}</td>
                    <td style="padding: 12px; font-weight: 800; color: #7c3aed;">${finalGrade}%</td>
                </tr>
            `;
        });

        element.innerHTML = `
            <div style="text-align: center; margin-bottom: 30px; font-family: sans-serif;">
                <h1 style="margin-bottom: 5px;">STUDENT PRO PERFORMANCE REPORT</h1>
                <p style="color: #666; font-size: 14px;">ACADEMIC YEAR: ${year}</p>
            </div>
            <table style="width: 100%; border-collapse: collapse; font-family: sans-serif; font-size: 12px;">
                <thead>
                    <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                        <th style="padding: 12px; text-align: left;">STUDENT NAME</th>
                        <th style="padding: 12px; text-align: left;">LEVEL</th>
                        <th style="padding: 12px; text-align: left;">YEARLY PAID</th>
                        <th style="padding: 12px; text-align: left;">ATTENDANCE</th>
                        <th style="padding: 12px; text-align: left;">AVG GRADE</th>
                    </tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>
        `;

        // 3. PDF Options
        const opt = {
            margin: 0.5,
            filename: `Annual_Report_${year}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, logging: false, useCORS: true },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };

        // 4. Generate and Save
        await html2pdf().set(opt).from(element).save();
        
    } catch (err) {
        console.error(err);
        alert("Failed to generate PDF. Check console for errors.");
    } finally {
        // 5. Restore Button UI
        btn.disabled = false;
        btn.innerHTML = originalContent;
    }
}
</script>
</body>
</html>
