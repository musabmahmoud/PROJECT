<!DOCTYPE html>
<html lang="ar">
<head>

  <title>Titan ERP | Class Online Academy</title>

  <style>
    @media (max-width: 600px) {
    .erp-table thead { display: none; } /* Hide headers */
    .erp-table tr { display: block; margin-bottom: 1rem; border: 1px solid #eee; border-radius: 1rem; padding: 10px; }
    .erp-table td { display: flex; justify-content: space-between; border: none; padding: 5px 0; }
    .erp-table td::before { content: attr(data-label); font-weight: bold; color: #94a3b8; }
}
    /* Mobile Bottom Bar (Hidden on PC) */
.mobile-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: white;
    border-top: 1px solid #f1f5f9;
    z-index: 1000;
    justify-content: space-around;
    align-items: center;
}

/* Hide Desktop Sidebar on Mobile */
@media (max-width: 768px) {
    .sidebar { display: none !important; }
    .mobile-nav { display: flex; }
    .main-content { margin-left: 0 !important; padding: 1.5rem !important; margin-bottom: 80px; }
    .titan-card { border-radius: 1.2rem; padding: 1rem !important; }
    .erp-table { font-size: 12px; }
}
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root { 
      --titan-blue: #1e293b; 
      --accent-blue: #3b82f6;
      --titan-slate: #fcfdfe; 
      --sidebar-width: 100px;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #334155; 
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* --- SIDEBAR NAVIGATION --- */
    .sidebar { 
      width: var(--sidebar-width); 
      height: 100vh; 
      position: fixed; 
      left: 0; top: 0; 
      background: white; 
      border-right: 1px solid #f1f5f9; 
      z-index: 100; 
      display: flex; flex-direction: column; align-items: center; padding-top: 2.5rem;
    }

    .nav-icon { 
      width: 54px; height: 54px; margin-bottom: 1.5rem; 
      display: flex; align-items: center; justify-content: center; 
      border-radius: 16px; cursor: pointer; transition: all 0.3s ease; 
      font-size: 22px; text-decoration: none; color: #94a3b8;
    }
    .nav-icon:hover { background: #f8fafc; color: var(--accent-blue); }
    .nav-icon.active { background: #f1f5f9; color: var(--titan-blue); }

    .main-content { margin-left: var(--sidebar-width); padding: 4rem 6rem; max-width: 1600px; }
    .titan-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.01); }

    /* --- GRID STYLING --- */
    .grid-header { 
      background: #fafbfd; text-transform: uppercase; font-size: 10px; letter-spacing: 0.15em; 
      padding: 1.5rem; color: #94a3b8; font-weight: 700; border-bottom: 1px solid #f1f5f9; text-align: center;
    }

    .time-cell { 
        background: white; border-right: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; 
    }
/* --- TABLES MOBILE NAVIGATION --- */
.mobile-day-bar { display: none; }

@media (max-width: 768px) {
    .sidebar { display: none !important; }
    .main-content { margin-left: 0 !important; padding: 2rem 1rem 120px 1rem !important; }

    /* Show the Day Picker */
    .mobile-day-bar {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 15px;
        margin-bottom: 20px;
        scrollbar-width: none; /* Hide scrollbar Firefox */
    }
    .mobile-day-bar::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome */

    .day-pill {
        flex: 0 0 auto;
        padding: 10px 20px;
        background: white;
        border: 1px solid #f1f5f9;
        border-radius: 15px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        color: #94a3b8;
    }
    .day-pill.active {
        background: var(--titan-blue);
        color: white;
        border-color: var(--titan-blue);
    }

    /* Stack the Grid Vertically */
    #gridContainer { 
        display: flex !important; 
        flex-direction: column !important; 
        min-width: 100% !important; 
        gap: 15px;
    }
    
    .grid-header { display: none !important; } /* Hide the old table headers */

    /* Make Time Cells look like Header Dividers */
    .time-cell {
        padding: 1rem !important;
        background: #f8fafc !important;
        border-radius: 15px !important;
        flex-direction: row !important;
        justify-content: space-between !important;
    }

    .session-item {
        min-height: 80px !important;
        width: 100% !important;
    }
}

/* RTL Support for Arabic */
[lang="ar"] {
    direction: rtl;
    font-family: 'Plus Jakarta Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

[lang="ar"] .sidebar {
    left: auto;

@media (max-width: 768px) {

    /* COLOR ENGINE: Specific CSS classes assigned based on the subject name */
    .sub-math { background: #fefce8; color: #854d0e; border: 1px solid #fef08a; }
    .sub-science { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    .sub-break { background: #f8fafc; color: #64748b; border: 1px dashed #cbd5e1; }
    .cell-empty { border: 1px dashed #e2e8f0; background: transparent; color: #cbd5e1; }

    .session-item { transition: all 0.3s ease; cursor: pointer; border-radius: 1.2rem; }
    .session-item:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.05); }

    /* MODAL OVERLAY */
    .modal-backdrop { 
        backdrop-filter: blur(8px); display: none; background: rgba(15, 23, 42, 0.1); 
        position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center;
    }

    /* PRINT OPTIMIZATION: Removes UI elements like sidebars when printing a physical copy */
    @media print {
      .sidebar, .no-print { display: none !important; }
      .main-content { margin-left: 0 !important; padding: 0 !important; }
    }
  </style>
</head>

<h3 class="text-xl font-extrabold text-slate-900 mb-6">تعديل <span class="text-blue-500">الحصة</span></h3>
<input id="editSub" type="text" placeholder="اسم المادة (رياضيات، علوم، إلخ)" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl font-semibold outline-none text-right">

<h3 class="text-xl font-extrabold text-slate-900 mb-6 italic">إدارة <span class="text-blue-500">الجدول الزمني</span></h3>
<button onclick="closeTimeModal()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-[10px] uppercase">مزامنة المواعيد</button>

  <main class="main-content">
    <header class="flex flex-col xl:flex-row justify-between items-end mb-12 gap-8">
  <div>
    <div class="flex items-center gap-2 mb-3">
        <div class="w-2 h-2 rounded-full bg-blue-500"></div>

<div class="no-print flex items-center gap-3 bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
    <select id="selLevel" onchange="renderGrid()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none">
        <optgroup label="المرحلة الابتدائية">
            <option>الاول الابتدائي</option><option>الثاني الابتدائي</option><option>الثالث الابتدائي</option>
            <option>الرابع الابتدائي</option><option>الخامس الابتدائي</option><option>السادس الابتدائي</option>
        </optgroup>
        <optgroup label="المرحلة الإعدادية">
            <option>الصف الأول الإعدادي</option><option>الصف الثاني الإعدادي</option><option>الصف الثالث الإعدادي</option>
        </optgroup>
    </select>
    <select id="selGroup" onchange="renderGrid()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none">
        <option>المجموعة A</option>
        <option>المجموعة B</option>
    </select>
    <select id="selLang" onchange="renderGrid()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none">
        <option>مسار اللغات (English)</option>
        <option>المسار العربي</option>
    </select>
    <div class="w-[1px] h-6 bg-slate-100 mx-2"></div>

</div>

<div class="mobile-day-bar no-print" id="mobileDayPicker">
    <div class="day-pill active" onclick="setMobileDay(1, this)">الأحد</div>
    <div class="day-pill" onclick="setMobileDay(2, this)">الاثنين</div>
    <div class="day-pill" onclick="setMobileDay(3, this)">الثلاثاء</div>
    <div class="day-pill" onclick="setMobileDay(4, this)">الأربعاء</div>
    <div class="day-pill" onclick="setMobileDay(5, this)">الخميس</div>
</div>
    <div class="titan-card overflow-hidden">
        <div class="overflow-x-auto">
            <div id="gridContainer" class="grid grid-cols-6 min-w-[1100px]"></div>
        </div>
    </div>

    <footer class="mt-8 flex justify-between items-center no-print">
        <button onclick="openTimeManager()" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest hover:underline">⚙️ Configure Time Slots</button>
        <p class="text-[10px] text-slate-300 font-medium italic">Titan Cloud Systems v4.2.0</p>
    </footer>
  </main>

  <script>
    window.onload = async () => {
    const adminId = localStorage.getItem("user");
    if (!adminId) {
        window.location.href = "login.html";
        return;
    }

    try {
        const res = await fetch(`/api/tables?adminId=${adminId}`);
        const data = await res.json();
        db = data; // Syncs MongoDB data to your screen
        renderGrid();
    } catch (err) {
        console.error("Load failed:", err);
        renderGrid(); // Show empty grid if server is down
    }
};
function toggleMobileView() {
    const main = document.querySelector('.main-content');
    const isMobile = main.style.maxWidth === '430px';
    
    if (!isMobile) {
        main.style.maxWidth = '430px';
        main.style.margin = '0 auto';
        main.style.border = '10px solid #1e293b';
        main.style.borderRadius = '40px';
        main.style.height = '90vh';
        main.style.overflowY = 'auto';
        alert("Mobile View Simulated (iPhone Size)");
    } else {
        main.style.maxWidth = '1700px';
        main.style.margin = '0 0 0 100px';
        main.style.border = 'none';
        main.style.height = 'auto';
    }
}
// Make sure this matches exactly what you set in login.html
const adminId = localStorage.getItem("user"); 

if (!adminId) {
    console.error("No Admin ID found! Redirecting to login...");
    window.location.href = "login.html";
}
    // Configuration Data
const days = ["الحصة", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس"];    
    // PERSISTENCE: Load times and schedules from LocalStorage so they don't disappear on refresh
    let times = JSON.parse(localStorage.getItem('titan_times')) || ["08:00", "08:45", "09:30", "10:30", "11:15", "12:00"];
    let db = JSON.parse(localStorage.getItem('titan_master_schedules')) || {};
    let activeCellId = null;

    /**
     * GRID RENDERER:
     * Builds the visual timetable based on the selected Level, Group, and Language.
     */
    
    function renderGrid() {
      const container = document.getElementById('gridContainer');
      const level = document.getElementById('selLevel').value;
      const group = document.getElementById('selGroup').value;
      const lang = document.getElementById('selLang').value;
      
      // UNIQUE KEY: Identifies a specific schedule (e.g., "Sec 1-Group A-English")
      const configKey = `${level}-${group}-${lang}`;
      container.innerHTML = "";

      // Render Day Headers
      days.forEach(day => { container.innerHTML += `<div class="grid-header">${day}</div>`; });

      // Render Rows based on Time Slots
      times.forEach(time => {
        // First cell in row is the Time
container.innerHTML += `<div class="time-cell">
    <span class="text-sm font-bold text-slate-900">${time}</span>
    <span class="text-[9px] text-slate-300 font-bold uppercase mt-1">بداية الحصة</span>
</div>`;        
        // Next 5 cells are the Monday-Thursday slots
        for(let i=1; i<=5; i++) {
          const cellId = `${configKey}-${time}-${days[i]}`; // Database ID
          const data = db[cellId] || null;
          let colorClass = data ? getColor(data.sub) : "cell-empty";
          
          container.innerHTML += `
            <div class="p-3 border-r border-bottom border-slate-50 bg-white">
              <div onclick="openEditor('${cellId}')" class="session-item p-4 min-h-[100px] flex flex-col items-center justify-center text-center ${colorClass}">
                <span class="text-[10px] font-extrabold uppercase tracking-tight">${data ? data.sub : '+'}</span>
                ${data ? `<span class="text-[8px] font-bold opacity-60 mt-2 uppercase tracking-widest">${data.teacher}</span>` : ''}
              </div>
            </div>`;
        }
      });
    }

    /**
     * AUTO-STYLING: 
     * Returns a specific CSS class based on keywords found in the subject name.
     */
    function getColor(sub) {
        sub = sub.toLowerCase();
        if(sub.includes('math')) return "sub-math";
        if(sub.includes('science') || sub.includes('physics') || sub.includes('chemistry')) return "sub-science";
        if(sub.includes('english')) return "sub-english";
        if(sub.includes('arabic')) return "sub-arabic";
        if(sub.includes('german')) return "sub-german";
        if(sub.includes('break')) return "sub-break";
        return "bg-slate-900 text-white"; // Default dark style
    }
let activeMobileDayIndex = 1; // Default to Sunday

function setMobileDay(index, el) {
    activeMobileDayIndex = index;
    document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    renderGrid();
}

// UPDATE your existing renderGrid() function's loop:
function renderGrid() {
    const container = document.getElementById('gridContainer');
    const level = document.getElementById('selLevel').value;
    const group = document.getElementById('selGroup').value;
    const lang = document.getElementById('selLang').value;
    const configKey = `${level}-${group}-${lang}`;
    const isMobile = window.innerWidth <= 768;

    container.innerHTML = "";

    // Render Headers (Only for PC)
    if (!isMobile) {
        days.forEach(day => { container.innerHTML += `<div class="grid-header">${day}</div>`; });
    }

    times.forEach(time => {
        // Render Time Cell
        container.innerHTML += `<div class="time-cell">
            <span class="text-sm font-bold text-slate-900">${time}</span>
            <span class="text-[9px] text-slate-300 font-bold uppercase mt-1">Session Start</span>
        </div>`;
        
        // Loop Days
        for(let i=1; i<=5; i++) {
            // MOBILE FILTER: Skip days that aren't selected
            if (isMobile && i !== activeMobileDayIndex) continue;

            const cellId = `${configKey}-${time}-${days[i]}`;
            const data = db[cellId] || null;
            let colorClass = data ? getColor(data.sub) : "cell-empty";
            
            container.innerHTML += `
              <div class="p-1 md:p-3 border-r border-bottom border-slate-50 bg-white">
                <div onclick="openEditor('${cellId}')" class="session-item p-4 min-h-[100px] flex flex-col items-center justify-center text-center ${colorClass}">
                  <span class="text-[10px] font-extrabold uppercase tracking-tight">${data ? data.sub : '+'}</span>
                  ${data ? `<span class="text-[8px] font-bold opacity-60 mt-2 uppercase tracking-widest">${data.teacher}</span>` : ''}
                </div>
              </div>`;
        }
    });
}

// Add a listener to re-render when rotating phone
window.addEventListener('resize', renderGrid);
    /* --- TIMELINE MANAGEMENT --- */
    function openTimeManager() {
      const list = document.getElementById('timeList');
      list.innerHTML = "";
      times.forEach((t, i) => {
        list.innerHTML += `
          <div class="flex items-center gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
            <span class="font-bold text-slate-800 flex-1 ml-2 text-sm">${t}</span>
            <button onclick="removeTimeSlot(${i})" class="text-red-400 font-bold px-2">✕</button>
          </div>`;
      });
      document.getElementById('timeModal').style.display = 'flex';
    }

    function addTimeSlot() {
      const val = document.getElementById('newTimeInput').value;
      if(val) { times.push(val); times.sort(); document.getElementById('newTimeInput').value = ""; openTimeManager(); }
    }

    function removeTimeSlot(i) { times.splice(i, 1); openTimeManager(); }

    function closeTimeModal() {
      localStorage.setItem('titan_times', JSON.stringify(times));
      document.getElementById('timeModal').style.display = 'none';
      renderGrid();
    }

    /* --- SESSION EDITING --- */
    function openEditor(id) {
      activeCellId = id;
      const data = db[id] || { sub: '', teacher: '' };
      document.getElementById('editSub').value = data.sub;
      document.getElementById('editTeach').value = data.teacher;
      document.getElementById('editModal').style.display = 'flex';
    }

    async function saveSession() {
    const sub = document.getElementById('editSub').value.trim();
    const teacher = document.getElementById('editTeach').value.trim();
    
    // This grabs "OWNER_01" from your login
    const adminId = localStorage.getItem("user") || "OWNER_01"; 

    const payload = { 
        adminId: adminId, 
        cellId: activeCellId, // Ensure this variable exists in your grid logic
        session: sub ? { sub, teacher } : null 
    };

    try {
        const res = await fetch("/api/tables", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            // Update the local UI
            if(sub) db[activeCellId] = { sub, teacher };
            else delete db[activeCellId];
            
            closeModal();
            renderGrid();
            console.log("✅ Session saved to MongoDB for Owner");
        }
    } catch (err) {
        console.error("❌ Save Failed:", err);
        alert("Database connection lost! Check VS Code Terminal.");
    }
}

function closeModal() { 
    document.querySelectorAll('.modal-backdrop').forEach(m => m.style.display = 'none'); 
}

function logout() { 
    localStorage.removeItem("user"); 
    window.location.href = "login.html"; 
}

// COMBINED LOAD FUNCTION
window.onload = async () => {
    const adminId = localStorage.getItem("user");
    
    // 1. Safety check: if no adminId, go back to login
    if (!adminId) {
        window.location.href = "login.html";
        return;
    }

    try {
        const res = await fetch(`/api/tables?adminId=${adminId}`);
        const data = await res.json();
        
        // 3. Put the database data into your local memory
        db = data; 
        
        console.log("✅ Data synced from Titan Database");
    } catch (err) {
        console.error("❌ Failed to fetch from database:", err);
    }

    // 4. Finally, draw the grid (whether data was found or not)
    renderGrid(); 
};
  </script>
