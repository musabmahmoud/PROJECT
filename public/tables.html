<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Class Timetables</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    
    :root { --titan-blue: #2563eb; --titan-slate: #f8fafc; }
    
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--titan-slate); color: #0f172a; }

    .timetable-container {
      background: white;
      border-radius: 3rem;
      border: 1px solid #edf2f7;
      overflow: hidden;
    }

    .time-slot {
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
      height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .session-card {
      height: 85px;
      margin: 5px;
      border-radius: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .session-card:hover { transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }

    /* Subject Colors based on your image */
    .sub-math { background: #fefce8; color: #a16207; border-color: #fef08a; }
    .sub-science { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    .sub-english { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .sub-arabic { background: #fff1f2; color: #be123c; border-color: #fecdd3; }
    .sub-studies { background: #faf5ff; color: #7e22ce; border-color: #e9d5ff; }
    .sub-break { background: #f1f5f9; color: #64748b; border-style: dashed; border-color: #cbd5e1; }
  </style>
</head>
<body class="min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-24 hidden lg:flex flex-col items-center py-12 bg-white border-r border-slate-100 z-50">
    <div class="text-3xl font-black text-blue-600 mb-20 italic tracking-tighter">T.</div>
    <nav class="space-y-12 flex-1">
      <a href="index.html" class="p-5 text-slate-300 hover:text-blue-600 block text-2xl">📊</a>
      <a href="classes.html" class="p-5 text-slate-300 hover:text-blue-600 block text-2xl">🏫</a>
      <a href="tables.html" class="p-5 bg-blue-600 text-white rounded-[1.5rem] block shadow-2xl shadow-blue-500/40 text-2xl">📅</a>
    </nav>
  </aside>

  <main class="lg:ml-24 p-8 md:p-16 max-w-[1600px] mx-auto">
    
    <header class="flex flex-col xl:flex-row justify-between items-end gap-8 mb-12">
      <div>
        <h1 class="text-6xl font-black tracking-tighter uppercase italic text-slate-900 leading-none">
          Master <span class="text-blue-600">Schedule</span>
        </h1>
        <p class="mt-4 text-[11px] font-bold text-slate-400 uppercase tracking-[0.3em]">Egyptian National Curriculum • 2025/2026</p>
      </div>

      <div class="flex gap-4 bg-white p-3 rounded-[2rem] border border-slate-100 shadow-sm">
        <select id="viewLevel" class="p-4 bg-slate-50 rounded-2xl text-xs font-black uppercase outline-none">
          <option value="Primary 5">Primary 5</option>
          <option value="Prep 1">Prep 1</option>
          <option value="Secondary 2">Secondary 2</option>
        </select>
        <button class="bg-slate-900 text-white px-8 rounded-2xl font-black text-[10px] uppercase">Print PDF</button>
      </div>
    </header>

    <div class="timetable-container shadow-2xl shadow-blue-900/5">
      <div class="grid grid-cols-8 min-w-[1000px]">
        
        <div class="bg-slate-900 text-white p-6 flex items-center justify-center font-black uppercase text-[10px] tracking-widest border-r border-slate-800">Timeline</div>
        <div class="bg-white p-6 text-center font-black uppercase text-xs border-b border-slate-100">Sunday</div>
        <div class="bg-white p-6 text-center font-black uppercase text-xs border-b border-slate-100">Monday</div>
        <div class="bg-white p-6 text-center font-black uppercase text-xs border-b border-slate-100">Tuesday</div>
        <div class="bg-white p-6 text-center font-black uppercase text-xs border-b border-slate-100">Wednesday</div>
        <div class="bg-white p-6 text-center font-black uppercase text-xs border-b border-slate-100">Thursday</div>
        <div class="bg-white p-6 text-center font-black uppercase text-xs border-b border-slate-100">Friday</div>
        <div class="bg-white p-6 text-center font-black uppercase text-xs border-b border-slate-100">Saturday</div>

        <div class="time-slot border-r border-slate-100">
          <span class="text-lg font-black text-slate-800">08:00</span>
          <span class="text-[9px] font-bold text-slate-400 uppercase">Session 1</span>
        </div>
        <div class="p-1 border-b border-r border-slate-50">
          <div class="session-card sub-math">
            <span class="text-[10px] font-black uppercase tracking-widest">Math</span>
            <span class="text-[9px] font-bold opacity-60">Room 201</span>
          </div>
        </div>
        <div class="p-1 border-b border-r border-slate-50">
          <div class="session-card sub-arabic">
            <span class="text-[10px] font-black uppercase tracking-widest">Arabic</span>
          </div>
        </div>
        <div class="p-1 border-b border-r border-slate-50"><div class="session-card sub-math"><span>Math</span></div></div>
        <div class="p-1 border-b border-r border-slate-50"><div class="session-card sub-studies"><span>Social</span></div></div>
        <div class="p-1 border-b border-r border-slate-50"><div class="session-card sub-math"><span>Math</span></div></div>
        <div class="p-1 border-b border-r border-slate-50"></div> <div class="p-1 border-b border-slate-50"></div>

        <div class="time-slot border-r border-slate-100 bg-slate-50/50">
          <span class="text-sm font-black text-blue-600 uppercase">Break</span>
        </div>
        <div colspan="7" class="col-span-7 bg-slate-50/30 flex items-center justify-center border-b border-slate-100">
           <span class="text-[10px] font-black uppercase tracking-[1em] text-slate-300">Academic Recess</span>
        </div>

        <div class="time-slot border-r border-slate-100">
          <span class="text-lg font-black text-slate-800">10:30</span>
          <span class="text-[9px] font-bold text-slate-400 uppercase">Session 2</span>
        </div>
        <div class="p-1 border-b border-r border-slate-50">
            <div class="session-card sub-science">
              <span class="text-[10px] font-black uppercase tracking-widest">Science</span>
            </div>
        </div>
        <div class="p-1 border-b border-r border-slate-50">
            <div class="session-card sub-english">
              <span class="text-[10px] font-black uppercase tracking-widest">English</span>
            </div>
        </div>
        <div class="p-1 border-b border-r border-slate-50"><div class="session-card sub-science"><span>Science</span></div></div>
        <div class="p-1 border-b border-r border-slate-50"><div class="session-card sub-english"><span>English</span></div></div>
        <div class="p-1 border-b border-r border-slate-50"><div class="session-card sub-science"><span>Science</span></div></div>
        <div class="p-1 border-b border-r border-slate-50"></div>
        <div class="p-1 border-b border-slate-50"></div>

      </div>
    </div>
  </main>
</body>
</html>
