<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Academic Schedule</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root { 
      --titan-blue: #1e293b; 
      --accent-blue: #3b82f6;
      --titan-slate: #fcfdfe; 
      --sidebar-width: 100px;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #334155; 
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* --- SIDEBAR --- */
    .sidebar { 
      width: var(--sidebar-width); 
      height: 100vh; 
      position: fixed; 
      left: 0; 
      top: 0; 
      background: white; 
      border-right: 1px solid #f1f5f9; 
      z-index: 100; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding-top: 2.5rem;
    }

    .nav-icon { 
      width: 54px; 
      height: 54px; 
      margin-bottom: 1.5rem; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border-radius: 16px; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      font-size: 22px; 
      text-decoration: none;
      color: #94a3b8;
    }

    .nav-icon:hover { background: #f8fafc; color: var(--accent-blue); }
    .nav-icon.active { background: #f1f5f9; color: var(--titan-blue); }

    .main-content { margin-left: var(--sidebar-width); padding: 4rem 6rem; max-width: 1600px; }

    .titan-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.01); }

    /* --- GRID --- */
    .grid-header { 
      background: #fafbfd; text-transform: uppercase; font-size: 10px; letter-spacing: 0.15em; 
      padding: 1.5rem; color: #94a3b8; font-weight: 700; border-bottom: 1px solid #f1f5f9; text-align: center;
    }

    .time-cell { background: white; border-right: 1px solid #f8fafc; border-bottom: 1px solid #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }

    /* Subject Styles */
    .sub-math { background: #fefce8; color: #854d0e; border: 1px solid #fef08a; }
    .sub-science { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .sub-english { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .sub-arabic { background: #fff1f2; color: #9f1239; border: 1px solid #fecdd3; }
    .sub-german { background: #faf5ff; color: #6b21a8; border: 1px solid #e9d5ff; }
    .sub-break { background: #f8fafc; color: #64748b; border: 1px dashed #cbd5e1; }
    .cell-empty { border: 1px dashed #e2e8f0; background: transparent; color: #cbd5e1; }

    .session-item { transition: all 0.3s ease; cursor: pointer; border-radius: 1.2rem; }
    .session-item:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.05); }

    .modal-backdrop { 
        backdrop-filter: blur(8px); display: none; background: rgba(15, 23, 42, 0.1); 
        position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center;
    }

    @media print {
      .sidebar, .no-print { display: none !important; }
      .main-content { margin-left: 0 !important; padding: 0 !important; }
    }
  </style>
</head>
<body class="min-h-screen">

  <aside class="sidebar no-print">
    <div class="text-slate-900 font-bold text-3xl mb-16 tracking-tighter">T<span class="text-blue-500">.</span></div>
    <nav>
      <a href="index.html" class="nav-icon">👥</a>
      <a href="tables.html" class="nav-icon active">📅</a>
      <a href="classes.html" class="nav-icon">🏫</a>
      <a href="teachers.html" class="nav-icon">👨‍🏫</a>
    </nav>
    <div class="mt-auto mb-10 text-slate-300 hover:text-red-500 cursor-pointer" onclick="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </aside>

  <div id="editModal" class="modal-backdrop">
    <div class="bg-white w-full max-w-md rounded-[2rem] p-10 shadow-2xl border border-slate-100">
      <h3 class="text-xl font-extrabold text-slate-900 mb-6">Modify <span class="text-blue-500">Session</span></h3>
      <div class="space-y-4">
        <input id="editSub" type="text" placeholder="Course Name" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl font-semibold outline-none focus:border-blue-400">
        <input id="editTeach" type="text" placeholder="Instructor" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl font-semibold outline-none focus:border-blue-400">
        <div class="flex gap-3 pt-4">
          <button onclick="saveSession()" class="flex-1 bg-slate-900 text-white py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest">Update</button>
          <button onclick="closeModal()" class="px-6 bg-slate-100 text-slate-400 rounded-xl font-bold">✕</button>
        </div>
      </div>
    </div>
  </div>

  <div id="timeModal" class="modal-backdrop">
    <div class="bg-white w-full max-w-md rounded-[2rem] p-10 shadow-2xl border border-slate-100">
      <h3 class="text-xl font-extrabold text-slate-900 mb-6 italic">Manage <span class="text-blue-500">Timeline</span></h3>
      <div id="timeList" class="space-y-3 mb-6 max-h-64 overflow-y-auto pr-2"></div>
      <div class="flex gap-2 mb-6">
        <input id="newTimeInput" type="text" placeholder="09:00" class="flex-1 p-4 bg-slate-50 rounded-xl font-bold outline-none border border-slate-100">
        <button onclick="addTimeSlot()" class="bg-blue-500 text-white px-6 rounded-xl font-bold text-lg">+</button>
      </div>
      <button onclick="closeTimeModal()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest">Sync Timeline</button>
    </div>
  </div>

  <main class="main-content">
    <header class="flex flex-col xl:flex-row justify-between items-end mb-12 gap-8">
      <div>
        <div class="flex items-center gap-2 mb-3">
            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Institutional Timing</p>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">Academic <span class="text-slate-400 font-light">Schedule</span></h1>
      </div>

      <div class="no-print flex items-center gap-3 bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
        <select id="selLevel" onchange="renderGrid()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none">
            <optgroup label="Primary Stage">
                <option>Primary 1</option><option>Primary 2</option><option>Primary 3</option>
                <option>Primary 4</option><option>Primary 5</option><option>Primary 6</option>
            </optgroup>
            <optgroup label="Preparatory Stage">
                <option>Prep 1</option><option>Prep 2</option><option>Prep 3</option>
            </optgroup>
        </select>
        <select id="selGroup" onchange="renderGrid()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none"><option>Group A</option><option>Group B</option></select>
        <select id="selLang" onchange="renderGrid()" class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase outline-none"><option>English Track</option><option>Arabic Track</option></select>
        <div class="w-[1px] h-6 bg-slate-100 mx-2"></div>
        <button onclick="window.print()" class="px-5 py-2 hover:bg-slate-50 text-slate-400 rounded-xl text-[10px] font-bold uppercase">Export</button>
      </div>
    </header>

    <div class="titan-card overflow-hidden">
        <div class="overflow-x-auto">
            <div id="gridContainer" class="grid grid-cols-6 min-w-[1100px]"></div>
        </div>
    </div>

    <footer class="mt-8 flex justify-between items-center no-print">
        <button onclick="openTimeManager()" class="text-[10px] font-bold text-blue-500 uppercase tracking-widest hover:underline">⚙️ Configure Time Slots</button>
        <p class="text-[10px] text-slate-300 font-medium italic">Titan Cloud Systems v4.2.0</p>
    </footer>
  </main>

  <script>
    // 1. CONFIGURATION
    const API_BASE = "http://localhost:5000/api/tables"; // Ensure this matches your server.js
    const adminId = localStorage.getItem("user");

    const days = ["Period", "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday"];
    let times = ["08:00", "08:45", "09:30", "10:30", "11:15", "12:00"];
    let db = {}; // Global memory for the fetched schedule
    let activeCellId = null;

    // Initialize Page
    window.onload = async () => {
      if(!adminId) { window.location.href="login.html"; return; }
      await loadTimeSlots();
      await loadFullSchedule();
    };

    // 2. DATABASE SYNC: TIME SLOTS
async function loadTimeSlots() {
  try {
    const res = await fetch(`${API_BASE}/config/times?adminId=${adminId}`);
    if (res.ok) {
      const data = await res.json();
      // If the DB has custom slots, use them; otherwise, use the defaults
      if (data && data.slots && data.slots.length > 0) {
        times = data.slots;
      }
    }
    // ALWAYS call renderGrid after trying to load times
    renderGrid(); 
  } catch (err) { 
    console.error("Time sync failed:", err);
    renderGrid(); 
  }
}

async function moveTimeSlot(index, direction) {
    const newIndex = index + direction;
    if (newIndex < 0 || newIndex >= times.length) return;

    // Swap positions in the array
    [times[index], times[newIndex]] = [times[newIndex], times[index]];

    openTimeManager(); // Refresh the popup
    await saveTimeSlots(); // Sync to MongoDB
    renderGrid(); // Re-draw the table with new order
}
    async function saveTimeSlots() {
      try {
        await fetch(`${API_BASE}/config/times`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminId, slots: times })
        });
      } catch (err) { alert("Failed to save timeline to cloud."); }
    }

    // 3. DATABASE SYNC: MASTER SCHEDULE
    async function loadFullSchedule() {
      try {
        const res = await fetch(`${API_BASE}?adminId=${adminId}`);
        if (res.ok) {
          db = await res.json(); // Expected: { "cell-id": { sub, teacher }, ... }
          renderGrid();
        }
      } catch (err) { console.error("Schedule sync failed:", err); }
    }

    // 4. UI RENDERING
    function renderGrid() {
      const container = document.getElementById('gridContainer');
      const level = document.getElementById('selLevel').value;
      const group = document.getElementById('selGroup').value;
      const lang = document.getElementById('selLang').value;
      const configKey = `${level}-${group}-${lang}`;
      container.innerHTML = "";

      days.forEach(day => { container.innerHTML += `<div class="grid-header">${day}</div>`; });

      times.forEach(time => {
        container.innerHTML += `<div class="time-cell"><span class="text-sm font-bold text-slate-900">${time}</span><span class="text-[9px] text-slate-300 font-bold uppercase mt-1">Start</span></div>`;
        for(let i=1; i<=5; i++) {
          const cellId = `${level}-${group}-${lang}-${time}-${days[i]}`;
          const data = db[cellId] || null;
          let colorClass = data ? getColor(data.sub) : "cell-empty";
          container.innerHTML += `
            <div class="p-3 border-r border-bottom border-slate-50 bg-white">
              <div onclick="openEditor('${cellId}')" class="session-item p-4 min-h-[100px] flex flex-col items-center justify-center text-center ${colorClass}">
                <span class="text-[10px] font-extrabold uppercase tracking-tight">${data ? data.sub : '+'}</span>
                ${data ? `<span class="text-[8px] font-bold opacity-60 mt-2 uppercase tracking-widest">${data.teacher}</span>` : ''}
              </div>
            </div>`;
        }
      });
    }

    function getColor(sub) {
        sub = sub.toLowerCase();
        if(sub.includes('math')) return "sub-math";
        if(sub.includes('science')) return "sub-science";
        if(sub.includes('english')) return "sub-english";
        if(sub.includes('arabic')) return "sub-arabic";
        if(sub.includes('german')) return "sub-german";
        if(sub.includes('break')) return "sub-break";
        return "bg-slate-900 text-white";
    }

    /* --- TIME MANAGER --- */
  /* --- ADVANCED TIME MANAGER --- */
function openTimeManager() {
  const list = document.getElementById('timeList');
  list.innerHTML = "";
  
  times.forEach((t, i) => {
    list.innerHTML += `
      <div class="flex items-center gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100 group">
        <span class="font-bold text-slate-800 flex-1 ml-2 text-sm">${t}</span>
        
        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="moveTimeSlot(${i}, -1)" class="p-2 hover:bg-white rounded-lg text-slate-400 hover:text-blue-500">↑</button>
            <button onclick="moveTimeSlot(${i}, 1)" class="p-2 hover:bg-white rounded-lg text-slate-400 hover:text-blue-500">↓</button>
        </div>

        <div class="w-[1px] h-4 bg-slate-200 mx-1"></div>
        <button onclick="removeTimeSlot(${i})" class="text-red-400 font-bold px-2 hover:bg-red-50 rounded-lg">✕</button>
      </div>`;
  });
  document.getElementById('timeModal').style.display = 'flex';
}

// The "Flexible" Logic: Swaps array elements
async function moveTimeSlot(index, direction) {
    const newIndex = index + direction;
    
    // Boundary check
    if (newIndex < 0 || newIndex >= times.length) return;

    // Swap positions
    const temp = times[index];
    times[index] = times[newIndex];
    times[newIndex] = temp;

    // Refresh the UI manager
    openTimeManager();
    
    // Auto-sync to Database so the order is saved immediately
    await saveTimeSlots();
}

function addTimeSlot() {
  const val = document.getElementById('newTimeInput').value.trim();
  if(val) { 
    times.push(val); 
    // Note: We removed the auto-sort so you can order them manually!
    document.getElementById('newTimeInput').value = ""; 
    openTimeManager(); 
  }
}

async function removeTimeSlot(i) { 
  if(confirm("Remove this time period? Any sessions in this slot will be hidden.")) {
    times.splice(i, 1); 
    openTimeManager();
    await saveTimeSlots();
  }
}

    /* --- SESSION EDITING --- */
    function openEditor(id) {
      activeCellId = id;
      const data = db[id] || { sub: '', teacher: '' };
      document.getElementById('editSub').value = data.sub;
      document.getElementById('editTeach').value = data.teacher;
      document.getElementById('editModal').style.display = 'flex';
    }

   async function saveSession() {
  const sub = document.getElementById('editSub').value.trim();
  const teacher = document.getElementById('editTeach').value.trim();
  
  // Create the package exactly how the Backend Router wants it
  const payload = { 
    adminId: adminId, 
    cellId: activeCellId, 
    session: sub ? { sub, teacher } : null 
  };

  try {
    const res = await fetch(API_BASE, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
        // Update local memory so the UI changes immediately
        if(sub) db[activeCellId] = { sub, teacher };
        else delete db[activeCellId];
        
        closeModal();
        renderGrid();
    } else {
        const errorData = await res.json();
        alert("Cloud rejected the save: " + errorData.message);
    }
  } catch (err) { 
      console.error("Network Error:", err);
      alert("Failed to sync session. Check if Backend is running!"); 
  }
}

    function closeModal() { document.querySelectorAll('.modal-backdrop').forEach(m => m.style.display = 'none'); }
    
    function logout() { 
        localStorage.clear(); 
        window.location.href="login.html"; 
    }
  </script>
</body>
</html>
