<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Class Online Academy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root { --titan-blue: #1e293b; --accent-blue: #3b82f6; --titan-slate: #fcfdfe; --sidebar-width: 100px; }
    
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--titan-slate); color: #334155; margin: 0; -webkit-font-smoothing: antialiased; }

    /* --- SIDEBAR (PC ONLY) --- */
    .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; background: white; border-right: 1px solid #f1f5f9; z-index: 100; display: flex; flex-direction: column; align-items: center; padding-top: 2.5rem; }
    .nav-icon { width: 54px; height: 54px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; transition: all 0.3s ease; font-size: 22px; text-decoration: none; color: #94a3b8; }
    .nav-icon.active { background: #f1f5f9; color: var(--titan-blue); }

    /* --- LAYOUT --- */
    .main-content { margin-left: var(--sidebar-width); padding: 4rem 6rem; max-width: 1500px; transition: all 0.3s ease; }
    .titan-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; }
    .payroll-card { background: #1e293b; border-radius: 2rem; position: relative; overflow: hidden; color: white; }
    .input-luxury { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem 1.2rem; font-weight: 500; font-size: 13px; outline: none; width: 100%; }
    .btn-dark { background: #1e293b; color: white; padding: 1rem 2rem; border-radius: 1rem; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; width: 100%; }

    /* --- MOBILE RESPONSIVE ENGINE --- */
    .mobile-nav { display: none; }

    @media (max-width: 768px) {
        .sidebar { display: none !important; }
        .main-content { margin-left: 0 !important; padding: 2rem 1rem 100px 1rem !important; }
        
        /* Floating Bottom Nav */
        .mobile-nav { 
            display: flex; position: fixed; bottom: 20px; left: 15px; right: 15px; 
            height: 70px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 15px 35px rgba(30, 41, 59, 0.15); z-index: 1000;
            justify-content: space-around; align-items: center;
        }

        /* Adjust Header for Mobile */
        header.grid { grid-template-columns: 1fr !important; gap: 2rem !important; margin-bottom: 2rem !important; }
        h1 { font-size: 2.8rem !important; }
        .payroll-card { padding: 1.5rem !important; }

        /* Authorize Hire Form Stacking */
        section.titan-card .flex { flex-direction: column !important; }
        
        /* Table to Card Conversion */
        .teacher-table thead { display: none; }
        .teacher-table tr { 
            display: block; background: white; margin-bottom: 1rem; 
            border: 1px solid #f1f5f9; border-radius: 1.5rem; padding: 1.2rem; 
            position: relative;
        }
        .teacher-table td { display: block; width: 100% !important; border: none !important; padding: 0.4rem 0 !important; }
        
        /* Position the "Resolve Contract" button as a small 'X' or link at bottom */
        .teacher-table td:last-child { 
            border-top: 1px solid #f8fafc !important; 
            margin-top: 10px; 
            padding-top: 10px !important;
            text-align: center !important; 
        }
    }

    /* RTL Support for Arabic */
[lang="ar"] {
    direction: rtl;
    font-family: 'Plus Jakarta Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

[lang="ar"] .sidebar {
    left: auto;
    right: 0;
    border-right: none;
    border-left: 1px solid #f1f5f9;
}

[lang="ar"] .main-content {
    margin-left: 0;
    margin-right: var(--sidebar-width);
}

@media (max-width: 768px) {
    [lang="ar"] .main-content {
        margin-right: 0 !important;
    }
}
</style>
</head>
<body class="min-h-screen">

  <aside class="sidebar no-print">
    <div class="mt-auto mb-4 text-slate-400 hover:text-blue-500 cursor-pointer" onclick="toggleMobileView()" title="Simulate Mobile">
    📱
</div>
    <div class="text-slate-900 font-bold text-3xl mb-16 tracking-tighter">T<span class="text-blue-500">.</span></div>
    <nav>
      <a href="index.html" class="nav-icon" title="Registry">👥</a>
      <a href="tables.html" class="nav-icon" title="Schedules">📅</a>
      <a href="classes.html" class="nav-icon" title="Attendance">🏫</a>
      <a href="teachers.html" class="nav-icon active" title="Faculty">👨‍🏫</a>
      <div onclick="toggleMobileView()" class="nav-icon">📱</div>
    </nav>
    <div class="mt-auto mb-10 text-slate-300 hover:text-red-500 cursor-pointer transition-colors" onclick="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </aside>

<main class="main-content">
  <header class="grid grid-cols-1 lg:grid-cols-3 gap-12 mb-16 items-center">
    <div class="lg:col-span-2">
      <div class="flex items-center gap-2 mb-3">
          <div class="w-2 h-2 rounded-full bg-blue-500"></div>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">شؤون العاملين والعمليات</p>
      </div>
      <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">
        أكاديمية <span class="text-slate-400 font-light">كلاس أونلاين</span>
      </h1>
    </div>

    <div class="payroll-card p-10 text-white shadow-xl shadow-slate-200">
      <span class="text-[9px] font-bold uppercase tracking-[0.2em] text-slate-400">إجمالي المصروفات الشهرية</span>
      <div class="flex items-baseline gap-2 mt-2">
        <h2 id="totalPayroll" class="text-4xl font-extrabold tracking-tighter">0</h2>
        <span class="text-xs font-bold text-slate-500 uppercase">جنية</span>
      </div>
      <div class="mt-4 flex items-center gap-2 text-[10px] text-emerald-400 font-bold">
          <span class="flex h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
          الميزانية نشطة
      </div>
    </div>
  </header>

<section class="titan-card p-8 mb-12 bg-white">
  <h3 class="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-6">تعيين أعضاء هيئة التدريس</h3>
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
    <input id="tName" type="text" placeholder="الاسم الرباعي بالكامل" class="input-luxury w-full text-right">
    <input id="tSubject" type="text" placeholder="القسم الأكاديمي" class="input-luxury w-full text-right">
    <input id="tSalary" type="number" placeholder="الراتب الشهري" class="input-luxury w-full text-right">
    <button onclick="addTeacher()" class="btn-dark-small w-full">اعتماد التعيين</button>
  </div>
</section>

<div class="titan-card overflow-hidden">
    <table class="w-full text-right teacher-table"> <thead>
        <tr>
          <th class="w-1/3">بيانات المحاضر</th>
          <th>القسم الأكاديمي</th>
          <th>الراتب الشهري</th>
          <th class="text-left">الإجراءات</th> </tr>
      </thead>
      <tbody id="teacherBody"></tbody>
    </table>
</div>
  </main>

  <script>
// Make sure this matches exactly what you set in login.html
const adminId = localStorage.getItem("user");

  if (!adminId) {
    window.location.href = "login.html";
  }

  // Load teachers immediately when the page opens
  window.onload = loadTeachers;

async function loadTeachers() {
    const tbody = document.getElementById("teacherBody");
    const totalDisplay = document.getElementById("totalPayroll");
    
    try {
        const res = await fetch(`/api/teachers?adminId=${adminId}`);
        if (!res.ok) throw new Error("Connection Lost");
        
        const teachers = await res.json();
        tbody.innerHTML = "";
        let total = 0;

        if (teachers.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-slate-300 italic text-sm tracking-widest uppercase">No Active Faculty Records</td></tr>`;
            totalDisplay.innerText = "0";
            return;
        }

        teachers.forEach((t) => {
            total += Number(t.salary || 0);
            
            // Generate clean initials for the profile circle
            const initials = t.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

            // ... inside the forEach loop ...
tbody.innerHTML += `
    <tr class="hover:bg-slate-50/50 transition-all border-b border-slate-50">
        <td class="px-4 md:px-8 py-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center font-bold text-xs shadow-sm">
                    ${initials}
                </div>
                <div>
                    <p class="text-sm font-extrabold text-slate-800 leading-tight">${t.name}</p>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter mt-1">كود: ${t._id.slice(-6).toUpperCase()}</p>
                </div>
            </div>
        </td>
        <td class="px-4 md:px-8 py-6">
            <div class="flex flex-col md:block">
                <span class="md:hidden text-[8px] font-black text-slate-300 uppercase mb-1">القسم</span>
                <span class="w-fit px-3 py-1 rounded-lg bg-slate-100 text-slate-600 text-[9px] font-bold uppercase tracking-wider">
                    ${t.subject || 'عام'}
                </span>
            </div>
        </td>
        <td class="px-4 md:px-8 py-6">
            <div class="flex justify-between items-center md:block">
                <span class="md:hidden text-[8px] font-black text-slate-300 uppercase">الراتب</span>
                <p class="text-sm font-black text-emerald-600">£${Number(t.salary).toLocaleString()}</p>
            </div>
        </td>
        <td class="px-4 md:px-8 py-6 text-left"> <button onclick="removeTeacher('${t._id}')" 
                    class="w-full md:w-auto px-4 py-2 border border-transparent md:border-slate-100 rounded-xl text-slate-300 hover:text-red-500 hover:bg-red-50 font-bold text-[9px] uppercase tracking-widest transition-all">
                إنهاء التعاقد
            </button>
        </td>
    </tr>`;
        });

        // Update the big Expenditure Card at the top
        totalDisplay.innerText = total.toLocaleString();

    } catch (err) {
        console.error("System Sync Error:", err);
        tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-red-400 font-bold">CRITICAL: Database Uplink Failed</td></tr>`;
    }
}

  async function addTeacher() {
    const name = document.getElementById("tName").value.trim();
    const subject = document.getElementById("tSubject").value.trim();
    const salary = document.getElementById("tSalary").value.trim();

    if (!name || !salary) {
      alert("⚠️ Name and Salary are required.");
      return;
    }

    try {
      const res = await fetch("/api/teachers", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, subject, salary, adminId })
      });

      if (res.ok) {
        document.getElementById("tName").value = "";
        document.getElementById("tSubject").value = "";
        document.getElementById("tSalary").value = "";
        loadTeachers(); // Refresh list from DB
      } else {
        alert("Server Error while saving.");
      }
    } catch (err) {
      alert("Connection failed. Check Vercel logs.");
    }
  }
function toggleMobileView() {
    const main = document.querySelector('.main-content');
    const isMobile = main.style.maxWidth === '430px';
    
    if (!isMobile) {
        main.style.maxWidth = '430px';
        main.style.margin = '0 auto';
        main.style.border = '10px solid #1e293b';
        main.style.borderRadius = '40px';
        main.style.height = '90vh';
        main.style.overflowY = 'auto';
        alert("Mobile View Simulated (iPhone Size)");
    } else {
        main.style.maxWidth = '1700px';
        main.style.margin = '0 0 0 100px';
        main.style.border = 'none';
        main.style.height = 'auto';
    }
}
  async function removeTeacher(id) {
    if (!confirm("Are you sure?")) return;
    try {
      const res = await fetch(`/api/teachers/${id}?adminId=${adminId}`, { method: "DELETE" });
      if (res.ok) loadTeachers();
    } catch (err) {
      alert("Delete failed.");
    }
  }

  function logout() { localStorage.clear(); window.location.href = "login.html"; }
  </script>
  <nav class="mobile-nav no-print">
    <a href="index.html" class="nav-icon">👥</a>
    <a href="tables.html" class="nav-icon">📅</a>
    <a href="classes.html" class="nav-icon">🏫</a>
    <a href="teachers.html" class="nav-icon active">👨‍🏫</a>
</nav>
</body>
</html>
