<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Faculty & Payroll</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    
    :root { --titan-blue: #2563eb; --titan-slate: #f8fafc; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #0f172a; 
    }

    .titan-card { 
      background: white; 
      border-radius: 2.5rem; 
      border: 1px solid #edf2f7; 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.02);
    }

    .stat-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-radius: 2.5rem;
    }

    .teacher-row { transition: all 0.3s ease; }
    .teacher-row:hover { transform: scale(1.01); }

    .input-flat {
      background: #f1f5f9;
      border: none;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      font-weight: 700;
      font-size: 0.875rem;
      outline: none;
    }
  </style>
</head>
<body class="min-h-screen">

  <aside class="fixed left-0 top-0 h-full w-24 hidden lg:flex flex-col items-center py-12 bg-white border-r border-slate-100 z-50">
    <div class="text-3xl font-black text-blue-600 mb-20 italic tracking-tighter">T.</div>
    <nav class="space-y-12 flex-1">
      <a href="index.html" class="p-5 text-slate-300 hover:text-blue-600 block text-2xl transition-all">📊</a>
      <a href="classes.html" class="p-5 text-slate-300 hover:text-blue-600 block text-2xl transition-all">🏫</a>
      <a href="teachers.html" class="p-5 bg-blue-600 text-white rounded-[1.5rem] block shadow-2xl shadow-blue-500/40 text-2xl">👨‍🏫</a>
      <a href="tables.html" class="p-5 text-slate-300 hover:text-blue-600 block text-2xl transition-all">📅</a>

    </nav>
  </aside>

  <main class="lg:ml-24 p-8 md:p-16 max-w-[1400px] mx-auto">
    
    <header class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
      <div class="md:col-span-2">
        <h1 class="text-6xl font-black tracking-tighter uppercase italic text-slate-900 leading-none">
          Faculty <span class="text-blue-600">Payroll</span>
        </h1>
        <p class="mt-4 text-[11px] font-bold text-slate-400 uppercase tracking-[0.3em]">Management Console v4.0</p>
      </div>

      <div class="stat-card p-10 text-white flex flex-col justify-center shadow-2xl shadow-slate-900/20">
        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Total Monthly Expenditure</span>
        <div class="flex items-end gap-2 mt-2">
          <h2 id="totalPayroll" class="text-5xl font-black tracking-tighter text-emerald-400">0</h2>
          <span class="text-lg font-bold text-slate-500 mb-1">EGP</span>
        </div>
      </div>
    </header>

    <section class="titan-card p-8 mb-12 flex flex-col lg:flex-row gap-6 items-center bg-white">
      <input id="tName" type="text" placeholder="Teacher Name" class="input-flat flex-1 w-full">
      <input id="tSubject" type="text" placeholder="Subject (e.g. Physics)" class="input-flat w-full lg:w-48">
      <input id="tSalary" type="number" placeholder="Base Salary" class="input-flat w-full lg:w-48">
      <button onclick="addTeacher()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-[11px] uppercase hover:bg-blue-700 transition-all w-full lg:w-auto">Hire +</button>
    </section>

    <div class="titan-card overflow-hidden">
      <div class="overflow-x-auto p-6">
        <table class="w-full text-left border-separate border-spacing-y-4">
          <thead>
            <tr class="text-[11px] font-black text-slate-300 uppercase tracking-widest">
              <th class="px-10 py-2">Professor</th>
              <th class="px-10 py-2">Department</th>
              <th class="px-10 py-2">Contract Salary</th>
              <th class="px-10 py-2 text-right">Action</th>
            </tr>
          </thead>
          <tbody id="teacherBody">
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const user = localStorage.getItem("user");
    // Using a local array for now, but you can sync this to a new /api/teachers route
    let teachers = JSON.parse(localStorage.getItem(`teachers_${user}`)) || [];

    window.onload = () => {
      if(!user) { window.location.href="login.html"; return; }
      renderTeachers();
    };

    function renderTeachers() {
      const tbody = document.getElementById("teacherBody");
      const totalDisplay = document.getElementById("totalPayroll");
      tbody.innerHTML = "";
      let total = 0;

      teachers.forEach((t, index) => {
        total += Number(t.salary);
        tbody.innerHTML += `
          <tr class="bg-white teacher-row shadow-sm hover:shadow-md border border-slate-50">
            <td class="px-10 py-6 rounded-l-[2rem]">
              <p class="text-xl font-black text-slate-800 tracking-tighter">${t.name}</p>
              <span class="text-[10px] font-bold text-slate-300 uppercase">Faculty Member ID: 00${index + 1}</span>
            </td>
            <td class="px-10 py-6">
              <span class="px-4 py-1.5 rounded-full bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-wider">
                ${t.subject}
              </span>
            </td>
            <td class="px-10 py-6">
              <p class="text-lg font-black text-emerald-600 tracking-tighter">£${Number(t.salary).toLocaleString()}</p>
            </td>
            <td class="px-10 py-6 rounded-r-[2rem] text-right">
              <button onclick="removeTeacher(${index})" class="text-slate-300 hover:text-red-500 font-black text-xs uppercase tracking-widest transition-colors">Terminate</button>
            </td>
          </tr>
        `;
      });

      totalDisplay.innerText = total.toLocaleString();
    }

    function addTeacher() {
      const name = document.getElementById("tName").value;
      const subject = document.getElementById("tSubject").value;
      const salary = document.getElementById("tSalary").value;

      if(!name || !salary) return alert("Please fill details");

      teachers.push({ name, subject, salary });
      saveAndRender();
      
      // Clear inputs
      document.getElementById("tName").value = "";
      document.getElementById("tSubject").value = "";
      document.getElementById("tSalary").value = "";
    }

    function removeTeacher(index) {
      if(confirm("Confirm removal of faculty member?")) {
        teachers.splice(index, 1);
        saveAndRender();
      }
    }

    function saveAndRender() {
      localStorage.setItem(`teachers_${user}`, JSON.stringify(teachers));
      renderTeachers();
    }
  </script>
</body>
</html>
