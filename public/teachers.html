<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan ERP | Faculty Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root { 
      --titan-blue: #1e293b; 
      --accent-blue: #3b82f6;
      --titan-slate: #fcfdfe; 
      --sidebar-width: 100px;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--titan-slate); 
      color: #334155; 
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* --- REFINED SIDEBAR --- */
    .sidebar { 
      width: var(--sidebar-width); 
      height: 100vh; 
      position: fixed; 
      left: 0; 
      top: 0; 
      background: white; 
      border-right: 1px solid #f1f5f9; 
      z-index: 100; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding-top: 2.5rem;
    }

    .nav-icon { 
      width: 54px; 
      height: 54px; 
      margin-bottom: 1.5rem; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border-radius: 16px; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      font-size: 22px; 
      text-decoration: none;
      color: #94a3b8;
    }

    .nav-icon:hover { background: #f8fafc; color: var(--accent-blue); }
    .nav-icon.active { background: #f1f5f9; color: var(--titan-blue); }

    .main-content { 
      margin-left: var(--sidebar-width); 
      padding: 4rem 6rem; 
      max-width: 1500px;
    }

    /* --- LUXURY CARDS --- */
    .titan-card { 
      background: white; 
      border-radius: 2rem; 
      border: 1px solid #f1f5f9; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.01);
    }

    .payroll-card {
      background: #1e293b;
      border-radius: 2rem;
      position: relative;
      overflow: hidden;
    }

    .payroll-card::after {
        content: '';
        position: absolute;
        top: -50%;
        right: -10%;
        width: 300px;
        height: 300px;
        background: rgba(59, 130, 246, 0.05);
        border-radius: 50%;
    }

    /* --- INPUTS --- */
    .input-luxury {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      font-weight: 500;
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-luxury:focus {
      border-color: var(--accent-blue);
      background: white;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05);
    }

    .btn-dark {
      background: #1e293b;
      color: white;
      padding: 1rem 2rem;
      border-radius: 1rem;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s ease;
    }

    .btn-dark:hover { background: #000; transform: translateY(-1px); }

    .teacher-table th { 
      background: #fafbfd; 
      text-transform: uppercase; 
      font-size: 10px; 
      letter-spacing: 0.15em; 
      padding: 1.5rem 2rem; 
      color: #94a3b8; 
      font-weight: 700; 
      border-bottom: 1px solid #f1f5f9;
    }
  </style>
</head>
<body class="min-h-screen">

  <aside class="sidebar no-print">
    <div class="text-slate-900 font-bold text-3xl mb-16 tracking-tighter">T<span class="text-blue-500">.</span></div>
    <nav>
      <a href="index.html" class="nav-icon" title="Registry">👥</a>
      <a href="tables.html" class="nav-icon" title="Schedules">📅</a>
      <a href="classes.html" class="nav-icon" title="Attendance">🏫</a>
      <a href="teachers.html" class="nav-icon active" title="Faculty">👨‍🏫</a>
    </nav>
    <div class="mt-auto mb-10 text-slate-300 hover:text-red-500 cursor-pointer transition-colors" onclick="logout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
    </div>
  </aside>

  <main class="main-content">
    
    <header class="grid grid-cols-1 lg:grid-cols-3 gap-12 mb-16 items-center">
      <div class="lg:col-span-2">
        <div class="flex items-center gap-2 mb-3">
            <div class="w-2 h-2 rounded-full bg-blue-500"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Staffing & Operations</p>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">
          Faculty <span class="text-slate-400 font-light">Resources</span>
        </h1>
      </div>

      <div class="payroll-card p-10 text-white shadow-xl shadow-slate-200">
        <span class="text-[9px] font-bold uppercase tracking-[0.2em] text-slate-400">Monthly Expenditure</span>
        <div class="flex items-baseline gap-2 mt-2">
          <h2 id="totalPayroll" class="text-4xl font-extrabold tracking-tighter">0</h2>
          <span class="text-xs font-bold text-slate-500 uppercase">EGP</span>
        </div>
        <div class="mt-4 flex items-center gap-2 text-[10px] text-emerald-400 font-bold">
            <span class="flex h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
            BUDGET ACTIVE
        </div>
      </div>
    </header>

    <section class="titan-card p-8 mb-12 bg-white">
      <h3 class="text-[11px] font-bold uppercase tracking-widest text-slate-400 mb-6">Faculty Appointment</h3>
      <div class="flex flex-col xl:flex-row gap-4">
        <input id="tName" type="text" placeholder="Full Legal Name" class="input-luxury flex-1">
        <input id="tSubject" type="text" placeholder="Department (e.g. Physics)" class="input-luxury xl:w-64">
        <input id="tSalary" type="number" placeholder="Contract Salary" class="input-luxury xl:w-48">
        <button onclick="addTeacher()" class="btn-dark">Authorize Hire</button>
      </div>
    </section>

    <div class="titan-card overflow-hidden">
        <table class="w-full text-left teacher-table">
          <thead>
            <tr>
              <th class="w-1/3">Instructor Information</th>
              <th>Academic Department</th>
              <th>Monthly Compensation</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="teacherBody">
            </tbody>
        </table>
    </div>
  </main>

  <script>
    const user = localStorage.getItem("user");
    let teachers = JSON.parse(localStorage.getItem(`teachers_${user}`)) || [];

    window.onload = () => {
      if(!user) { window.location.href="login.html"; return; }
      renderTeachers();
    };

    function renderTeachers() {
      const tbody = document.getElementById("teacherBody");
      const totalDisplay = document.getElementById("totalPayroll");
      tbody.innerHTML = "";
      let total = 0;

      if(teachers.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-slate-300 font-medium italic text-sm">No faculty records found.</td></tr>`;
          totalDisplay.innerText = "0";
          return;
      }

      teachers.forEach((t, index) => {
        total += Number(t.salary);
        tbody.innerHTML += `
          <tr class="hover:bg-slate-50/50 transition-colors">
            <td class="px-8 py-6">
              <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-500 text-xs">
                    ${t.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2)}
                </div>
                <div>
                    <p class="text-sm font-bold text-slate-800">${t.name}</p>
                    <p class="text-[9px] font-medium text-slate-400 uppercase tracking-tighter">Staff ID #STF-0${index + 101}</p>
                </div>
              </div>
            </td>
            <td class="px-8 py-6">
              <span class="px-3 py-1 rounded-lg bg-blue-50 text-blue-600 text-[9px] font-bold uppercase tracking-wider">
                ${t.subject}
              </span>
            </td>
            <td class="px-8 py-6">
              <p class="text-sm font-bold text-slate-700">£${Number(t.salary).toLocaleString()}</p>
            </td>
            <td class="px-8 py-6 text-right">
              <button onclick="removeTeacher(${index})" class="text-slate-300 hover:text-red-500 font-bold text-[9px] uppercase tracking-widest transition-colors">Resolve Contract</button>
            </td>
          </tr>
        `;
      });

      totalDisplay.innerText = total.toLocaleString();
    }

    function addTeacher() {
      const name = document.getElementById("tName").value;
      const subject = document.getElementById("tSubject").value;
      const salary = document.getElementById("tSalary").value;

      if(!name || !salary) return;

      teachers.push({ name, subject, salary });
      saveAndRender();
      
      document.getElementById("tName").value = "";
      document.getElementById("tSubject").value = "";
      document.getElementById("tSalary").value = "";
    }

    function removeTeacher(index) {
      if(confirm("Are you sure you want to resolve this faculty contract?")) {
        teachers.splice(index, 1);
        saveAndRender();
      }
    }

    function saveAndRender() {
      localStorage.setItem(`teachers_${user}`, JSON.stringify(teachers));
      renderTeachers();
    }

    function logout() { localStorage.clear(); window.location.href="login.html"; }
  </script>
</body>
</html>
