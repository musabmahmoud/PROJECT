<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Management | Student Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (!localStorage.getItem("user")) window.location.href = "login.html";
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { darkbg: '#020617', darkcard: '#0f172a', darkborder: '#1e2937' } } }
    }
    if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
  </script>
</head>

<body class="bg-[#F8FAFC] dark:bg-darkbg min-h-screen p-4 md:p-12 lg:p-20">
  <div class="max-w-[1400px] mx-auto">
    
    <header class="flex flex-col lg:flex-row justify-between items-end mb-20 gap-10">
      <div>
        <a href="index.html" class="text-blue-600 font-black text-xs uppercase tracking-[0.4em] mb-4 block">⬅️ Return to Command Center</a>
        <h1 class="text-7xl font-[900] tracking-tighter italic dark:text-white text-slate-900">Faculty <span class="text-blue-600">Hub</span></h1>
      </div>

      <div class="bg-slate-900 dark:bg-darkcard text-white p-10 rounded-[4rem] shadow-2xl flex items-center gap-12">
        <div>
            <p class="text-[10px] font-black uppercase tracking-widest opacity-50 mb-2">Total Monthly Payroll</p>
            <h2 id="payrollDisplay" class="text-6xl font-[900] tracking-tighter">0</h2>
        </div>
        <div class="w-[1px] h-16 bg-slate-700"></div>
        <button onclick="openAddTeacher()" class="bg-blue-600 hover:bg-blue-500 px-10 py-5 rounded-3xl font-black text-xs uppercase tracking-widest transition-all active:scale-95">Add Faculty Member</button>
      </div>
    </header>

    <div id="teacherGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        </div>

  </div>

<script>
const API_TEACHERS = "/api/teachers";
const currentUser = localStorage.getItem("user");

function openAddTeacher() {
    // For now, let's use a simple alert or a toggle for a hidden div
    const name = prompt("Enter Teacher Name:");
    const subject = prompt("Enter Subject (Math, Physics, etc.):");
    const salary = prompt("Enter Monthly Salary (EGP):");
    const admin = localStorage.getItem("user");

    if (name && subject && salary) {
        fetch('/api/teachers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, subject, salary: Number(salary), admin, owner: admin })
        }).then(() => loadTeachers());
    }
}

window.onload = loadTeachers;

async function loadTeachers() {
    // This API call now returns calculated salaries based on student counts
    const res = await fetch(`${API_TEACHERS}?admin=${currentUser}`);
    const data = await res.json();
    
    document.getElementById('payrollDisplay').innerText = `${data.totalPayroll.toLocaleString()} EGP`;

    const grid = document.getElementById('teacherGrid');
    grid.innerHTML = data.teachers.map(t => `
        <div class="bg-white dark:bg-darkcard p-12 rounded-[4rem] border dark:border-darkborder shadow-sm group hover:shadow-2xl hover:-translate-y-2 transition-all">
            <div class="flex justify-between items-start mb-10">
                <div class="w-20 h-20 bg-blue-50 dark:bg-blue-900/20 rounded-[2rem] flex items-center justify-center text-4xl">
                    ${getSubjectIcon(t.subject)}
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Calculated Pay</p>
                    <p class="text-3xl font-[900] text-blue-600">${t.calculatedPay.toLocaleString()} <span class="text-xs">EGP</span></p>
                    <p class="text-[9px] font-bold text-slate-300 italic uppercase">${t.salaryType}</p>
                </div>
            </div>

            <h3 class="text-4xl font-[900] tracking-tighter mb-2 text-slate-900 dark:text-white">${t.name}</h3>
            <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">${t.subject} Specialist</p>
            
            <div class="pt-8 border-t dark:border-slate-800">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Assigned Active Load</p>
                <div class="flex flex-wrap gap-2">
                    ${t.assignedClasses.map(c => `
                        <span class="px-4 py-2 bg-slate-50 dark:bg-slate-800 rounded-xl text-[10px] font-black text-slate-600 dark:text-slate-400 border dark:border-darkborder">
                            ${c.level} (${c.language[0]})
                        </span>
                    `).join('')}
                </div>
            </div>
        </div>
    `).join('');
}

function getSubjectIcon(subject) {
    const icons = { 'Math': '📐', 'Physics': '⚛️', 'Chemistry': '⚗️', 'English': '🇬🇧', 'Science': '🧪', 'Arabic': '📜' };
    return icons[subject] || '📚';
}
</script>
</body>
</html>
